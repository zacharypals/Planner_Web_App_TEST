<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── CONSTANTS ──
const GOAL_COLORS = ['#2d5a3d','#c0392b','#e0a800','#2471a3','#7d3c98','#d35400','#148f77','#e91e8c'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// ── HELPERS ──
function useSwipe(onSwipeLeft, onSwipeRight) {
  const touchStartX = React.useRef(null);
  function onTouchStart(e) { touchStartX.current = e.touches[0].clientX; }
  function onTouchEnd(e) {
    if (touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    if (Math.abs(dx) > 50) { dx < 0 ? onSwipeLeft() : onSwipeRight(); }
    touchStartX.current = null;
  }
  return { onTouchStart, onTouchEnd };
}

function getWeekStart(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  return d;
}
function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}
function fmt(date) { return date.toISOString().slice(0,10); }
function fmtLocal(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseLocal(s) { const [y,m,d]=(s||'').split('-').map(Number); return (y&&m&&d)?new Date(y,m-1,d):null; }
function fmtDisplay(d) {
  return `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`;
}
function isSameDay(a,b) { return fmt(a)===fmt(b); }

// ─────────────────────────────────────────────
// GOOGLE AUTH + DRIVE + CALENDAR ENGINE
// ─────────────────────────────────────────────
const CLIENT_ID = '1050376914317-d9al0irmqsmhkq334rffqg30mbtlguuf.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar';
const DRIVE_FILE_NAME = 'planner-data.json';
const REDIRECT_URI = 'https://zacharypals.github.io/Planner_Web_App/oauth.html';
// !! Update this after deploying your Cloudflare Worker !!
const WORKER_URL = 'https://planner-auth.plannertracker.workers.dev';

let _loadingFromDrive = false;
// Debounce timers for calendar sync — keyed by task id
const _calSyncTimers = {};
function debouncedCalSync(id, fn, delay = 2500) {
  if (_calSyncTimers[id]) clearTimeout(_calSyncTimers[id]);
  _calSyncTimers[id] = setTimeout(() => { delete _calSyncTimers[id]; fn(); }, delay);
}

// Token in localStorage — persists across tab closes, auto-expires after ~1hr
function getToken() {
  try {
    const t = localStorage.getItem('plannerToken');
    const exp = parseInt(localStorage.getItem('plannerTokenExp') || '0');
    if (t && Date.now() < exp) return t;
    if (t) { localStorage.removeItem('plannerToken'); localStorage.removeItem('plannerTokenExp'); }
  } catch {}
  return null;
}
function setToken(token, expiresIn) {
  try {
    localStorage.setItem('plannerToken', token);
    // 5min buffer so we refresh before it actually expires
    localStorage.setItem('plannerTokenExp', String(Date.now() + ((expiresIn||3600) - 300) * 1000));
  } catch {}
}
function clearToken() {
  try { localStorage.removeItem('plannerToken'); localStorage.removeItem('plannerTokenExp'); } catch {}
}
function getSavedEmail() {
  try { return localStorage.getItem('plannerAuthEmail') || ''; } catch { return ''; }
}
function saveEmail(email) {
  try { localStorage.setItem('plannerAuthEmail', email); } catch {}
}
function clearEmail() {
  try { localStorage.removeItem('plannerAuthEmail'); } catch {}
}

// ── OAuth2 Authorization Code Flow ──
// Opens a popup → Google redirects to oauth.html with ?code=...
// oauth.html posts the code back → we send it to the Worker → get access+refresh tokens

function requestToken(onSuccess, onError) {
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    response_type: 'code',
    scope: SCOPES + ' profile email',
    access_type: 'offline',
    prompt: 'select_account consent', // force consent to always get refresh_token
    include_granted_scopes: 'true',
  });
  const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
  const popup = window.open(authUrl, 'googleAuth', 'width=500,height=620,top=100,left=200');
  if (!popup) { onError('Popup blocked'); return; }
  let done = false;
  function onMessage(e) {
    if (e.origin !== 'https://zacharypals.github.io') return;
    if (!e.data?.code && !e.data?.error) return;
    if (done) return;
    done = true;
    window.removeEventListener('message', onMessage);
    clearInterval(check);
    if (e.data.error) { onError(e.data.error); return; }
    // Exchange code for tokens via Worker
    fetch(`${WORKER_URL}/exchange`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: e.data.code, redirect_uri: REDIRECT_URI }),
    })
      .then(r => r.json())
      .then(data => {
        if (data.error) { onError(data.error); return; }
        setToken(data.access_token, data.expires_in || 3600);
        onSuccess(data); // data includes email, name, picture
      })
      .catch(err => onError(err.message));
  }
  window.addEventListener('message', onMessage);
  const check = setInterval(() => {
    if (popup.closed) { clearInterval(check); if (!done) { done=true; window.removeEventListener('message', onMessage); } }
  }, 1000);
}

// Silent refresh via Worker — no popup, no user interaction needed
async function requestTokenSilent(onSuccess, onError) {
  const email = getSavedEmail();
  if (!email) { onError('no_email'); return; }
  if (WORKER_URL.includes('YOUR_SUBDOMAIN')) { onError('worker_not_configured'); return; }
  try {
    const res = await fetch(`${WORKER_URL}/refresh`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();
    if (!res.ok || data.error) { onError(data.error || 'refresh_failed'); return; }
    setToken(data.access_token, data.expires_in || 3600);
    onSuccess(data);
  } catch (e) {
    onError(e.message);
  }
}

// ── DRIVE HELPERS ──
async function driveRequest(url, opts = {}) {
  const token = getToken();
  if (!token) throw new Error('Not authenticated');
  const res = await fetch(url, {
    ...opts,
    headers: { 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) },
  });
  if (!res.ok) {
    let detail = '';
    try { const j = await res.clone().json(); detail = j?.error?.message || j?.error?.status || ''; } catch {}
    console.error('Drive API error', res.status, detail, url);
    throw new Error(`Drive error ${res.status}${detail ? ': ' + detail : ''}`);
  }
  return res;
}

async function findOrCreateDriveFile() {
  // Search for existing file
  const search = await driveRequest(
    `https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_NAME}'+and+trashed=false&spaces=drive&fields=files(id,name)`
  );
  const data = await search.json();
  if (data.files && data.files.length > 0) return data.files[0].id;
  // Create new file with empty data
  const meta = { name: DRIVE_FILE_NAME, mimeType: 'application/json' };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
  form.append('file', new Blob([JSON.stringify({})], { type: 'application/json' }));
  const create = await driveRequest(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
    { method: 'POST', body: form }
  );
  const created = await create.json();
  return created.id;
}

async function loadFromDrive() {
  const fileId = await findOrCreateDriveFile();
  const res = await driveRequest(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`
  );
  const text = await res.text();
  try { return { data: JSON.parse(text), fileId }; }
  catch { return { data: {}, fileId }; }
}

async function saveToDrive(fileId, allData) {
  await driveRequest(
    `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
    {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(allData),
    }
  );
}

// ── CALENDAR HELPERS ──
async function pushEventToCalendar(event, dateKey) {
  const token = getToken();
  if (!token) throw new Error('Not signed in to Google — please sign in and try again');
  const dateObj = new Date(dateKey + 'T00:00:00');
  const dateStr = dateKey; // YYYY-MM-DD
  let start, end;
  if (event.eventTime) {
    const [h, m] = event.eventTime.split(':');
    start = { dateTime: `${dateStr}T${event.eventTime}:00`, timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone };
    const endH = String(parseInt(h) + 1).padStart(2, '0');
    end = { dateTime: `${dateStr}T${endH}:${m}:00`, timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone };
  } else {
    const nextDay = new Date(dateObj); nextDay.setDate(nextDay.getDate() + 1);
    const nextStr = fmt(nextDay);
    start = { date: dateStr };
    end = { date: nextStr };
  }
  const body = {
    summary: event.title || 'Untitled Event',
    description: event.details || '',
    start, end,
    extendedProperties: { private: { plannerId: event.id } },
  };
  const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    let detail = '';
    try { const j = await res.clone().json(); detail = j?.error?.message || ''; } catch {}
    console.error('Calendar push failed:', res.status, detail);
    throw new Error(`Calendar error ${res.status}${detail ? ': ' + detail : ''}`);
  }
  const created = await res.json();
  console.log('Calendar event created:', created.id);
  return created.id;
}

async function deleteEventFromCalendar(gcalId) {
  const token = getToken();
  if (!token || !gcalId) return;
  await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${gcalId}`, {
    method: 'DELETE',
    headers: { 'Authorization': `Bearer ${token}` },
  });
}

async function updateEventInCalendar(gcalId, event, dateKey) {
  const token = getToken();
  if (!token || !gcalId) return;
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const dateStr = dateKey;
  let start, end;
  if (event.eventTime) {
    const [h, m] = event.eventTime.split(':');
    const endH = String(parseInt(h) + 1).padStart(2, '0');
    // Explicitly only set dateTime, no date field at all
    start = { dateTime: `${dateStr}T${event.eventTime}:00`, timeZone: tz };
    end   = { dateTime: `${dateStr}T${endH}:${m}:00`, timeZone: tz };
  } else {
    const nextDay = new Date(dateStr + 'T00:00:00'); nextDay.setDate(nextDay.getDate() + 1);
    // Explicitly only set date, no dateTime field at all
    start = { date: dateStr };
    end   = { date: fmt(nextDay) };
  }
  // Build a clean body — do NOT spread the existing event as it contains
  // read-only fields (etag, htmlLink, etc.) that cause PUT to fail or be ignored.
  // Only include fields we actually manage.
  const body = {
    summary: event.title || 'Untitled Event',
    description: event.details || '',
    start,
    end,
  };
  console.log('updateEventInCalendar PUT body:', JSON.stringify({gcalId, start, end, summary: body.summary}));
  const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${gcalId}`, {
    method: 'PUT',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    console.error('updateEventInCalendar failed:', res.status, err?.error?.message);
  } else {
    console.log('updateEventInCalendar succeeded:', res.status);
  }
}

async function calendarRequest(url, opts = {}) {
  const token = getToken();
  if (!token) throw new Error('Not authenticated');
  const res = await fetch(url, {
    ...opts,
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) },
  });
  if (!res.ok) {
    let detail = '';
    try { const j = await res.clone().json(); detail = j?.error?.message || j?.error?.status || ''; } catch {}
    console.error('Calendar API error', res.status, detail, url);
    throw new Error(`Calendar error ${res.status}${detail ? ': ' + detail : ''}`);
  }
  return res;
}

// Pull events from Google Calendar that don't exist in local data (constructive only)
async function pullNewFromCalendar(weekData) {
  const token = getToken();
  if (!token) return null;
  const now = new Date();
  const oneYearAgo = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());
  const oneYearFwd = new Date(now.getFullYear() + 1, now.getMonth(), now.getDate());
  const res = await fetch(
    `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${oneYearAgo.toISOString()}&timeMax=${oneYearFwd.toISOString()}&singleEvents=true&maxResults=500`,
    { headers: { 'Authorization': `Bearer ${token}` } }
  );
  if (!res.ok) {
    let detail = '';
    try { const j = await res.clone().json(); detail = j?.error?.message || ''; } catch {}
    console.error('Calendar pull failed:', res.status, detail);
    throw new Error(`Calendar error ${res.status}${detail ? ': ' + detail : ''}`);
  }
  const data = await res.json();
  const gcalEvents = data.items || [];
  console.log('Calendar pull: fetched', gcalEvents.length, 'events');

  // Build a map of gcalId → local task for quick lookup
  const gcalIdToTask = {}; // gcalId → {task, wk, dayKey}
  const existingPlannerIds = new Set();
  Object.entries(weekData).forEach(([wk, wd]) => {
    Object.entries(wd.tasks || {}).forEach(([dayKey, tasks]) => {
      tasks.filter(t => t.isEvent).forEach(t => {
        existingPlannerIds.add(t.id);
        if (t.gcalId) gcalIdToTask[t.gcalId] = {task: t, wk, dayKey};
      });
    });
  });

  const newWeekData = JSON.parse(JSON.stringify(weekData));
  let added = 0, updated = 0;

  gcalEvents.forEach(ev => {
    const newDateStr = ev.start?.date || ev.start?.dateTime?.slice(0, 10);
    if (!newDateStr) return;
    const newTimeStr = ev.start?.dateTime ? ev.start.dateTime.slice(11, 16) : '';

    if (gcalIdToTask[ev.id]) {
      // Event exists in app — update title, details, time, and date if changed
      const {task, wk, dayKey} = gcalIdToTask[ev.id];
      const changed = task.title !== (ev.summary||'') ||
        task.details !== (ev.description||'') ||
        task.eventTime !== newTimeStr ||
        dayKey !== newDateStr;
      if (!changed) return;
      updated++;
      // Remove from old location
      newWeekData[wk].tasks[dayKey] = (newWeekData[wk].tasks[dayKey] || []).filter(t => t.id !== task.id);
      // Insert at new location
      const newDateObj = new Date(newDateStr + 'T00:00:00');
      const newWeekKey = fmt(getWeekStart(newDateObj));
      if (!newWeekData[newWeekKey]) newWeekData[newWeekKey] = {proverb:'',toCreate:[],weekGoals:[],people:[],beWord:'',proud:'',story:'',tasks:{}};
      if (!newWeekData[newWeekKey].tasks[newDateStr]) newWeekData[newWeekKey].tasks[newDateStr] = [];
      newWeekData[newWeekKey].tasks[newDateStr].push({
        ...task, title: ev.summary||'', details: ev.description||'', eventTime: newTimeStr,
      });
    } else {
      // Net new event — add it
      const plannerId = ev.extendedProperties?.private?.plannerId;
      if (plannerId && existingPlannerIds.has(plannerId)) return; // already tracked
      added++;
      const newDateObj = new Date(newDateStr + 'T00:00:00');
      const newWeekKey = fmt(getWeekStart(newDateObj));
      if (!newWeekData[newWeekKey]) newWeekData[newWeekKey] = {proverb:'',toCreate:[],weekGoals:[],people:[],beWord:'',proud:'',story:'',tasks:{}};
      if (!newWeekData[newWeekKey].tasks[newDateStr]) newWeekData[newWeekKey].tasks[newDateStr] = [];
      newWeekData[newWeekKey].tasks[newDateStr].push({
        id: 'gcal_' + ev.id, gcalId: ev.id,
        title: ev.summary||'', details: ev.description||'',
        done: false, expanded: false, colorIndex: 3,
        isEvent: true, eventTime: newTimeStr,
      });
    }
  });

  return { added, updated, newWeekData };
}

function useStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; }
  });
  const set = useCallback(v => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [val, set];
}

function SortableChecklist({ items, onUpdate, onAdd, onDelete, onReorder, placeholder }) {
  const [dragId, setDragId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);
  const [pendingFocusId, setPendingFocusId] = useState(null);
  const inputRefs = useRef({});

  function handleKeyDown(e, item, idx) {
    if (e.key === 'Enter') {
      e.preventDefault();
      // Generate the new id here so we can focus it after render
      const newId = Date.now().toString();
      setPendingFocusId(newId);
      onAdd(item.id, newId);
    }
  }

  function handleBlur(item) {
    if (!item.name.trim()) {
      onDelete(item.id);
    }
  }

  function handleDragStart(e, id) {
    setDragId(id);
    e.dataTransfer.effectAllowed = 'move';
  }
  function handleDragOver(e, id) {
    e.preventDefault();
    if (id !== dragId) setDragOverId(id);
  }
  function handleDrop(e, id) {
    e.preventDefault();
    if (dragId && id !== dragId) onReorder(dragId, id);
    setDragId(null); setDragOverId(null);
  }
  function handleDragEnd() { setDragId(null); setDragOverId(null); }

  // Focus the newly added item once its ref is registered
  useEffect(() => {
    if (pendingFocusId && inputRefs.current[pendingFocusId]) {
      inputRefs.current[pendingFocusId].focus();
      setPendingFocusId(null);
    }
  });

  // Auto-size all textareas on mount and whenever items change
  useEffect(() => {
    Object.values(inputRefs.current).forEach(el => {
      if (el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
    });
  }, [items]);

  return (
    <>
      {items.map((item, idx) => (
        <div key={item.id}
          className={`checklist-item ${item.done?'checked':''} ${dragOverId===item.id?'drag-over':''} ${dragId===item.id?'dragging':''}`}
          draggable
          onDragStart={e=>handleDragStart(e,item.id)}
          onDragOver={e=>handleDragOver(e,item.id)}
          onDrop={e=>handleDrop(e,item.id)}
          onDragEnd={handleDragEnd}>
          <span className="checklist-drag-handle">⣿</span>
          <div className={`check-box ${item.done?'checked':''}`} onClick={()=>onUpdate(item.id,{done:!item.done})} />
          <textarea
            ref={el=>inputRefs.current[item.id]=el}
            className="checklist-input"
            placeholder={placeholder}
            value={item.name}
            rows={1}
            onChange={e=>{
              onUpdate(item.id,{name:e.target.value});
              e.target.style.height='auto';
              e.target.style.height=e.target.scrollHeight+'px';
            }}
            onKeyDown={e=>handleKeyDown(e,item,idx)}
            onBlur={()=>handleBlur(item)}
          />
          <button className="delete-item-btn" onClick={()=>onDelete(item.id)}>✕</button>
        </div>
      ))}
    </>
  );
}

function WeeklyPlanner({ weekData, setWeekData, pagesData, setPagesData, onGoToHabit, calHeaderColor, setCalHeaderColor, habitGoals, habitCompletions, setHabitCompletions, habitQty, setHabitQty, habitNotes, setHabitNotes, peopleDirectory, setPeopleDirectory }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const [weekStart, setWeekStartRaw] = useState(() => {
    const saved = parseLocal(sessionStorage.getItem('lp_weekStart'));
    return saved ? getWeekStart(saved) : getWeekStart(today);
  });
  const setWeekStart = (v) => setWeekStartRaw(prev => {
    const next = typeof v === 'function' ? v(prev) : v;
    sessionStorage.setItem('lp_weekStart', fmtLocal(next));
    return next;
  });
  const weekKey = fmt(weekStart);
  const weekDataRef = useRef(weekData);
  useEffect(() => { weekDataRef.current = weekData; }, [weekData]);

  // Auto-focus newly created task title
  // Both desktop grid and mobile day view render today's tasks simultaneously and share
  // task ids — we use separate ref maps and pick from whichever view is visible.
  useEffect(() => {
    if (pendingTaskFocus.current) {
      const {id} = pendingTaskFocus.current;
      const isMobileView = window.matchMedia('(max-width: 767px)').matches;
      const el = isMobileView
        ? (taskTitleRefsMobile.current[id] || taskTitleRefs.current[id])
        : (taskTitleRefs.current[id] || taskTitleRefsMobile.current[id]);
      if (el) {
        el.focus();
        pendingTaskFocus.current = null;
      } else {
        setTimeout(() => {
          const isMobile = window.matchMedia('(max-width: 767px)').matches;
          const el2 = isMobile
            ? (taskTitleRefsMobile.current[id] || taskTitleRefs.current[id])
            : (taskTitleRefs.current[id] || taskTitleRefsMobile.current[id]);
          if (el2) { el2.focus(); pendingTaskFocus.current = null; }
        }, 50);
      }
    }
  });
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [mobileDayIndex, setMobileDayIndexRaw] = useState(() => {
    const saved = sessionStorage.getItem('lp_mobileDayIndex');
    return saved !== null ? parseInt(saved, 10) : today.getDay();
  }); // 0=Sun
  const setMobileDayIndex = (v) => setMobileDayIndexRaw(prev => {
    const next = typeof v === 'function' ? v(prev) : v;
    sessionStorage.setItem('lp_mobileDayIndex', String(next));
    return next;
  });
  const [sheetOpen, setSheetOpen] = useState(false);
  const [showPeoplePicker, setShowPeoplePicker] = useState(false);
  const pendingTaskFocus = useRef(null); // {id, dayKey} — task to focus after render
  const taskTitleRefs = useRef({}); // id -> input ref (desktop)
  const taskTitleRefsMobile = useRef({}); // id -> input ref (mobile)
  const [taskClipboard, setTaskClipboard] = useState(null); // copied task object
  const [ctxMenu, setCtxMenu] = useState(null); // {x,y,onCopy,onPaste,hasCopied}

  // Per-week data — now uses shared weekData prop

  function getWD() { return weekData[weekKey] || { proverb:'', toCreate:[], people:[], beWord:'', proud:'', story:'', tasks:{} }; }
  function setWD(fn) {
    setWeekData(wd => {
      const cur = wd[weekKey] || { proverb:'', toCreate:[], people:[], beWord:'', proud:'', story:'', tasks:{} };
      return { ...wd, [weekKey]: typeof fn === 'function' ? fn(cur) : fn };
    });
  }

  const wd = getWD();

  // Tasks: { [dayKey]: [{id, title, details, done, color, expanded, order}] }
  function getTasks(dayKey) { return (wd.tasks||{})[dayKey] || []; }
  function getDayNote(dayKey) { return (wd.dayNotes||{})[dayKey] || ''; }
  function setDayNote(dayKey, note) {
    setWD(w => ({...w, dayNotes: {...(w.dayNotes||{}), [dayKey]: note}}));
  }
  // Reads from ref — safe to call from debounced callbacks where closure may be stale
  function getTasksFresh(wk, dayKey) {
    return ((weekDataRef.current[wk]||{}).tasks||{})[dayKey] || [];
  }
  function setTasks(dayKey, fn) {
    setWD(w => {
      const current = (w.tasks||{})[dayKey] || [];
      return { ...w, tasks: { ...(w.tasks||{}), [dayKey]: typeof fn==='function' ? fn(current) : fn } };
    });
  }

  // Propagate a repeat task across future days up to endDate
  function propagateRepeat(sourceTask, sourceDayKey, repeatDays, endDate) {
    if (!repeatDays || repeatDays.length === 0 || !endDate) return;
    const end = new Date(endDate + 'T00:00:00');
    const start = new Date(sourceDayKey + 'T00:00:00');
    start.setDate(start.getDate() + 1); // start from day after source
    const repeatId = sourceTask.repeatId || sourceTask.id;
    // Stamp the source task with repeatId if not already set
    if (!sourceTask.repeatId) {
      setTasks(sourceDayKey, ts => ts.map(t => t.id === sourceTask.id ? {...t, repeatId} : t));
    }
    // Build all target dates
    const cursor = new Date(start);
    const targets = [];
    while (cursor <= end) {
      if (repeatDays.includes(cursor.getDay())) {
        targets.push(fmt(new Date(cursor)));
      }
      cursor.setDate(cursor.getDate() + 1);
    }
    if (targets.length === 0) return;
    // Write copies into weekData — accumulate into a single draft object
    // so targets that share a week don't clobber each other
    setWeekData(wd => {
      const draft = JSON.parse(JSON.stringify(wd)); // deep clone
      targets.forEach(dk => {
        const dateObj = new Date(dk + 'T00:00:00');
        const wk = fmt(getWeekStart(dateObj));
        if (!draft[wk]) draft[wk] = { proverb:'', toCreate:[], people:[], beWord:'', proud:'', story:'', tasks:{} };
        if (!draft[wk].tasks) draft[wk].tasks = {};
        const dayTasks = draft[wk].tasks[dk] || [];
        // Skip if a repeat copy already exists for this repeatId on this day
        if (dayTasks.some(t => t.repeatId === repeatId)) return;
        draft[wk].tasks[dk] = [...dayTasks, {
          ...sourceTask,
          id: `${repeatId}_${dk}`,
          repeatId,
          repeat: { days: repeatDays, endDate },
          done: false,
          expanded: false,
          gcalId: null,
        }];
      });
      return draft;
    });
  }

  function addTask(dayKey, afterId) {
    const id = Date.now().toString();
    pendingTaskFocus.current = {id, dayKey};
    if (afterId) {
      setTasks(dayKey, t => {
        const idx = t.findIndex(x=>x.id===afterId);
        const next = [...t];
        next.splice(idx+1, 0, {id, title:'', details:'', done:false, expanded:false, colorIndex: idx+1});
        return next;
      });
    } else {
      setTasks(dayKey, t => [...t, {id, title:'', details:'', done:false, expanded:false, colorIndex: t.length}]);
    }
  }
  function updateTask(dayKey, id, patch) {
    // Pure state update — no calendar sync, safe to call on every keystroke
    setTasks(dayKey, t => t.map(x => x.id===id ? {...x,...patch} : x));
    // Sync back to pagesData if this is a project task
    // Read from weekDataRef (always current) rather than getTasks (stale at call time)
    const allDayTasks = ((weekDataRef.current[weekKey]||{}).tasks||{})[dayKey] || [];
    const task = allDayTasks.find(t => t.id===id);
    if (task?.isProjectTask && task?.projectDocId && setPagesData) {
      const syncFields = ['done','title','details','priority'];
      if (Object.keys(patch).some(k => syncFields.includes(k))) {
        setPagesData(p => p.map(doc => doc.id !== task.projectDocId ? doc : {
          ...doc, tasks: (doc.tasks||[]).map(t => t.id===id ? {...t,...patch} : t)
        }));
      }
    }

    // For non-text fields (isEvent toggle, eventTime), sync immediately with debounce
    const immediateFields = ['eventTime', 'isEvent'];
    if (Object.keys(patch).some(k => immediateFields.includes(k))) {
      syncTaskToCalendar(dayKey, id, patch);
    }
    // title and details are synced on blur via onBlurSync — not here
  }

  function syncTaskToCalendar(dayKey, id, patch = {}) {
    // Always reads fresh state from ref so we get the latest title/details/time
    const task = getTasksFresh(weekKey, dayKey).find(t => t.id===id);
    if (!task || !getToken()) return;

    if (task.isEvent) {
      if (task.gcalId) {
        updateEventInCalendar(task.gcalId, task, dayKey)
          .catch(e => console.error('Calendar update failed:', e));
      } else {
        // No gcalId yet — push as new event
        pushEventToCalendar(task, dayKey)
          .then(gcalId => {
            if (gcalId) setTasks(dayKey, ts => ts.map(x => x.id===id ? {...x, gcalId} : x));
          })
          .catch(e => console.error('Calendar push failed:', e));
      }
    } else if (patch.isEvent === false && task.gcalId) {
      // Toggled from event to task — remove from calendar
      deleteEventFromCalendar(task.gcalId).catch(()=>{});
      setTasks(dayKey, ts => ts.map(x => x.id===id ? {...x, gcalId: null} : x));
    }
  }
  function deleteTask(dayKey, id) {
    const task = getTasks(dayKey).find(t => t.id===id);
    if (task && task.gcalId && getToken()) deleteEventFromCalendar(task.gcalId).catch(()=>{});
    // If this is a project task, clear its scheduledDate in pagesData (removes from planner but keeps in doc)
    if (task?.isProjectTask && task?.projectDocId && setPagesData) {
      setPagesData(p => p.map(doc => doc.id !== task.projectDocId ? doc : {
        ...doc, tasks: (doc.tasks||[]).map(t => t.id===id ? {...t, scheduledDate:''} : t)
      }));
    }
    setTasks(dayKey, t => t.filter(x=>x.id!==id));
  }

  const weekDays = Array.from({length:7}, (_,i)=>addDays(weekStart,i));
  const weekLabel = `${fmtDisplay(weekDays[0])} – ${fmtDisplay(weekDays[6])}`;

  // People to Connect With — new directory-backed model
  // Each week entry: { id, personId?, name?(legacy), days:[], note:'' }
  function handleAddPeople(selectedIds, newNames) {
    const now = Date.now();
    // Create new directory entries for new names
    const newDirEntries = newNames.map((name,i) => ({id:'p'+(now+i), name}));
    if (newDirEntries.length) setPeopleDirectory(d => [...(d||[]), ...newDirEntries]);
    // Build week entries for both selected existing + new
    const allEntries = [
      ...selectedIds.map((personId,i) => ({id:(now+1000+i).toString(), personId, days:[], note:''})),
      ...newDirEntries.map((dir,i) => ({id:(now+2000+i).toString(), personId:dir.id, days:[], note:''})),
    ];
    setWD(w => ({...w, people:[...(w.people||[]), ...allEntries]}));
    setShowPeoplePicker(false);
  }
  function updatePerson(id,patch) { setWD(w=>({...w, people:(w.people||[]).map(p=>p.id===id?{...p,...patch}:p)})); }
  function deletePerson(id) { setWD(w=>({...w, people:(w.people||[]).filter(p=>p.id!==id)})); }
  function reorderPeople(fromId, toId) {
    setWD(w=>{
      const list = [...(w.people||[])];
      const from = list.findIndex(p=>p.id===fromId);
      const to = list.findIndex(p=>p.id===toId);
      if (from===-1||to===-1) return w;
      const [item] = list.splice(from,1);
      list.splice(to,0,item);
      return {...w, people:list};
    });
  }

  function addCreate() { setWD(w=>({...w, toCreate:[...(Array.isArray(w.toCreate)?w.toCreate:[]),{id:Date.now().toString(),name:'',done:false}]})); }
  function updateCreate(id,patch) { setWD(w=>({...w, toCreate:(Array.isArray(w.toCreate)?w.toCreate:[]).map(c=>c.id===id?{...c,...patch}:c)})); }
  function deleteCreate(id) { setWD(w=>({...w, toCreate:(Array.isArray(w.toCreate)?w.toCreate:[]).filter(c=>c.id!==id)})); }

  function addGoal(afterId, newId) {
    const newItem = {id: newId || Date.now().toString(), name:'', done:false};
    setWD(w=>{
      const list = w.goals||[];
      if (!afterId) return {...w, goals:[...list, newItem]};
      const idx = list.findIndex(g=>g.id===afterId);
      const next = [...list];
      next.splice(idx+1, 0, newItem);
      return {...w, goals:next};
    });
  }
  function updateGoal(id,patch) { setWD(w=>({...w, goals:(w.goals||[]).map(g=>g.id===id?{...g,...patch}:g)})); }
  function deleteGoal(id) { setWD(w=>({...w, goals:(w.goals||[]).filter(g=>g.id!==id)})); }
  function reorderGoals(fromId, toId) {
    setWD(w=>{
      const list = [...(w.goals||[])];
      const from = list.findIndex(g=>g.id===fromId);
      const to = list.findIndex(g=>g.id===toId);
      if (from===-1||to===-1) return w;
      const [item] = list.splice(from,1);
      list.splice(to,0,item);
      return {...w, goals:list};
    });
  }

  const [dragging, setDragging] = useState(null); // {dayKey, id}
  const [dragOver, setDragOver] = useState(null);  // {dayKey, id}

  function reorderTasks(dayKey, fromId, toId) {
    if (fromId === toId) return;
    setTasks(dayKey, tasks => {
      const from = tasks.findIndex(t => t.id === fromId);
      const to = tasks.findIndex(t => t.id === toId);
      if (from === -1 || to === -1) return tasks;
      const next = [...tasks];
      const [moved] = next.splice(from, 1);
      next.splice(to, 0, moved);
      return next;
    });
  }

  function moveTaskBetweenDays(fromDayKey, toDayKey, taskId, targetId) {
    // Capture task reference for calendar sync (needs to happen outside updater)
    const taskForSync = getTasks(fromDayKey).find(t => t.id === taskId);
    setWD(w => {
      const allTasks = w.tasks || {};
      const srcList = allTasks[fromDayKey] || [];
      // Find task from FRESH state — if already moved (double-fire guard), bail out
      const task = srcList.find(t => t.id === taskId);
      if (!task) return w;
      const srcTasks = srcList.filter(t => t.id !== taskId);
      const dstList = allTasks[toDayKey] || [];
      // If task somehow already in destination, bail out (idempotency guard)
      if (dstList.some(t => t.id === taskId)) return w;
      const dstTasks = [...dstList];
      const insertAt = targetId ? dstTasks.findIndex(t => t.id === targetId) : dstTasks.length;
      dstTasks.splice(insertAt === -1 ? dstTasks.length : insertAt, 0, task);
      return { ...w, tasks: { ...allTasks, [fromDayKey]: srcTasks, [toDayKey]: dstTasks } };
    });
    // Sync date change to Google Calendar
    if (taskForSync?.isEvent && taskForSync?.gcalId && getToken()) {
      updateEventInCalendar(taskForSync.gcalId, taskForSync, toDayKey)
        .catch(e => console.error('Calendar move failed:', e));
    }
  }

  const mobileDayKey = fmt(weekDays[mobileDayIndex]);
  const mobileDayTasks = getTasks(mobileDayKey);
  const mobileDayDate = weekDays[mobileDayIndex];

  // Mobile touch drag for task reordering
  const mobileTouchDragId = useRef(null);
  const mobileTouchDragEl = useRef(null);
  const mobileTasksContainerRef = useRef(null);
  const [mobileDragOverId, setMobileDragOverId] = useState(null);

  // Native touch drag: all 3 events passive:false so both scroll-block AND
  // text-selection-block work. Only activates when touch starts on .mobile-drag-handle.
  useEffect(() => {
    const el = mobileTasksContainerRef.current;
    if (!el) return;
    function onTStart(e) {
      if (!e.target.closest('.mobile-drag-handle')) return;
      e.preventDefault(); // prevents text selection from the very first touch
      const row = e.target.closest('[data-task-id]');
      if (!row) return;
      mobileTouchDragId.current = row.getAttribute('data-task-id');
      mobileTouchDragEl.current = row;
      row.style.opacity = '0.45';
    }
    function onTMove(e) {
      if (!mobileTouchDragId.current) return;
      e.preventDefault(); // prevents scroll while dragging
      const t = e.touches[0];
      const over = document.elementFromPoint(t.clientX, t.clientY);
      const row = over?.closest('[data-task-id]');
      setMobileDragOverId(row ? row.getAttribute('data-task-id') : null);
    }
    function onTEnd(e) {
      if (!mobileTouchDragId.current) return;
      const t = e.changedTouches[0];
      const over = document.elementFromPoint(t.clientX, t.clientY);
      const targetRow = over?.closest('[data-task-id]');
      const targetId = targetRow ? targetRow.getAttribute('data-task-id') : null;
      if (targetId && targetId !== mobileTouchDragId.current) {
        reorderTasks(mobileDayKey, mobileTouchDragId.current, targetId);
      }
      if (mobileTouchDragEl.current) mobileTouchDragEl.current.style.opacity = '';
      setMobileDragOverId(null);
      mobileTouchDragId.current = null;
      mobileTouchDragEl.current = null;
    }
    el.addEventListener('touchstart', onTStart, {passive: false});
    el.addEventListener('touchmove',  onTMove,  {passive: false});
    el.addEventListener('touchend',   onTEnd,   {passive: false});
    return () => {
      el.removeEventListener('touchstart', onTStart);
      el.removeEventListener('touchmove',  onTMove);
      el.removeEventListener('touchend',   onTEnd);
    };
  }, [mobileDayKey]);

  const sidebarContent = (
    <>
      <div className="week-nav">
        <button className="nav-arrow" onClick={()=>setWeekStart(ws=>addDays(ws,-7))}>‹</button>
        <span className="week-nav-label">{weekLabel}</span>
        <button className="nav-arrow" onClick={()=>setWeekStart(ws=>addDays(ws,7))}>›</button>
      </div>
      <a className="sidebar-link daily" href="https://penzu.com">✍️ Daily Pages</a>
      <div className="sidebar-section">
        <div className="sidebar-section-title">Proverb of the Week</div>
        <textarea className="sidebar-textarea" placeholder="Write a quote to meditate on…"
          value={wd.proverb||''} onChange={e=>setWD(w=>({...w,proverb:e.target.value}))} rows={3} />
      </div>
      <div className="sidebar-section">
        <div className="checklist-header">
          <div className="sidebar-section-title">Weekly Goals:</div>
          <button className="add-btn" onClick={()=>addGoal(null)}>+</button>
        </div>
        <SortableChecklist
          items={wd.goals||[]}
          onUpdate={updateGoal}
          onAdd={addGoal}
          onDelete={deleteGoal}
          onReorder={reorderGoals}
          placeholder="Goal…"
        />
      </div>

      <div className="sidebar-section">
        <div className="checklist-header">
          <div className="sidebar-section-title">People to Connect With</div>
          <button className="add-btn" onClick={()=>setShowPeoplePicker(true)} title="Add person">+</button>
        </div>
        <PeopleChecklist
          items={wd.people||[]}
          weekDays={weekDays}
          onUpdate={updatePerson}
          onDelete={deletePerson}
          onReorder={reorderPeople}
          directory={peopleDirectory||[]}
          onRenameDirectory={(personId, newName) =>
            setPeopleDirectory(d => d.map(p => p.id===personId ? {...p, name:newName} : p))
          }
        />
        {(wd.people||[]).length === 0 && (
          <div style={{fontSize:11,color:'var(--ink-faint)',fontStyle:'italic',padding:'2px 4px'}}>
            Press + to add people
          </div>
        )}
      </div>
      <div className="sidebar-section">
        <div className="sidebar-section-title">Be-Word of the Week</div>
        <textarea className="sidebar-textarea" placeholder="Your be-word and how to apply it…"
          value={wd.beWord||''} onChange={e=>setWD(w=>({...w,beWord:e.target.value}))} rows={10} />
      </div>
    </>
  );

  return (
    <div className="main-content">
      {/* DESKTOP SIDEBAR */}
      <div className={`sidebar-wrap ${sidebarCollapsed ? 'collapsed' : ''}`}>
        <div className="sidebar">{sidebarContent}</div>
        <div className="sidebar-toggle-strip" onClick={()=>setSidebarCollapsed(c=>!c)}
          title={sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'}>
          <div className="sidebar-toggle-btn">{sidebarCollapsed ? '›' : '‹'}</div>
          <span className="sidebar-collapsed-label">Weekly</span>
        </div>
      </div>


      {/* MAIN */}
      <div className="main-panel weekly-main-panel">
        <div className="weekly-calendar">
          <div className="cal-scroll-wrapper">
            <div className="cal-grid">
              {weekDays.map((d,i)=>(
                <div key={'h'+i} className={`cal-header-cell ${isSameDay(d,today)?'today':''}`}
                  style={{background: calHeaderColor}}>
                  <div className="day-name">{DAYS[d.getDay()]}</div>
                  <div className="day-date">{d.getDate()}</div>
                  {i===6 && (
                    <div className="cal-hdr-color-wrap">
                      <ColorPickerPopover color={calHeaderColor} onChange={setCalHeaderColor} />
                    </div>
                  )}
                </div>
              ))}
              {weekDays.map((d,i)=>{
                const dk = fmt(d);
                const tasks = getTasks(dk);
                return (
                  <div key={'b'+i} className={`cal-day ${isSameDay(d,today)?'today':''}`}
                    onDragOver={e=>e.preventDefault()}
                    onDrop={e=>{
                      e.preventDefault();
                      if(!dragging) return;
                      if(dragging.dayKey === dk) {
                        if(!dragOver || dragOver.dayKey !== dk) reorderTasks(dk, dragging.id, null);
                      } else {
                        moveTaskBetweenDays(dragging.dayKey, dk, dragging.id, null);
                      }
                      setDragging(null); setDragOver(null);
                    }}>
                    <DailyHabitsSection dayKey={dk}
                      habitGoals={habitGoals} habitCompletions={habitCompletions} setHabitCompletions={setHabitCompletions}
                      habitQty={habitQty} setHabitQty={setHabitQty} habitNotes={habitNotes} setHabitNotes={setHabitNotes} />
                    {tasks.map(task=>(
                      <TaskCard key={task.id} task={task}
                        onUpdate={p=>updateTask(dk,task.id,p)}
                        onBlurSync={()=>syncTaskToCalendar(dk,task.id)}
                        onDelete={()=>deleteTask(dk,task.id)}
                        onEnterKey={()=>addTask(dk,task.id)}
                        titleRef={el=>taskTitleRefs.current[task.id]=el}
                        deleteIfEmpty={()=>{if(!task.title.trim())deleteTask(dk,task.id);}}
                        onCopy={()=>setTaskClipboard({...task, gcalId:null, id:null})}
                        hasCopied={!!taskClipboard}
                        onPasteBelow={()=>{
                          if(!taskClipboard) return;
                          const newId = Date.now().toString();
                          setTasks(dk, t => {
                            const idx = t.findIndex(x=>x.id===task.id);
                            const cloned = {...taskClipboard, id:newId, gcalId:null};
                            const next = [...t];
                            next.splice(idx+1, 0, cloned);
                            return next;
                          });
                        }}
                        onShowCtxMenu={(x,y,cp,pp,hp)=>setCtxMenu({x,y,onCopy:cp,onPaste:pp,hasCopied:hp})}
                        onApplyRepeat={(days,endDate)=>propagateRepeat(task,dk,days,endDate)}
                        isDragOver={dragOver?.dayKey===dk && dragOver?.id===task.id}
                        onDragStart={()=>setDragging({dayKey:dk, id:task.id})}
                        onDragOver={()=>setDragOver({dayKey:dk, id:task.id})}
                        onDragEnd={()=>{ setDragging(null); setDragOver(null); }}
                        onDrop={()=>{
                          if(dragging) {
                            if(dragging.dayKey === dk) reorderTasks(dk, dragging.id, task.id);
                            else moveTaskBetweenDays(dragging.dayKey, dk, dragging.id, task.id);
                          }
                          setDragging(null); setDragOver(null);
                        }} />
                    ))}
                    <button className="add-task-btn" onClick={()=>addTask(dk)}>+</button>
                    <DayNote dayKey={dk} note={getDayNote(dk)} onChange={note=>setDayNote(dk,note)} />
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        <div className="week-review">
          <div className="review-section">
            <div className="review-label">This week, I was proud that I:</div>
            <textarea className="review-textarea" placeholder="Write about your proudest moment…"
              value={wd.proud||''} onChange={e=>{setWD(w=>({...w,proud:e.target.value}));e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';}}
              onFocus={e=>{e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';}} />
          </div>
          <div className="review-section">
            <div className="review-label">Best Story This Week</div>
            <textarea className="review-textarea" placeholder="What's the best story from this week?"
              value={wd.story||''} onChange={e=>{setWD(w=>({...w,story:e.target.value}));e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';}}
              onFocus={e=>{e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';}} />
          </div>
        </div>
      </div>

      {/* MOBILE: Day view */}
      {(() => {
        const swipe = useSwipe(
          () => setMobileDayIndex(i => { if(i===6){setWeekStart(ws=>addDays(ws,7));return 0;} return i+1; }),
          () => setMobileDayIndex(i => { if(i===0){setWeekStart(ws=>addDays(ws,-7));return 6;} return i-1; })
        );
        return (
      <div className="mobile-day-view" {...swipe}>
        <div className="mobile-day-nav">
          <button className="nav-arrow" onClick={()=>setMobileDayIndex(i=>{
            if(i===0){setWeekStart(ws=>addDays(ws,-7));return 6;}
            return i-1;
          })}>‹</button>
          <div style={{textAlign:'center'}}>
            <div className="mobile-day-label">{DAYS[mobileDayDate.getDay()]}</div>
            <div className="mobile-day-date">{MONTHS[mobileDayDate.getMonth()].slice(0,3)} {mobileDayDate.getDate()}</div>
          </div>
          <button className="nav-arrow" onClick={()=>setMobileDayIndex(i=>{
            if(i===6){setWeekStart(ws=>addDays(ws,7));return 0;}
            return i+1;
          })}>›</button>
        </div>
        <div className="mobile-day-tasks" ref={mobileTasksContainerRef}>
          <DailyHabitsSection dayKey={mobileDayKey}
            habitGoals={habitGoals} habitCompletions={habitCompletions} setHabitCompletions={setHabitCompletions}
            habitQty={habitQty} setHabitQty={setHabitQty} habitNotes={habitNotes} setHabitNotes={setHabitNotes} />
          {mobileDayTasks.map(task=>(
            <div key={task.id} data-task-id={task.id}
              style={{
                outline: mobileDragOverId===task.id && mobileDragOverId!==mobileTouchDragId.current
                         ? '2px dashed var(--accent)' : 'none',
                borderRadius:8, transition:'outline 0.1s',
                userSelect:'none', WebkitUserSelect:'none',
              }}>
              <div style={{display:'flex',alignItems:'flex-start',gap:0}}>
                <div style={{flex:1,minWidth:0}}>
                  <TaskCard task={task}
                    onUpdate={p=>updateTask(mobileDayKey,task.id,p)}
                    onBlurSync={()=>syncTaskToCalendar(mobileDayKey,task.id)}
                    onDelete={()=>deleteTask(mobileDayKey,task.id)}
                    onEnterKey={()=>addTask(mobileDayKey,task.id)}
                    titleRef={el=>taskTitleRefsMobile.current[task.id]=el}
                    deleteIfEmpty={()=>{if(!task.title.trim())deleteTask(mobileDayKey,task.id);}}
                    onApplyRepeat={(days,endDate)=>propagateRepeat(task,mobileDayKey,days,endDate)}
                    onReschedule={(toDayKey)=>{
                moveTaskBetweenDays(mobileDayKey,toDayKey,task.id,null);
                if(task.expanded) updateTask(toDayKey,task.id,{expanded:false});
                // If it's a project task, also update scheduledDate in pagesData
                if(task.isProjectTask && task.projectDocId && setPagesData) {
                  setPagesData(p => p.map(doc => doc.id !== task.projectDocId ? doc : {
                    ...doc, tasks: (doc.tasks||[]).map(t => t.id===task.id ? {...t, scheduledDate:toDayKey} : t)
                  }));
                }
              }}
                    weekDays={weekDays}
                    currentDayKey={mobileDayKey}
                    isDragOver={false} onDragStart={()=>{}} onDragOver={()=>{}} onDrop={()=>{}} />
                </div>
                <span className="mobile-drag-handle"
                  style={{fontSize:16,color:'var(--border)',cursor:'grab',padding:'10px 2px 10px 6px',
                          flexShrink:0,touchAction:'none',userSelect:'none',WebkitUserSelect:'none',
                          alignSelf:'flex-start',marginTop:2}}
                  title="Drag to reorder">⣿</span>
              </div>
            </div>
          ))}
          <button className="mobile-add-btn" onClick={()=>addTask(mobileDayKey)}>+ Add task</button>
        </div>
        {/* Week dot row */}
        <div className="mobile-week-dots">
          {weekDays.map((d,i)=>(
            <button key={i}
              className={`mobile-week-dot ${i===mobileDayIndex?'active':''} ${isSameDay(d,today)?'today':''}`}
              onClick={()=>setMobileDayIndex(i)}>
              {DAYS[d.getDay()].slice(0,1)}
            </button>
          ))}
        </div>
      </div>

      );})()}

      {/* MOBILE: Bottom sheet overlay */}
      <div className={`mobile-sheet-overlay ${sheetOpen?'open':''}`} onClick={()=>setSheetOpen(false)} />
      <div className={`mobile-sheet ${sheetOpen?'open':''}`}>
        <div className="mobile-sheet-handle" />
        <div className="mobile-sheet-header">
          <span className="mobile-sheet-title">This Week</span>
          <button className="mobile-sheet-close" onClick={()=>setSheetOpen(false)}>✕</button>
        </div>
        <div className="mobile-sheet-body">
          {sidebarContent}
          <div className="sidebar-section">
            <div className="sidebar-section-title">This week, I was proud that I:</div>
            <textarea className="sidebar-textarea" placeholder="Write about your proudest moment…"
              value={wd.proud||''} onChange={e=>setWD(w=>({...w,proud:e.target.value}))} rows={3} />
          </div>
          <div className="sidebar-section">
            <div className="sidebar-section-title">Best Story This Week</div>
            <textarea className="sidebar-textarea" placeholder="What's the best story from this week?"
              value={wd.story||''} onChange={e=>setWD(w=>({...w,story:e.target.value}))} rows={3} />
          </div>
        </div>
      </div>

      {/* MOBILE: FAB to open sheet */}
      <button className="mobile-fab" onClick={()=>setSheetOpen(o=>!o)} title="Weekly notes & goals">☰</button>

      {/* CONTEXT MENU for copy/paste */}
      {ctxMenu && (
        <>
          <div style={{position:'fixed',inset:0,zIndex:9998}} onClick={()=>setCtxMenu(null)} onContextMenu={e=>{e.preventDefault();setCtxMenu(null);}} />
          <div className="task-ctx-menu" style={{top:ctxMenu.y, left:ctxMenu.x}}>
            <button className="task-ctx-btn" onClick={()=>{ctxMenu.onCopy();setCtxMenu(null);}}>
              📋 Copy task
            </button>
            {ctxMenu.hasCopied && (
              <button className="task-ctx-btn" onClick={()=>{ctxMenu.onPaste();setCtxMenu(null);}}>
                📌 Paste below
              </button>
            )}
          </div>
        </>
      )}

      {/* PEOPLE PICKER MODAL */}
      {showPeoplePicker && (
        <PeoplePicker
          directory={peopleDirectory||[]}
          existingPersonIds={new Set((wd.people||[]).map(p=>p.personId).filter(Boolean))}
          onAdd={handleAddPeople}
          onClose={()=>setShowPeoplePicker(false)}
        />
      )}

    </div>
  );
}

// ─────────────────────────────────────────────
// PEOPLE CHECKLIST — replaces SortableChecklist for "People to Connect With"
// Each entry: { id, personId, name(fallback), days:[], note }
// ─────────────────────────────────────────────
function PeopleChecklist({ items, weekDays, onUpdate, onDelete, onReorder, directory, onRenameDirectory }) {
  const [dragId, setDragId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);
  const [expandedIds, setExpandedIds] = useState({});
  const [confirmId, setConfirmId] = useState(null);

  function getPersonName(item) {
    if (item.personId && directory) {
      const dir = directory.find(p => p.id === item.personId);
      if (dir) return dir.name;
    }
    return item.name || '';
  }

  function isDone(item) {
    return Array.isArray(item.days) ? item.days.length > 0 : !!item.done;
  }

  function getDays(item) {
    return Array.isArray(item.days) ? item.days : [];
  }

  function handleCheckToggle(item) {
    // Checked → clear all days. Unchecked → add today's day index.
    if (isDone(item)) {
      onUpdate(item.id, { days: [], done: false });
    } else {
      const todayIdx = new Date().getDay();
      onUpdate(item.id, { days: [todayIdx], done: true });
    }
  }

  function toggleDay(item, dayIdx) {
    const days = getDays(item);
    const next = days.includes(dayIdx)
      ? days.filter(d => d !== dayIdx)
      : [...days, dayIdx].sort((a,b) => a-b);
    onUpdate(item.id, { days: next, done: next.length > 0 });
  }

  function handleDelete(e, id) {
    e.stopPropagation();
    if (confirmId === id) { onDelete(id); setConfirmId(null); }
    else setConfirmId(id);
  }

  if (!items || items.length === 0) return null;

  return (
    <div>
      {items.map(item => {
        const done = isDone(item);
        const days = getDays(item);
        const isExpanded = !!expandedIds[item.id];
        const confirming = confirmId === item.id;
        const name = getPersonName(item);
        return (
          <div key={item.id}
            className={`checklist-item ${done?'checked':''} ${dragOverId===item.id?'drag-over':''} ${dragId===item.id?'dragging':''}`}
            style={{flexDirection:'column', alignItems:'stretch', padding:0, gap:0, marginBottom:2}}
            draggable
            onDragStart={e=>{ setDragId(item.id); e.dataTransfer.effectAllowed='move'; }}
            onDragOver={e=>{ e.preventDefault(); if(item.id!==dragId) setDragOverId(item.id); }}
            onDrop={e=>{ e.preventDefault(); if(dragId&&dragId!==item.id) onReorder(dragId,item.id); setDragId(null); setDragOverId(null); }}
            onDragEnd={()=>{ setDragId(null); setDragOverId(null); }}
            onMouseLeave={()=>setConfirmId(null)}>
            {/* Main row */}
            <div style={{display:'flex', alignItems:'center', gap:6, padding:'5px 6px'}}>
              <span className="checklist-drag-handle" style={{opacity:0.4, marginTop:0}}>⣿</span>
              <div className={`check-box ${done?'checked':''}`}
                onClick={()=>handleCheckToggle(item)} />
              <span style={{
                flex:1, fontSize:12.5, fontFamily:"'DM Sans',sans-serif",
                color: done ? 'var(--ink-faint)' : 'var(--ink)',
                textDecoration: done ? 'line-through' : 'none',
                minWidth:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
              }}>
                {name || <span style={{color:'var(--ink-faint)',fontStyle:'italic'}}>Unnamed</span>}
              </span>
              {days.length > 0 && (
                <span title="Days connected this week"
                  style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:'var(--accent)',flexShrink:0,fontWeight:700}}>
                  {days.length}×
                </span>
              )}
              <button
                style={{background:'none',border:'none',cursor:'pointer',fontSize:10,color:'var(--ink-faint)',padding:'0 2px',flexShrink:0,lineHeight:1}}
                onClick={e=>{e.stopPropagation();setExpandedIds(ex=>({...ex,[item.id]:!ex[item.id]}));}}>
                {isExpanded ? '▲' : '▼'}
              </button>
              <button className="delete-item-btn"
                style={{opacity:confirming?1:undefined,color:confirming?'var(--red)':undefined,fontSize:confirming?11:14}}
                onClick={e=>handleDelete(e,item.id)}>
                {confirming ? 'Delete?' : '✕'}
              </button>
            </div>
            {/* Expanded: name edit + day-dots + note */}
            {isExpanded && (
              <div style={{padding:'5px 10px 9px', borderTop:'1px solid var(--border)'}}
                onClick={e=>e.stopPropagation()}>
                {onRenameDirectory && item.personId && (
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:9,color:'var(--ink-faint)',fontFamily:"'DM Mono',monospace",marginBottom:3,textTransform:'uppercase',letterSpacing:'0.05em'}}>Name:</div>
                    <input
                      style={{width:'100%',fontSize:12.5,fontFamily:"'DM Sans',sans-serif",
                        border:'1px solid var(--border)',borderRadius:4,padding:'3px 7px',
                        outline:'none',background:'white',color:'var(--ink)',boxSizing:'border-box'}}
                      value={name}
                      onChange={e=>onRenameDirectory(item.personId, e.target.value)}
                      onClick={e=>e.stopPropagation()}
                    />
                  </div>
                )}
                <div style={{fontSize:9,color:'var(--ink-faint)',fontFamily:"'DM Mono',monospace",marginBottom:5,textTransform:'uppercase',letterSpacing:'0.05em'}}>Days connected:</div>
                <div style={{display:'flex',gap:3,marginBottom:8}}>
                  {['S','M','T','W','T','F','S'].map((d,i) => {
                    const active = days.includes(i);
                    return (
                      <button key={i}
                        className={`task-repeat-day-btn ${active?'active':''}`}
                        style={{width:22,height:22,fontSize:9}}
                        onClick={()=>toggleDay(item, i)}>
                        {d}
                      </button>
                    );
                  })}
                </div>
                <div style={{fontSize:9,color:'var(--ink-faint)',fontFamily:"'DM Mono',monospace",marginBottom:3,textTransform:'uppercase',letterSpacing:'0.05em'}}>Note:</div>
                <textarea rows={2}
                  style={{width:'100%',fontSize:12,fontFamily:"'DM Sans',sans-serif",
                    border:'1px solid var(--border)',borderRadius:4,padding:'4px 6px',
                    resize:'vertical',outline:'none',background:'white',color:'var(--ink)',boxSizing:'border-box'}}
                  placeholder="How did you connect?"
                  value={item.note||''}
                  onChange={e=>onUpdate(item.id,{note:e.target.value})}
                />
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─────────────────────────────────────────────
// PEOPLE PICKER — modal for adding people to the week
// ─────────────────────────────────────────────
function PeoplePicker({ directory, existingPersonIds, onAdd, onClose }) {
  const [search, setSearch] = useState('');
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [newName, setNewName] = useState('');
  const searchRef = useRef();

  useEffect(() => { setTimeout(() => searchRef.current?.focus(), 50); }, []);

  const available = (directory || []).filter(p =>
    !existingPersonIds.has(p.id) &&
    p.name.toLowerCase().includes(search.toLowerCase())
  );

  function toggleSelect(id) {
    setSelectedIds(s => {
      const next = new Set(s);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }

  function handleAdd() {
    const newNames = newName.trim()
      ? newName.split(',').map(n => n.trim()).filter(Boolean)
      : [];
    if (selectedIds.size === 0 && newNames.length === 0) return;
    onAdd(Array.from(selectedIds), newNames);
  }

  const hasSelection = selectedIds.size > 0 || newName.trim().length > 0;

    <div className="people-picker-overlay" onClick={onClose}>
      <div className="people-picker-modal" onClick={e=>e.stopPropagation()}>

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'14px 16px 10px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
          <span style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:14,color:'var(--ink)'}}>Add People</span>
          <button onClick={onClose}
            style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'var(--ink-faint)',lineHeight:1,padding:'0 2px'}}>✕</button>
        </div>
        {/* Search existing */}
        <div style={{padding:'8px 12px 4px',flexShrink:0}}>
          <input ref={searchRef}
            value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search previous people…"
            style={{width:'100%',fontSize:12,fontFamily:"'DM Sans',sans-serif",
              border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',
              padding:'5px 9px',outline:'none',background:'white',color:'var(--ink)',boxSizing:'border-box'}}
          />
        </div>
        {/* Directory list */}
        <div style={{flex:1,overflowY:'auto',padding:'4px 8px'}}>
          {directory.length > 0 && available.length === 0 && (
            <div style={{fontSize:12,color:'var(--ink-faint)',fontStyle:'italic',padding:'8px 4px'}}>No matches</div>
          )}
          {directory.length === 0 && (
            <div style={{fontSize:12,color:'var(--ink-faint)',fontStyle:'italic',padding:'8px 4px'}}>No previous people yet — add new below</div>
          )}
          {available.map(p => (
            <div key={p.id}
              style={{display:'flex',alignItems:'center',gap:8,padding:'6px 6px',borderRadius:6,cursor:'pointer',transition:'background 0.1s'}}
              onClick={()=>toggleSelect(p.id)}
              onMouseEnter={e=>e.currentTarget.style.background='var(--cream)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{
                width:15,height:15,border:'1.5px solid',flexShrink:0,borderRadius:3,
                borderColor: selectedIds.has(p.id) ? 'var(--accent)' : 'var(--border)',
                background: selectedIds.has(p.id) ? 'var(--accent)' : 'white',
                display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.12s',
              }}>
                {selectedIds.has(p.id) && <span style={{color:'white',fontSize:9,lineHeight:1}}>✓</span>}
              </div>
              <span style={{fontSize:13,fontFamily:"'DM Sans',sans-serif",color:'var(--ink)'}}>{p.name}</span>
            </div>
          ))}
        </div>
        {/* New person input */}
        <div style={{padding:'8px 12px 6px',borderTop:'1px solid var(--border)',flexShrink:0}}>
          <div style={{fontSize:9,color:'var(--ink-faint)',fontFamily:"'DM Mono',monospace",marginBottom:4,textTransform:'uppercase',letterSpacing:'0.05em'}}>+ New person:</div>
          <input value={newName} onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter' && hasSelection) handleAdd(); if(e.key==='Escape') onClose(); }}
            placeholder="Name (comma-separate for multiple)"
            style={{width:'100%',fontSize:12,fontFamily:"'DM Sans',sans-serif",
              border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',
              padding:'5px 9px',outline:'none',background:'white',color:'var(--ink)',boxSizing:'border-box'}}
          />
        </div>
        {/* Footer */}
        <div style={{padding:'6px 12px 12px',display:'flex',gap:8,justifyContent:'flex-end',flexShrink:0}}>
          <button onClick={onClose}
            style={{background:'none',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',
              padding:'5px 14px',cursor:'pointer',fontSize:12,fontFamily:"'DM Sans',sans-serif",color:'var(--ink-light)'}}>
            Cancel
          </button>
          <button onClick={handleAdd} disabled={!hasSelection}
            style={{
              background: hasSelection ? 'var(--accent)' : 'var(--border)',
              border:'none', borderRadius:'var(--radius-sm)', padding:'5px 16px',
              cursor: hasSelection ? 'pointer' : 'default', fontSize:12, fontWeight:600,
              fontFamily:"'DM Sans',sans-serif",
              color: hasSelection ? 'white' : 'var(--ink-faint)', transition:'all 0.15s',
            }}>
            Add{selectedIds.size > 0 ? ` (${selectedIds.size})` : ''}
          </button>
        </div>
      </div>
    </div>
  );
}
function DayNote({ dayKey, note, onChange }) {
  const [expanded, setExpanded] = useState(!!note);
  const taRef = useRef();

  // Auto-expand if note has content
  useEffect(() => { if (note && !expanded) setExpanded(true); }, [note]);

  function handleToggle() {
    setExpanded(e => {
      if (!e && taRef.current) setTimeout(()=>taRef.current?.focus(), 50);
      return !e;
    });
  }

  return (
    <div className="day-note-wrap">
      <div className="day-note-label" onClick={handleToggle}>
        <span>{expanded ? '▾' : '▸'}</span>
        <span>Notes</span>
        {!expanded && note && <span style={{color:'var(--accent)',fontSize:8}}>●</span>}
      </div>
      {expanded && (
        <textarea ref={taRef} className="day-note-textarea"
          placeholder="Notes for the day…"
          value={note}
          rows={2}
          onChange={e => {
            onChange(e.target.value);
            e.target.style.height = 'auto';
            e.target.style.height = e.target.scrollHeight + 'px';
          }}
          onFocus={e => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }}
          onClick={e => e.stopPropagation()}
        />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// DAILY HABITS SECTION (shown in WeeklyPlanner day columns)
// ─────────────────────────────────────────────
function DailyHabitsSection({ dayKey, habitGoals, habitCompletions, setHabitCompletions, habitQty, setHabitQty, habitNotes, setHabitNotes }) {
  const dailyHabits = (habitGoals || []).filter(g => g.schedule === 'daily');
  const [collapsed, setCollapsed] = React.useState(true);
  const [expandedIds, setExpandedIds] = React.useState({});

  if (dailyHabits.length === 0) return null;

  function toggleHabit(goalId) {
    setHabitCompletions(c => {
      const arr = c[dayKey] || [];
      const has = arr.includes(goalId);
      return { ...c, [dayKey]: has ? arr.filter(x => x !== goalId) : [...arr, goalId] };
    });
  }
  function getQty(goalId) { return (habitQty[dayKey] || {})[goalId] || ''; }
  function setQtyVal(goalId, val) {
    setHabitQty(q => ({ ...q, [dayKey]: { ...(q[dayKey] || {}), [goalId]: val } }));
  }
  function getNoteVal(goalId) { return (habitNotes[dayKey] || {})[goalId] || ''; }
  function setNoteVal(goalId, val) {
    setHabitNotes(n => ({ ...n, [dayKey]: { ...(n[dayKey] || {}), [goalId]: val } }));
  }

  const completedCount = dailyHabits.filter(g => (habitCompletions[dayKey] || []).includes(g.id)).length;

  return (
    <div className="habit-task-section">
      <div className="habit-task-label" onClick={() => setCollapsed(c => !c)}>
        <span style={{fontSize:8}}>{collapsed ? '▸' : '▾'}</span>
        <span>Habits</span>
        <span style={{marginLeft:'auto', fontSize:9, fontWeight:700, opacity:0.8}}>
          {completedCount}/{dailyHabits.length}
        </span>
      </div>
      {!collapsed && dailyHabits.map(g => {
        const done = (habitCompletions[dayKey] || []).includes(g.id);
        const isExpanded = !!expandedIds[g.id];
        return (
          <div key={g.id} className="habit-task-row" style={{borderLeft:`3px solid ${g.color}`}}>
            <div style={{display:'flex', alignItems:'center', gap:5, padding:'4px 6px'}}>
              <div className="habit-task-check"
                style={{background: done ? g.color : 'transparent', borderColor: g.color}}
                onClick={e => { e.stopPropagation(); toggleHabit(g.id); }}>
                {done && <span style={{color:'white', fontSize:9, lineHeight:1}}>✓</span>}
              </div>
              <span style={{flex:1, fontSize:11.5, fontFamily:"'DM Sans',sans-serif", fontWeight:500,
                color: done ? g.color : 'var(--ink)', textDecoration: done ? 'line-through' : 'none',
                opacity: done ? 0.7 : 1}}>
                {g.name}
              </span>
              <button
                style={{background:'none',border:'none',cursor:'pointer',fontSize:9,color:'var(--ink-faint)',padding:'0 2px',flexShrink:0,lineHeight:1}}
                onClick={e => { e.stopPropagation(); setExpandedIds(ex => ({...ex, [g.id]: !ex[g.id]})); }}>
                {isExpanded ? '▲' : '▼'}
              </button>
            </div>
            {isExpanded && (
              <div style={{padding:'3px 10px 7px', display:'flex', flexDirection:'column', gap:5, borderTop:'1px solid var(--border)'}}
                onClick={e => e.stopPropagation()}>
                <div style={{display:'flex', alignItems:'center', gap:6}}>
                  <span style={{fontSize:9, color:'var(--ink-faint)', fontFamily:"'DM Mono',monospace", flexShrink:0}}>Qty:</span>
                  <input type="number" min="0" step="1" inputMode="numeric"
                    value={getQty(g.id)}
                    onChange={e => setQtyVal(g.id, e.target.value)}
                    placeholder="—"
                    style={{width:60, fontSize:11, fontFamily:"'DM Mono',monospace",
                      border:'1px solid var(--border)', borderRadius:3, padding:'2px 4px',
                      background:'white', color:'var(--ink)', outline:'none'}}
                  />
                </div>
                <div style={{display:'flex', flexDirection:'column', gap:2}}>
                  <span style={{fontSize:9, color:'var(--ink-faint)', fontFamily:"'DM Mono',monospace"}}>Notes:</span>
                  <textarea rows={2}
                    style={{width:'100%', fontSize:11, fontFamily:"'DM Sans',sans-serif",
                      border:'1px solid var(--border)', borderRadius:3, padding:'3px 5px',
                      resize:'vertical', outline:'none', background:'white', color:'var(--ink)',
                      boxSizing:'border-box'}}
                    placeholder="Notes for today…"
                    value={getNoteVal(g.id)}
                    onChange={e => setNoteVal(g.id, e.target.value)}
                  />
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

const TASK_COLORS = [
  '#d4edda', // sage green
  '#f8d7da', // blush pink
  '#fff3cd', // warm yellow
  '#cce5ff', // sky blue
  '#e2d9f3', // soft lavender
  '#fde8d0', // peach
  '#c9f0f7', // mint
  '#fce4ec', // rose
  '#dbeafe', // periwinkle
  '#fef9c3', // lemon
  '#ffe4cc', // apricot
  '#e0f2fe', // powder blue
];
const EVENT_COLORS = [
  '#fce7f3', // soft pink
  '#ede9fe', // lilac
  '#dbeafe', // cornflower
  '#d1fae5', // seafoam
  '#fef3c7', // champagne
  '#ffedd5', // cantaloupe
  '#f0fdf4', // pale mint
  '#fdf4ff', // whisper purple
  '#e0f2fe', // ice blue

  '#ecfdf5', // aqua mist
