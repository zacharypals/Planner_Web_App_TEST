                        onKeyDown={e=>{ if(e.key==='Enter'||e.key==='Escape') setEditId(null); }}
                        style={{flex:1,fontSize:12,fontFamily:"'DM Sans',sans-serif",border:'1px solid var(--accent)',
                          borderRadius:4,padding:'3px 6px',outline:'none',background:'white',color:'var(--ink)'}}
                      />
                      <select value={ex.category||'Other'} onChange={e=>onUpdate(ex.id,{category:e.target.value})}
                        style={{fontSize:11,border:'1px solid var(--border)',borderRadius:4,padding:'3px 5px',
                          background:'white',color:'var(--ink)',outline:'none'}}>
                        {FITNESS_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
                      </select>
                    </>
                  ) : (
                    <>
                      <span style={{flex:1,fontSize:12,fontFamily:"'DM Sans',sans-serif",color:'var(--ink)'}}>{ex.name}</span>
                      <button onClick={()=>setEditId(ex.id)}
                        style={{background:'none',border:'none',cursor:'pointer',fontSize:12,color:'var(--ink-faint)',padding:'0 3px'}}>✏️</button>
                      <button onClick={()=>{ if(confirmId===ex.id){onDelete(ex.id);setConfirmId(null);}else setConfirmId(ex.id); }}
                        onMouseLeave={()=>setConfirmId(null)}
                        style={{background:confirmId===ex.id?'var(--red)':'none',color:confirmId===ex.id?'white':'var(--ink-faint)',
                          border:'none',cursor:'pointer',fontSize:confirmId===ex.id?10:13,
                          borderRadius:confirmId===ex.id?4:0,padding:confirmId===ex.id?'2px 5px':'0 2px',
                          fontFamily:"'DM Sans',sans-serif"}}>
                        {confirmId===ex.id?'Delete?':'✕'}
                      </button>
                    </>
                  )}
                </div>
              ))}
            </div>
          ))}
        </div>
        {/* Add new */}
        <div style={{padding:'8px 12px 12px',borderTop:'1px solid var(--border)',flexShrink:0}}>
          <div style={{fontSize:9,color:'var(--ink-faint)',fontFamily:"'DM Mono',monospace",marginBottom:4,textTransform:'uppercase',letterSpacing:'0.05em'}}>Add exercise:</div>
          <div style={{display:'flex',gap:6}}>
            <input value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>{ if(e.key==='Enter'&&newName.trim()){onAdd(newName.trim(),newCat);setNewName('');} }}
              placeholder="Name"
              style={{flex:1,fontSize:12,fontFamily:"'DM Sans',sans-serif",border:'1px solid var(--border)',
                borderRadius:'var(--radius-sm)',padding:'5px 8px',outline:'none',background:'white',color:'var(--ink)',boxSizing:'border-box'}}
            />
            <select value={newCat} onChange={e=>setNewCat(e.target.value)}
              style={{fontSize:11,border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',
                padding:'4px 6px',background:'white',color:'var(--ink)',outline:'none'}}>
              {FITNESS_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <button onClick={()=>{ if(newName.trim()){onAdd(newName.trim(),newCat);setNewName('');} }}
              disabled={!newName.trim()}
              style={{background:newName.trim()?'var(--accent)':'var(--border)',border:'none',
                borderRadius:'var(--radius-sm)',padding:'5px 12px',cursor:newName.trim()?'pointer':'default',
                fontSize:12,fontWeight:600,color:newName.trim()?'white':'var(--ink-faint)'}}>
              Add
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// PAGES VIEW
// ─────────────────────────────────────────────
function PagesView({ pagesData, setPagesData, foldersData, setFoldersData, weekData, setWeekData, selectedId, setSelectedId }) {
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [mobileView, setMobileView] = useState(() => selectedId ? 'editor' : 'list');
  const bodyRef = useRef(null);
  const titleRef = useRef(null);
  const debounceRef = useRef(null);
  const [wordCount, setWordCount] = useState(0);
  const [showNewMenu, setShowNewMenu] = useState(null); // null=closed, 'top'=top-level, folderId=folder menu

  const [editingFolderName, setEditingFolderName] = useState('');
  const [recentCollapsed, setRecentCollapsed] = useState(false);
  // Drag state — use ref for dragItem so it's always fresh in event handlers
  const dragItemRef = useRef(null); // {type:'doc'|'folder', id}
  const [swipeDeleteId, setSwipeDeleteId] = useState(null); // folder id being swiped to delete
  const swipeTouchStart = useRef(null); // {x, y} of touch start
  const longPressTimer = useRef(null); // timer for long-press rename
  const [dragOverId, setDragOverId] = useState(null);
  const [folderHoverTarget, setFolderHoverTarget] = useState(null);
  const folderHoverTimer = useRef(null);

  function countWords(text) {
    return text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
  }

  const selectedDoc = pagesData.find(d => d.id === selectedId) || null;

  // ── Folder helpers ───────────────────────────────────────
  function createFolder(parentFolderId) {
    const id = 'folder_' + Date.now();
    const siblings = foldersData.filter(f => (f.parentFolderId || null) === (parentFolderId || null));
    const maxOrder = siblings.reduce((m, f) => Math.max(m, f.order ?? 0), -1);
    setFoldersData(f => [...f, { id, name: 'New Folder', parentFolderId: parentFolderId || null, order: maxOrder + 1 }]);
    setExpandedFolders(e => ({...e, [id]: true, ...(parentFolderId ? {[parentFolderId]: true} : {})}));
    setEditingFolderId(id);
    setEditingFolderName('New Folder');
    setShowNewMenu(null);
  }

  function updateFolder(id, patch) {
    setFoldersData(f => f.map(folder => folder.id === id ? {...folder, ...patch} : folder));
  }

  function deleteFolder(id) {
    const folder = foldersData.find(f => f.id === id);
    if (!folder) return;
    const parentId = folder.parentFolderId || null;
    if (!window.confirm('Delete folder? Contents will move to the parent level.')) return;
    // Move docs inside this folder up to parent
    setPagesData(p => p.map(d => d.folderId === id ? {...d, folderId: parentId} : d));
    // Move child folders up to parent, then remove this folder
    setFoldersData(f => f
      .map(f2 => f2.parentFolderId === id ? {...f2, parentFolderId: parentId} : f2)
      .filter(f2 => f2.id !== id)
    );
  }

  // ── Doc helpers ──────────────────────────────────────────
  function createDoc(folderId) {
    const id = 'doc_' + Date.now();
    const now = new Date().toISOString();
    const siblings = pagesData.filter(d => (d.folderId || null) === (folderId || null));
    const maxOrder = siblings.reduce((m, d) => Math.max(m, d.order ?? 0), -1);
    const newDoc = { id, title: '', body: '', createdAt: now, lastModified: now, folderId: folderId || null, order: maxOrder + 1, tasks: [] };
    setPagesData(p => [...p, newDoc]);
    setSelectedId(id);
    setMobileView('editor');
    if (folderId) setExpandedFolders(e => ({...e, [folderId]: true}));
    setShowNewMenu(null);
    setTimeout(() => titleRef.current?.focus(), 50);
  }

  function updateDoc(id, patch) {
    const now = new Date().toISOString();
    setPagesData(p => p.map(d => d.id === id ? { ...d, ...patch, lastModified: now } : d));
  }

  function deleteDoc(id) {
    if (!window.confirm('Delete this document?')) return;
    const doc = pagesData.find(d => d.id === id);
    if (doc) {
      (doc.tasks || []).filter(t => t.scheduledDate).forEach(t => removeTaskFromWeek(t.id, t.scheduledDate));
    }
    setPagesData(p => p.filter(d => d.id !== id));
    if (selectedId === id) { setSelectedId(null); setMobileView('list'); }
  }

  function addTask(docId) {
    const taskId = 'ptask_' + Date.now();
    const newTask = { id: taskId, title: '', done: false, scheduledDate: '', colorIndex: 0 };
    setPagesData(p => p.map(d => d.id === docId
      ? { ...d, lastModified: new Date().toISOString(), tasks: [...(d.tasks||[]), newTask] }
      : d
    ));
  }

  function updateTask(docId, taskId, patch) {
    const now = new Date().toISOString();
    setPagesData(p => p.map(d => {
      if (d.id !== docId) return d;
      const oldTask = (d.tasks||[]).find(t => t.id === taskId);
      const updatedTask = { ...oldTask, ...patch };
      if (patch.scheduledDate !== undefined) {
        const oldDate = oldTask?.scheduledDate;
        const newDate = patch.scheduledDate;
        if (oldDate && oldDate !== newDate) removeTaskFromWeek(taskId, oldDate);
        if (newDate) scheduleTaskToWeek({...updatedTask, projectDocId: d.id}, d.title || 'Untitled', newDate);
      } else if (oldTask?.scheduledDate) {
        scheduleTaskToWeek({...updatedTask, projectDocId: d.id}, d.title || 'Untitled', oldTask.scheduledDate);
      }
      return { ...d, lastModified: now, tasks: (d.tasks||[]).map(t => t.id === taskId ? updatedTask : t) };
    }));
  }

  function deleteTask(docId, taskId) {
    const doc = pagesData.find(d => d.id === docId);
    const task = doc?.tasks?.find(t => t.id === taskId);
    if (task?.scheduledDate) removeTaskFromWeek(taskId, task.scheduledDate);
    setPagesData(p => p.map(d => d.id === docId
      ? { ...d, tasks: (d.tasks||[]).filter(t => t.id !== taskId) }
      : d
    ));
  }

  function scheduleTaskToWeek(task, docTitle, dateStr) {
    const dateObj = new Date(dateStr + 'T00:00:00');
    const weekKey = fmt(getWeekStart(dateObj));
    setWeekData(wd => {
      const wk = wd[weekKey] || { proverb:'',toCreate:[],weekGoals:[],people:[],beWord:'',proud:'',story:'',tasks:{} };
      const dayTasks = (wk.tasks||{})[dateStr] || [];
      const existing = dayTasks.find(t => t.id === task.id) || {};
      const filtered = dayTasks.filter(t => t.id !== task.id);
      const newEntry = {
        ...existing, id: task.id, title: task.title, done: task.done,
        details: task.details || '', priority: task.priority || false,
        colorIndex: task.colorIndex || 0, isProjectTask: true,
        projectDocId: task.id && task.projectDocId ? task.projectDocId : (task.id || ''),
        projectTitle: docTitle,
      };
      return { ...wd, [weekKey]: { ...wk, tasks: { ...(wk.tasks||{}), [dateStr]: [...filtered, newEntry] } } };
    });
  }

  function removeTaskFromWeek(taskId, dateStr) {
    const dateObj = new Date(dateStr + 'T00:00:00');
    const weekKey = fmt(getWeekStart(dateObj));
    setWeekData(wd => {
      if (!(wd[weekKey]?.tasks?.[dateStr])) return wd;
      return { ...wd, [weekKey]: { ...wd[weekKey], tasks: { ...wd[weekKey].tasks,
        [dateStr]: wd[weekKey].tasks[dateStr].filter(t => t.id !== taskId)
      }}};
    });
  }

  function exec(cmd, val) {
    bodyRef.current?.focus();
    document.execCommand(cmd, false, val || null);
  }

  // ── Checklist helpers ────────────────────────────────────────────────────
  // Helper: get the closest pages-chk-li ancestor of the current selection
  function getChkLi(sel) {
    if (!sel || sel.rangeCount === 0) return null;
    const node = sel.getRangeAt(0).startContainer;
    const el = node.nodeType === 3 ? node.parentElement : node;
    return el ? el.closest('li.pages-chk-li') : null;
  }

  // Build a fresh checklist li with a native checkbox
  function makeChkLi() {
    const li = document.createElement('li');
    li.className = 'pages-chk-li';
    li.setAttribute('data-checked', 'false');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'pages-chk-input';
    cb.setAttribute('contenteditable', 'false');
    cb.addEventListener('change', () => {
      li.setAttribute('data-checked', String(cb.checked));
      if (cb.checked) li.classList.add('checked'); else li.classList.remove('checked');
      setTimeout(() => onBodyInput(), 0);
    });
    li.appendChild(cb);
    li.appendChild(document.createTextNode(' '));
    return li;
  }

  function insertChecklistItem() {
    bodyRef.current?.focus();
    const sel = window.getSelection();
    if (getChkLi(sel)) {
      handleEnterInChecklist(getChkLi(sel), sel);
      return;
    }
    const ul = document.createElement('ul');
    ul.className = 'pages-checklist';
    const li = makeChkLi();
    ul.appendChild(li);
    // Use a marker span to inject at cursor position
    const markerId = 'chk_m_' + Date.now();
    document.execCommand('insertHTML', false, '<span id="' + markerId + '"></span>');
    const markerEl = bodyRef.current?.querySelector('#' + markerId);
    if (markerEl) {
      markerEl.parentNode.insertBefore(ul, markerEl);
      markerEl.remove();
    } else {
      bodyRef.current?.appendChild(ul);
    }
    // Cursor goes to the text node after the checkbox
    const textNode = li.lastChild;
    const r = document.createRange();
    r.setStart(textNode, 0);
    r.collapse(true);
    sel.removeAllRanges();
    sel.addRange(r);
    onBodyInput();
  }

  function handleEnterInChecklist(li, sel) {
    const textContent = Array.from(li.childNodes)
      .filter(n => n.nodeType === 3).map(n => n.textContent)
      .join('').replace(/ /g, '').replace(/ /g, '').trim();
    if (textContent === '') {
      // Empty item — exit the checklist
      // Walk up to find the topmost ul in case we're nested after an outdent
      let ul = li.parentNode;
      while (ul && ul.tagName === 'UL') {
        const parent = ul.parentNode;
        if (!parent || parent === bodyRef.current || parent.tagName !== 'UL') break;
        ul = parent;
      }
      const insertAfter = (ul && ul !== li) ? ul : li;
      const p = document.createElement('p');
      p.appendChild(document.createTextNode(' '));
      insertAfter.parentNode.insertBefore(p, insertAfter.nextSibling);
      li.remove();
      if (ul && ul !== li && ul.children.length === 0) ul.remove();
      const r = document.createRange();
      r.setStart(p.firstChild, 0);
      r.collapse(true);
      sel.removeAllRanges();
      sel.addRange(r);
    } else {
      // Split the li at cursor: text after cursor moves to new li
      const range = sel.getRangeAt(0);
      const afterRange = document.createRange();
      afterRange.setStart(range.startContainer, range.startOffset);
      afterRange.setEnd(li, li.childNodes.length);
      const afterFragment = afterRange.extractContents();
      // Collect only text (strip any checkbox inputs swept up by extractContents)
      let afterText = '';
      const tw = document.createTreeWalker(afterFragment, NodeFilter.SHOW_TEXT, null);
      while (tw.nextNode()) afterText += tw.currentNode.textContent;

      const newLi = makeChkLi();
      if (newLi.lastChild && newLi.lastChild.nodeType === 3) {
        newLi.lastChild.textContent = afterText;
      } else {
        newLi.appendChild(document.createTextNode(afterText));
      }
      li.parentNode.insertBefore(newLi, li.nextSibling);
      const textNode = newLi.lastChild;
      const r = document.createRange();
      r.setStart(textNode, 0);
      r.collapse(true);
      sel.removeAllRanges();
      sel.addRange(r);
    }
    setTimeout(() => onBodyInput(), 0);
  }

  function handleBodyKeyDown(e) {
    const sel = window.getSelection();

    // Space shortcut: "- " at start of line → bullet list, "1. " → numbered list
    // Works even if there's text after the cursor — that text becomes the list item content
    if (e.key === ' ' && sel && sel.rangeCount > 0 && bodyRef.current) {
      const range = sel.getRangeAt(0);
      const node = range.startContainer;
      const block = node.nodeType === 3 ? node.parentElement : node;
      const blockEl = block?.closest('p,div,h1,h2,h3') || block;
      if (blockEl && !blockEl.closest('ul,ol,blockquote') && bodyRef.current.contains(blockEl)) {
        // Get text from the very start of the block up to the cursor
        const preRange = document.createRange();
        preRange.setStart(blockEl, 0);
        preRange.setEnd(range.startContainer, range.startOffset);
        const textBeforeCursor = preRange.toString();

        let listCmd = null;
        if (textBeforeCursor === '-') listCmd = 'insertUnorderedList';
        else if (textBeforeCursor === '1.') listCmd = 'insertOrderedList';

        if (listCmd) {
          e.preventDefault();
          // Select just the prefix ("-" or "1.") and delete it, leaving rest of text intact
          sel.removeAllRanges();
          sel.addRange(preRange);
          document.execCommand('delete');
          // Now convert the block (with remaining text) into a list item
          document.execCommand(listCmd);
          setTimeout(() => onBodyInput(), 0);
          return;
        }
      }
    }

    // Tab in regular ul/ol list items — indent/outdent regardless of checklist
    if (e.key === 'Tab' && sel && sel.rangeCount > 0) {
      const node = sel.getRangeAt(0).startContainer;
      const el = node.nodeType === 3 ? node.parentElement : node;
      const regularLi = el?.closest('li:not(.pages-chk-li)');
      if (regularLi) {
        e.preventDefault();
        document.execCommand(e.shiftKey ? 'outdent' : 'indent');
        setTimeout(() => onBodyInput(), 0);
        return;
      }
    }

    const li = getChkLi(sel);
    if (!li) return;
    if (e.key === 'Enter') {
      e.preventDefault();
      handleEnterInChecklist(li, sel);
    } else if (e.key === 'Tab') {
      e.preventDefault();
      if (e.shiftKey) {
        document.execCommand('outdent');
      } else {
        document.execCommand('indent');
      }
      // After indent/outdent the browser may recreate the <li> without our class.
      // Re-apply it so getChkLi() keeps working for subsequent Enter/Tab/Backspace.
      requestAnimationFrame(() => {
        const s = window.getSelection();
        if (s && s.rangeCount > 0) {
          const node = s.getRangeAt(0).startContainer;
          const el = node.nodeType === 3 ? node.parentElement : node;
          const currentLi = el?.closest('li');
          if (currentLi && !currentLi.classList.contains('pages-chk-li')) {
            currentLi.classList.add('pages-chk-li');
            currentLi.setAttribute('data-checked', 'false');
          }
        }
        onBodyInput();
      });
    } else if (e.key === 'Backspace') {
      const textContent = Array.from(li.childNodes)
        .filter(n => n.nodeType === 3).map(n => n.textContent)
        .join('').replace(/ /g, '').trim();
      if (textContent === '') {
        e.preventDefault();
        const ul = li.closest('ul.pages-checklist');
        const prev = li.previousElementSibling || (ul ? ul.previousSibling : null);
        li.remove();
        if (ul && ul.children.length === 0) ul.remove();
        if (prev) {
          const r = document.createRange();
          r.selectNodeContents(prev);
          r.collapse(false);
          sel.removeAllRanges();
          sel.addRange(r);
        }
        setTimeout(() => onBodyInput(), 0);
      }
    }
  }

  function onBodyInput() {
    // Markdown shortcut: "- " at start of a block → bullet list
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0 && bodyRef.current) {
      const range = sel.getRangeAt(0);
      const node = range.startContainer;
      const block = node.nodeType === 3 ? node.parentElement : node;
      const blockEl = block?.closest('p,div,li') || block;
      // Only apply in plain paragraphs/divs, not already inside a list
      if (blockEl && !blockEl.closest('ul,ol')) {
        const text = blockEl.textContent || '';
        if (text === '- ' || text === ' - ' || text.match(/^- $/)) {
          // Clear the block content first
          blockEl.textContent = '';
          bodyRef.current.focus();
          document.execCommand('insertUnorderedList');
          // Don't let the debounce save stale HTML
          setTimeout(() => { if (bodyRef.current && selectedId) updateDoc(selectedId, { body: bodyRef.current.innerHTML }); }, 0);
          return;
        }
      }
    }
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      if (bodyRef.current && selectedId) {
        updateDoc(selectedId, { body: bodyRef.current.innerHTML });
      }
    }, 800);
  }

  useEffect(() => {
    if (bodyRef.current && selectedDoc) {
      if (bodyRef.current.innerHTML !== selectedDoc.body) {
        bodyRef.current.innerHTML = selectedDoc.body || '';
      }
      setWordCount(countWords(bodyRef.current.innerText || ''));
    } else {
      setWordCount(0);
    }
  }, [selectedId]);

  const fmtDocDate = (iso) => {
    if (!iso) return '';
    const d = new Date(iso);
    return `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}, ${d.getFullYear()}`;
  };

  // ── Drag and Drop ────────────────────────────────────────
  function clearFolderTimer() {
    if (folderHoverTimer.current) { clearTimeout(folderHoverTimer.current); folderHoverTimer.current = null; }
  }

  function handleDragStartPages(e, type, id) {
    dragItemRef.current = { type, id };
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', id); // required for Firefox
  }

  function handleDragEndPages() {
    dragItemRef.current = null;
    setDragOverId(null);
    setFolderHoverTarget(null);
    clearFolderTimer();
  }

  function handleDragOverPages(e, targetType, targetId) {
    e.preventDefault();
    e.stopPropagation();
    const item = dragItemRef.current;
    if (!item) return;
    setDragOverId(targetId);
    // Folder hover: doc dragged over a folder for 1.5s → move into folder
    if ((item.type === 'doc' || item.type === 'folder') && targetType === 'folder' && item.id !== targetId) {
      if (folderHoverTarget !== targetId) {
        setFolderHoverTarget(targetId);
        clearFolderTimer();
        folderHoverTimer.current = setTimeout(() => {
          if (item.type === 'doc') {
            setPagesData(p => p.map(d => d.id === item.id ? {...d, folderId: targetId} : d));
          } else {
            // Prevent circular nesting: don't nest a folder into its own descendant
            const isDescendant = (checkId, ancestorId) => {
              let f = foldersData.find(x => x.id === checkId);
              while (f) {
                if (f.parentFolderId === ancestorId) return true;
                f = foldersData.find(x => x.id === f.parentFolderId);
              }
              return false;
            };
            if (!isDescendant(targetId, item.id)) {
              setFoldersData(fs => fs.map(f => f.id === item.id ? {...f, parentFolderId: targetId} : f));
            }
          }
          setExpandedFolders(ex => ({...ex, [targetId]: true}));
          setFolderHoverTarget(null);
          setDragOverId(null);
          dragItemRef.current = null;
        }, 1500);
      }
    } else {
      if (folderHoverTarget) { setFolderHoverTarget(null); clearFolderTimer(); }
    }
  }

  function handleDropPages(e, targetType, targetId) {
    e.preventDefault();
    e.stopPropagation();
    clearFolderTimer();
    const item = dragItemRef.current;
    if (!item || item.id === targetId) { handleDragEndPages(); return; }

    if (item.type === 'doc' && targetType === 'doc') {
      // Reorder docs: move dragged doc to position of target doc (same folderId context)
      const dragDoc = pagesData.find(d => d.id === item.id);
      const targetDoc = pagesData.find(d => d.id === targetId);
      if (dragDoc && targetDoc && dragDoc.folderId === targetDoc.folderId) {
        // Get all docs in this context, sorted by order
        const siblings = pagesData
          .filter(d => (d.folderId || null) === (dragDoc.folderId || null))
          .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
        const fromIdx = siblings.findIndex(d => d.id === item.id);
        const toIdx = siblings.findIndex(d => d.id === targetId);
        if (fromIdx !== -1 && toIdx !== -1) {
          const reordered = [...siblings];
          reordered.splice(fromIdx, 1);
          reordered.splice(toIdx, 0, dragDoc);
          // Reassign clean sequential orders
          setPagesData(p => p.map(d => {
            const newIdx = reordered.findIndex(r => r.id === d.id);
            return newIdx !== -1 ? {...d, order: newIdx} : d;
          }));
        }
      }
    } else if (item.type === 'folder' && targetType === 'folder') {
      // Reorder folders
      const sorted = [...foldersData].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
      const fromIdx = sorted.findIndex(f => f.id === item.id);
      const toIdx = sorted.findIndex(f => f.id === targetId);
      if (fromIdx !== -1 && toIdx !== -1) {
        const reordered = [...sorted];
        const [moved] = reordered.splice(fromIdx, 1);
        reordered.splice(toIdx, 0, moved);
        setFoldersData(reordered.map((f, i) => ({...f, order: i})));
      }
    } else if (item.type === 'doc' && targetType === 'folder') {
      // Drop doc onto folder header = move into folder
      setPagesData(p => p.map(d => d.id === item.id ? {...d, folderId: targetId} : d));
      setExpandedFolders(ex => ({...ex, [targetId]: true}));
    } else if (item.type === 'folder' && targetType === 'folder') {
      // Drop folder onto another folder = nest it (if not creating a cycle)
      const isDescendant = (checkId, ancestorId) => {
        let f = foldersData.find(x => x.id === checkId);
        while (f) {
          if (f.parentFolderId === ancestorId) return true;
          f = foldersData.find(x => x.id === f.parentFolderId);
        }
        return false;
      };
      if (!isDescendant(targetId, item.id)) {
        setFoldersData(fs => fs.map(f => f.id === item.id ? {...f, parentFolderId: targetId} : f));
        setExpandedFolders(ex => ({...ex, [targetId]: true}));
      }
    }
    handleDragEndPages();
  }

  // ── Computed lists ───────────────────────────────────────
  const recentDocs = [...pagesData]
    .sort((a, b) => new Date(b.lastModified || b.createdAt) - new Date(a.lastModified || a.createdAt))
    .slice(0, 6);

  const sortedFolders = [...foldersData]
    .filter(f => !f.parentFolderId)
    .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
  const unfolderedDocs = pagesData
    .filter(d => !d.folderId)
    .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));

  // ── Reusable inline renderers (not components — avoids hook-in-function issues) ──
  function renderDocRow(doc, depth) {
    depth = depth || 0;
    const isAct = selectedId === doc.id;
    const isOver = dragOverId === doc.id;
    const indentPx = depth > 0 ? 10 + depth * 14 : 10;
    // Subtle depth tint: each level adds a touch of warm beige
    // Each depth level gets a distinct pale hue (matches folder row tints below)
    const depthBg = depth === 0 ? 'transparent'
      : depth === 1 ? 'rgba(45,90,61,0.13)'    // pale green
      : depth === 2 ? 'rgba(37,113,163,0.13)'  // pale blue
      : depth === 3 ? 'rgba(180,100,0,0.07)'   // pale amber
      : 'rgba(125,60,152,0.07)';               // pale purple
    return (
      <div key={doc.id}
        className={`pages-list-item ${isAct ? 'active' : ''} ${isOver ? 'drag-over' : ''}`}
        style={{ paddingLeft: indentPx, borderLeft: depth > 0 ? '2px solid var(--border)' : '3px solid transparent', background: isAct ? undefined : depthBg }}
        onClick={() => { setSelectedId(doc.id); setMobileView('editor'); }}
        draggable
        onDragStart={e => handleDragStartPages(e, 'doc', doc.id)}
        onDragEnd={handleDragEndPages}
        onDragOver={e => handleDragOverPages(e, 'doc', doc.id)}
        onDrop={e => handleDropPages(e, 'doc', doc.id)}
      >
        <span style={{fontSize:12, marginRight:5, opacity:0.85, flexShrink:0}}>📄</span>
        <div style={{flex:1, minWidth:0}}>
          <div className="pages-list-item-title">{doc.title || 'Untitled'}</div>
          <div className="pages-list-item-date">{fmtDocDate(doc.lastModified || doc.createdAt)}</div>
          {(doc.tasks||[]).length > 0 && (
            <div className="pages-list-item-taskcount">
              {(doc.tasks||[]).filter(t=>t.done).length}/{(doc.tasks||[]).length} tasks
            </div>
          )}
        </div>
        <button
          className="pages-doc-delete-btn"
          title="Delete document"
          onClick={e => { e.stopPropagation(); deleteDoc(doc.id); }}
        >✕</button>
      </div>
    );
  }

  function renderFolderRow(folder, depth) {
    depth = depth || 0;
    const isExpanded = expandedFolders[folder.id] ?? false;
    const isOver = dragOverId === folder.id;
    const isHoverTarget = folderHoverTarget === folder.id;
    const docsInFolder = pagesData
      .filter(d => d.folderId === folder.id)
      .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    const childFolders = foldersData
      .filter(f => f.parentFolderId === folder.id)
      .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    const isEditingName = editingFolderId === folder.id;
    const isFolderMenuOpen = showNewMenu === folder.id;
    const indentPx = depth * 14;

    return (
      <div key={folder.id}>
        <div
          className={`pages-folder-row ${isOver ? 'drag-over' : ''} ${isHoverTarget ? 'folder-hover-target' : ''} ${swipeDeleteId === folder.id ? 'swipe-reveal' : ''}`}
          style={{
            paddingLeft: 6 + indentPx,
            background: depth === 0 ? 'var(--cream)'
              : depth === 1 ? 'rgba(45,90,61,0.20)'    // pale green
              : depth === 2 ? 'rgba(37,113,163,0.20)'  // pale blue
              : depth === 3 ? 'rgba(180,100,0,0.12)'   // pale amber
              : 'rgba(125,60,152,0.12)',                // pale purple
          }}
          draggable
          onDragStart={e => { e.stopPropagation(); handleDragStartPages(e, 'folder', folder.id); }}
          onDragEnd={handleDragEndPages}
          onDragOver={e => handleDragOverPages(e, 'folder', folder.id)}
          onDrop={e => handleDropPages(e, 'folder', folder.id)}
          onTouchStart={e => {
            swipeTouchStart.current = {x: e.touches[0].clientX, y: e.touches[0].clientY};
            // Long-press to rename (500ms)
            longPressTimer.current = setTimeout(() => {
              setEditingFolderId(folder.id);
              setEditingFolderName(folder.name);
              longPressTimer.current = null;
            }, 500);
          }}
          onTouchMove={e => {
            if (!swipeTouchStart.current) return;
            const dx = e.touches[0].clientX - swipeTouchStart.current.x;
            const dy = Math.abs(e.touches[0].clientY - swipeTouchStart.current.y);
            if (dy > 10) { clearTimeout(longPressTimer.current); return; } // vertical scroll, cancel
            if (dx < -50) { clearTimeout(longPressTimer.current); setSwipeDeleteId(folder.id); }
            else if (dx > 10) { clearTimeout(longPressTimer.current); setSwipeDeleteId(null); }
          }}
          onTouchEnd={() => {
            clearTimeout(longPressTimer.current);
            swipeTouchStart.current = null;
          }}
        >
          <button className="pages-folder-toggle"
            onClick={e => { e.stopPropagation(); setExpandedFolders(ex => ({...ex, [folder.id]: !isExpanded})); }}>
            {isExpanded ? '▾' : '▸'}
          </button>
          <span style={{fontSize:13, marginRight:4, flexShrink:0}}>📁</span>
          {isEditingName ? (
            <input
              className="pages-folder-name-input"
              value={editingFolderName}
              autoFocus
              onChange={e => setEditingFolderName(e.target.value)}
              onBlur={() => { updateFolder(folder.id, {name: editingFolderName || 'Untitled Folder'}); setEditingFolderId(null); }}
              onKeyDown={e => {
                if (e.key === 'Enter') { updateFolder(folder.id, {name: editingFolderName || 'Untitled Folder'}); setEditingFolderId(null); }
                if (e.key === 'Escape') { setEditingFolderId(null); }
              }}
              onClick={e => e.stopPropagation()}
            />
          ) : (
            <span className="pages-folder-name"
              onDoubleClick={e => { e.stopPropagation(); setEditingFolderId(folder.id); setEditingFolderName(folder.name); }}
              title="Double-click to rename">
              {folder.name}
            </span>
          )}
          <span style={{fontSize:10, color:'var(--ink-faint)', marginLeft:4, fontFamily:"'DM Mono',monospace", flexShrink:0}}>({docsInFolder.length + childFolders.length})</span>
          <div style={{marginLeft:'auto', display:'flex', gap:2, flexShrink:0, position:'relative'}}>
            <button className="pages-folder-add-btn" title="New item in folder"
              onClick={e => { e.stopPropagation(); setShowNewMenu(isFolderMenuOpen ? null : folder.id); }}>+</button>
            {isFolderMenuOpen && (
              <>
                <div style={{position:'fixed',inset:0,zIndex:99}} onClick={() => setShowNewMenu(null)} />
                <div style={{
                  position:'absolute', top:'calc(100% + 4px)', right:0, zIndex:100,
                  background:'var(--paper)', border:'1px solid var(--border)', borderRadius:8,
                  boxShadow:'0 4px 16px rgba(0,0,0,0.12)', overflow:'hidden', minWidth:150,
                }}>
                  <button className="task-ctx-btn" onClick={e => { e.stopPropagation(); createDoc(folder.id); }}>📄 New Document</button>
                  <button className="task-ctx-btn" onClick={e => { e.stopPropagation(); createFolder(folder.id); }}>📁 New Folder</button>
                </div>
              </>
            )}
            <button className="pages-folder-del-btn" title="Delete folder"
              onClick={e => { e.stopPropagation(); setSwipeDeleteId(null); deleteFolder(folder.id); }}>🗑</button>
            {swipeDeleteId === folder.id && (
              <button onClick={e => { e.stopPropagation(); setSwipeDeleteId(null); deleteFolder(folder.id); }}
                style={{background:'#dc2626',color:'white',border:'none',borderRadius:6,padding:'2px 10px',
                  fontSize:12,fontFamily:"'DM Sans',sans-serif",cursor:'pointer',fontWeight:600,flexShrink:0}}>
                Delete
              </button>
            )}
          </div>
          {isHoverTarget && (
            <div style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',fontSize:10,color:'var(--accent)',fontFamily:"'DM Mono',monospace",pointerEvents:'none',background:'var(--accent-light)',padding:'1px 4px',borderRadius:3}}>
              → folder
            </div>
          )}
        </div>
        {isExpanded && childFolders.map(child => renderFolderRow(child, depth + 1))}
        {isExpanded && docsInFolder.map(doc => renderDocRow(doc, depth + 1))}
      </div>
    );
  }

  // ── New menu dropdown (shared) ───────────────────────────
  function renderNewMenu() {
    if (showNewMenu !== 'top') return null;
    return (
      <>
        <div style={{position:'fixed',inset:0,zIndex:99}} onClick={() => setShowNewMenu(null)} />
        <div style={{
          position:'absolute', top:'calc(100% + 4px)', right:0, zIndex:100,
          background:'var(--paper)', border:'1px solid var(--border)', borderRadius:8,
          boxShadow:'0 4px 16px rgba(0,0,0,0.12)', overflow:'hidden', minWidth:150,
        }}>
          <button className="task-ctx-btn" onClick={() => createDoc(null)}>📄 New Document</button>
          <button className="task-ctx-btn" onClick={() => createFolder(null)}>📁 New Folder</button>
        </div>
      </>
    );
  }

  // ── Sidebar content ──────────────────────────────────────
  const sidebarInner = (
    <div className="pages-sidebar">
      <div className="pages-sidebar-header">
        <span className="pages-sidebar-title">Pages</span>
        <div style={{position:'relative'}}>
          <button className="add-btn" onClick={() => setShowNewMenu(s => s === 'top' ? null : 'top')} title="New…">+</button>
          {renderNewMenu()}
        </div>
      </div>

      <div className="pages-sidebar-scroll">
      {recentDocs.length > 0 && (
        <div>
          <div className="pages-section-label" style={{cursor:'pointer',userSelect:'none',display:'flex',alignItems:'center',justifyContent:'space-between'}} onClick={()=>setRecentCollapsed(c=>!c)}>
            <span>Recent</span>
            <span style={{fontSize:9,opacity:0.5,transition:'transform 0.15s',transform:recentCollapsed?'rotate(-90deg)':'rotate(0deg)'}}>▼</span>
          </div>
          {!recentCollapsed && recentDocs.map(doc => (
            <div key={doc.id}
              className={`pages-list-item ${selectedId===doc.id?'active':''}`}
              style={{paddingLeft:10}}
              onClick={() => { setSelectedId(doc.id); setMobileView('editor'); }}
            >
              <span style={{fontSize:12, marginRight:5, opacity:0.85, flexShrink:0}}>📄</span>
              <div style={{flex:1, minWidth:0}}>
                <div className="pages-list-item-title">{doc.title || 'Untitled'}</div>
                <div className="pages-list-item-date">{fmtDocDate(doc.lastModified || doc.createdAt)}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="pages-section-label" style={{marginTop: recentDocs.length > 0 ? 4 : 0}}>All Pages</div>
      <div className="pages-list">
        {pagesData.length === 0 && foldersData.length === 0 && (
          <div style={{padding:'16px',fontSize:12,color:'var(--ink-faint)',fontFamily:"'DM Sans',sans-serif"}}>
            No pages yet — tap + to create one
          </div>
        )}
        {sortedFolders.map(folder => renderFolderRow(folder))}
        {unfolderedDocs.map(doc => renderDocRow(doc, false))}
      </div>
      </div>
    </div>
  );

  return (
    <div className="main-content" style={{overflow:'hidden'}}>

      <div className={`pages-sidebar-wrap ${sidebarCollapsed?'collapsed':''}`}>
        {sidebarInner}
        <div className="pages-toggle-strip" onClick={()=>setSidebarCollapsed(c=>!c)}>
          <div className="pages-toggle-btn">{sidebarCollapsed?'›':'‹'}</div>
        </div>
      </div>

      <div className="pages-main">

        {mobileView === 'list' && (
          <div className="pages-mobile-list">
            <div className="pages-sidebar-header" style={{padding:'14px 16px 10px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span className="pages-sidebar-title">Pages</span>
              <div style={{position:'relative'}}>
                <button className="add-btn" onClick={() => setShowNewMenu(s => s === 'top' ? null : 'top')} title="New…">+</button>
                {renderNewMenu()}
              </div>
            </div>
            <div className="pages-list" style={{flex:1,overflowY:'auto'}} onClick={e => { if(swipeDeleteId && !e.target.closest('.pages-folder-row')) setSwipeDeleteId(null); }}>
              {pagesData.length === 0 && foldersData.length === 0 && (
                <div style={{padding:'24px 16px',fontSize:13,color:'var(--ink-faint)',fontFamily:"'DM Sans',sans-serif",textAlign:'center'}}>
                  No pages yet — tap + to create one
                </div>
              )}
              {recentDocs.length > 0 && <div className="pages-section-label">Recent</div>}
              {recentDocs.map(doc => (
                <div key={doc.id}
                  className={`pages-list-item ${selectedId===doc.id?'active':''}`}
                  style={{paddingLeft:10}}
                  onClick={() => { setSelectedId(doc.id); setMobileView('editor'); }}
                >
                  <span style={{fontSize:12, marginRight:5, opacity:0.85, flexShrink:0}}>📄</span>
                  <div style={{flex:1, minWidth:0}}>
                    <div className="pages-list-item-title">{doc.title || 'Untitled'}</div>
                    <div className="pages-list-item-date">{fmtDocDate(doc.lastModified || doc.createdAt)}</div>
                  </div>
                </div>
              ))}
              {(pagesData.length > 0 || foldersData.length > 0) && <div className="pages-section-label">All Pages</div>}
              {sortedFolders.map(folder => renderFolderRow(folder, 0))}
              {unfolderedDocs.map(doc => renderDocRow(doc, false))}
            </div>
          </div>
        )}

        {(!selectedDoc && mobileView !== 'list') && (
          <div className="pages-empty">
            <div className="pages-empty-icon">📝</div>
            <div className="pages-empty-text">Select a page or create a new one</div>
            <button className="add-btn" style={{width:32,height:32,fontSize:18}} onClick={() => createDoc(null)}>+</button>
          </div>
        )}

        {selectedDoc && (
          <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0}}>
            <div className="pages-mobile-back">
              <button onClick={()=>{setSelectedId(null);setMobileView('list');}} style={{background:'none',border:'none',color:'var(--accent)',cursor:'pointer',padding:'10px 16px 0',fontFamily:"'DM Sans',sans-serif",fontSize:13,display:'flex',alignItems:'center',gap:4}}>
                ‹ All Pages
              </button>
            </div>

            {/* Title + toolbar — fixed sibling, never scrolls */}
            <div className="pages-doc-header">
              <div style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:4}}>
                <input ref={titleRef} className="pages-title-input"
                  placeholder="Untitled"
                  value={selectedDoc.title}
                  onChange={e=>updateDoc(selectedDoc.id, {title: e.target.value})}
                />
                <button onClick={()=>deleteDoc(selectedDoc.id)}
                  style={{background:'none',border:'none',color:'var(--ink-faint)',cursor:'pointer',fontSize:16,padding:'4px',flexShrink:0,marginTop:6}}
                  title="Delete document">🗑</button>
              </div>
              <div className="pages-doc-meta">
                Created {fmtDocDate(selectedDoc.createdAt)}
                {selectedDoc.folderId && (() => {
                  // Build full path e.g. "Parent > Child"
                  const path = [];
                  let fid = selectedDoc.folderId;
                  while (fid) {
                    const f = foldersData.find(x => x.id === fid);
                    if (!f) break;
                    path.unshift(f.name);
                    fid = f.parentFolderId;
                  }
                  return path.length > 0 ? <span style={{marginLeft:8,opacity:0.6}}>· 📁 {path.join(' › ')}</span> : null;
                })()}
              </div>
              {/* Toolbar — sticky in header so it's always visible */}
              <div style={{padding:'8px 0 0'}}>
                <div className="pages-toolbar">
                  <button className="pages-toolbar-btn" onMouseDown={e=>{e.preventDefault();exec('bold');}} title="Bold"><b>B</b></button>
                  <button className="pages-toolbar-btn" onMouseDown={e=>{e.preventDefault();exec('italic');}} title="Italic"><i>I</i></button>
                  <button className="pages-toolbar-btn" onMouseDown={e=>{e.preventDefault();exec('underline');}} title="Underline"><u>U</u></button>
                  <button className="pages-toolbar-btn" onMouseDown={e=>{e.preventDefault();exec('strikeThrough');}} title="Strikethrough"><s>S</s></button>
                  <div className="pages-toolbar-sep"/>
                  <button className="pages-toolbar-btn" onMouseDown={e=>{e.preventDefault();exec('formatBlock','h1');}} title="Heading 1">H1</button>
                  <button className="pages-toolbar-btn" onMouseDown={e=>{e.preventDefault();exec('formatBlock','h2');}} title="Heading 2">H2</button>
                  <button className="pages-toolbar-btn" onMouseDown={e=>{e.preventDefault();exec('formatBlock','h3');}} title="Heading 3">H3</button>
                  <button className="pages-toolbar-btn" onMouseDown={e=>{e.preventDefault();exec('formatBlock','p');}} title="Normal text">¶</button>
                  <div className="pages-toolbar-sep"/>
                  <button className="pages-toolbar-btn" onMouseDown={e=>{e.preventDefault();exec('insertUnorderedList');}} title="Bullet list">• —</button>
                  <button className="pages-toolbar-btn" onMouseDown={e=>{e.preventDefault();exec('insertOrderedList');}} title="Numbered list">1.</button>
                  <button className="pages-toolbar-btn" onMouseDown={e=>{
                    e.preventDefault();
                    insertChecklistItem();
                  }} title="Checklist">☑</button>
                  <button className="pages-toolbar-btn" onMouseDown={e=>{e.preventDefault();exec('formatBlock','blockquote');}} title="Quote">"</button>
                  <div className="pages-toolbar-sep"/>
                  <button className="pages-toolbar-btn" onMouseDown={e=>{
                    e.preventDefault();
                    const url = prompt('Enter URL:');
                    if (url) exec('createLink', url);
                  }} title="Link">🔗</button>
                  <button className="pages-toolbar-btn" onMouseDown={e=>{e.preventDefault();exec('removeFormat');}} title="Clear formatting">✕</button>
                </div>
              </div>
            </div>
            {/* Scrollable area — flex:1, bounded by pages-main overflow:hidden */}
            <div className="pages-scroll-area">
            <div className="pages-editor">


              <div ref={bodyRef} className="pages-body" contentEditable suppressContentEditableWarning
                onInput={e=>{onBodyInput();setWordCount(countWords(bodyRef.current?.innerText||''));}}
                onKeyDown={e=>handleBodyKeyDown(e)}
                onMouseDown={e=>{
                  if(e.target.classList.contains('pages-chk-input')){
                    // Native checkbox — let it handle normally
                    return;
                  }
                  const li = e.target.closest('li.pages-chk-li');
                  if(li){
                    // If clicking directly on a text node, let the browser place the cursor naturally
                    if(e.target.nodeType === 3 || e.target.closest('span,b,i,u,strong,em')){
                      return;
                    }
                    // Clicking on the li itself or its label area (not on text):
                    // check if the click is past the end of the text content
                    const range = document.caretRangeFromPoint
                      ? document.caretRangeFromPoint(e.clientX, e.clientY)
                      : null;
                    // If browser can place a caret at the click point inside this li, let it
                    if(range && li.contains(range.startContainer) && range.startContainer.nodeType === 3){
                      return; // browser will place cursor correctly between characters
                    }
                    // Otherwise (click is in whitespace past end of text, or on the li padding):
                    // prevent the default and move cursor to end of text
                    e.preventDefault();
                    bodyRef.current?.focus();
                    const walker = document.createTreeWalker(li, NodeFilter.SHOW_TEXT, null);
                    let lastText = null;
                    while(walker.nextNode()) lastText = walker.currentNode;
                    const r = document.createRange();
                    if(lastText){
                      r.setStart(lastText, lastText.length);
                    } else {
                      // Empty li — place after the checkbox
                      r.selectNodeContents(li);
                      r.collapse(false);
                    }
                    r.collapse(true);
                    const s = window.getSelection();
                    s.removeAllRanges();
                    s.addRange(r);
                  }
                }}
                onTouchStart={e=>{ bodyRef._touchStartX = e.touches[0].clientX; bodyRef._touchStartY = e.touches[0].clientY; }}
                onTouchEnd={e=>{
                  const dx = e.changedTouches[0].clientX - (bodyRef._touchStartX || 0);
                  const dy = Math.abs(e.changedTouches[0].clientY - (bodyRef._touchStartY || 0));
                  // Only treat as intentional horizontal swipe: ≥44px horizontal, <30px vertical drift
                  if (Math.abs(dx) >= 44 && dy < 30) {
                    const sel = window.getSelection();
                    if (sel && sel.rangeCount > 0) {
                      const node = sel.getRangeAt(0).startContainer;
                      const el = node.nodeType === 3 ? node.parentElement : node;
                      const inLi = el?.closest('li');
                      if (inLi) {
                        e.preventDefault();
                        document.execCommand(dx > 0 ? 'indent' : 'outdent');
                        // Re-apply checklist class if needed
                        requestAnimationFrame(() => {
                          const s2 = window.getSelection();
                          if (s2 && s2.rangeCount > 0) {
                            const n2 = s2.getRangeAt(0).startContainer;
                            const el2 = n2.nodeType === 3 ? n2.parentElement : n2;
                            const li2 = el2?.closest('li');
                            if (li2 && inLi.classList.contains('pages-chk-li') && !li2.classList.contains('pages-chk-li')) {
                              li2.classList.add('pages-chk-li');
                              li2.setAttribute('data-checked', 'false');
                            }
                          }
                          onBodyInput();
                        });
                      }
                    }
                  }
                }}
                data-placeholder="Start writing…"
                style={{minHeight:180}}
              />
              <div style={{textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--ink-faint)',padding:'4px 2px',marginTop:2}}>
                {wordCount} {wordCount===1?'word':'words'}
              </div>
            </div>

            <div className="pages-tasks-section">
              <div className="pages-tasks-header">
                <span className="pages-tasks-title">Tasks</span>
                <button className="add-btn" onClick={()=>addTask(selectedDoc.id)} title="Add task">+</button>
              </div>
              {(selectedDoc.tasks||[]).length === 0 && (
                <div style={{fontSize:12,color:'var(--ink-faint)',fontFamily:"'DM Sans',sans-serif",padding:'4px 0'}}>
                  No tasks yet — add one to schedule it on the weekly planner
                </div>
              )}
              {(selectedDoc.tasks||[]).map(task => (
                <div key={task.id} className="pages-task-item"
                  style={task.priority ? {background:'#fee2e2', borderColor:'#fca5a5'} : {}}>
                  <div className={`pages-task-check ${task.done?'done':''}`}
                    onClick={()=>updateTask(selectedDoc.id, task.id, {done:!task.done})} />
                  <div className="pages-task-body">
                    <div style={{display:'flex',alignItems:'center',gap:4}}>
                      <input className={`pages-task-title-input ${task.done?'done':''}`}
                        placeholder="Task…" value={task.title}
                        onChange={e=>updateTask(selectedDoc.id, task.id, {title:e.target.value})}
                        style={{flex:1}} />
                      <button
                        onClick={e=>{e.stopPropagation();updateTask(selectedDoc.id,task.id,{priority:!task.priority});}}
                        title={task.priority?'Remove priority':'Mark as priority'}
                        style={{background:'none',border:'none',cursor:'pointer',fontSize:14,
                          color:task.priority?'#dc2626':'var(--ink-faint)',padding:'0 2px',flexShrink:0}}>
                        {task.priority?'★':'☆'}
                      </button>
                    </div>
                    <textarea className="pages-task-details-input"
                      placeholder="Details (optional)…" value={task.details||''} rows={1}
                      onChange={e=>updateTask(selectedDoc.id, task.id, {details:e.target.value})}
                      style={{resize:'vertical'}} />
                    <div className="pages-task-date-row">
                      <span style={{fontSize:10,color:'var(--ink-faint)',fontFamily:"'DM Mono',monospace"}}>📅</span>
                      <input type="date" className="pages-task-date-input"
                        value={task.scheduledDate||''}
                        onChange={e=>updateTask(selectedDoc.id, task.id, {scheduledDate:e.target.value, projectDocId:selectedDoc.id})} />
                      {task.scheduledDate && (
                        <button onClick={()=>updateTask(selectedDoc.id, task.id, {scheduledDate:''})}
                          style={{background:'none',border:'none',color:'var(--ink-faint)',cursor:'pointer',fontSize:11,padding:'0 2px'}}>✕</button>
                      )}
                    </div>
                  </div>
                  <button className="pages-task-delete"
                    onClick={()=>deleteTask(selectedDoc.id, task.id)}>✕</button>
                </div>
              ))}
            </div>
            </div>{/* end pages-scroll-area */}
          </div>
        )}

      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
