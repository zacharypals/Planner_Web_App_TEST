// METRICS VIEW
// ─────────────────────────────────────────────
function MetricsView({ metrics, weightTarget, setWeightTarget, calsTarget, setCalsTarget, onBack }) {

  function dflt30() {
    const end = new Date(); end.setHours(0,0,0,0);
    const start = new Date(end); start.setDate(start.getDate() - 29);
    return { start: fmt(start), end: fmt(end) };
  }
  const [dateRange, setDateRange] = useState(dflt30);
  const weightChartRef = useRef(null);
  const calsChartRef   = useRef(null);
  const weightChartInst = useRef(null);
  const calsChartInst   = useRef(null);

  // Build an array of dateKeys in range
  function getDatesInRange(startStr, endStr) {
    const dates = [];
    const cursor = new Date(startStr + 'T00:00:00');
    const end    = new Date(endStr   + 'T00:00:00');
    while (cursor <= end) { dates.push(fmt(new Date(cursor))); cursor.setDate(cursor.getDate()+1); }
    return dates;
  }

  // Outlier filter: remove points > 3 IQR from median
  function filterOutliers(vals) {
    const nums = vals.filter(v => v !== null);
    if (nums.length < 4) return vals;
    const sorted = [...nums].sort((a,b)=>a-b);
    const q1 = sorted[Math.floor(sorted.length*0.25)];
    const q3 = sorted[Math.floor(sorted.length*0.75)];
    const iqr = q3 - q1;
    const lo = q1 - 3*iqr, hi = q3 + 3*iqr;
    return vals.map(v => (v !== null && v >= lo && v <= hi) ? v : null);
  }

  // For axis bounds only: strip outliers using standard 1.5×IQR so extreme values
  // (e.g. fasting zeros) don't dominate the scale. Data points still plot, just off-screen.
  function boundsVals(vals) {
    const nums = vals.filter(v => v !== null);
    if (nums.length < 4) return nums;
    const sorted = [...nums].sort((a,b)=>a-b);
    const q1 = sorted[Math.floor(sorted.length*0.25)];
    const q3 = sorted[Math.floor(sorted.length*0.75)];
    const iqr = q3 - q1;
    const lo = q1 - 1.5*iqr, hi = q3 + 1.5*iqr;
    return nums.filter(v => v >= lo && v <= hi);
  }

  // 3-day simple moving average
  function sma3(vals) {
    return vals.map((_, i) => {
      const window = vals.slice(Math.max(0, i-2), i+1).filter(v => v !== null);
      return window.length > 0 ? Math.round((window.reduce((a,b)=>a+b,0)/window.length)*10)/10 : null;
    });
  }

  // Compute tight Y-axis bounds: ~10% pad around the non-outlier data range
  function yBounds(vals, floorZero) {
    const nums = boundsVals(vals);
    if (nums.length === 0) return floorZero ? {min:0, max:100} : {min:0, max:100};
    const lo = Math.min(...nums), hi = Math.max(...nums);
    const range = hi - lo;
    // Pad: 12% of range, minimum 2 units so a flat line still shows context
    const pad = Math.max(range * 0.12, 2);
    return {
      min: floorZero ? Math.max(0, Math.floor(lo - pad)) : Math.floor(lo - pad),
      max: Math.ceil(hi + pad)
    };
  }

  function buildCharts() {
    const dates = getDatesInRange(dateRange.start, dateRange.end);
    const labels = dates.map(dk => {
      const d = new Date(dk+'T00:00:00');
      return `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`;
    });

    const rawWeight = dates.map(dk => {
      const v = parseFloat((metrics[dk]||{}).weight);
      return isNaN(v) ? null : v;
    });
    const rawCals = dates.map(dk => {
      const v = parseFloat((metrics[dk]||{}).cals);
      return isNaN(v) ? null : v;
    });
    const weightVals = filterOutliers(rawWeight);
    const calsVals   = filterOutliers(rawCals);
    const smaVals    = sma3(weightVals);
    const wTarget    = parseFloat(weightTarget);
    const cTarget    = parseFloat(calsTarget);

    const wBounds = yBounds(weightVals, false);
    const cBounds = yBounds(calsVals, true);

    // Weight: floor the min so target is always visible (1 unit below target)
    if (!isNaN(wTarget)) {
      wBounds.min = Math.min(wBounds.min, Math.floor(wTarget - 1));
    }
    // Cals: ensure target line is always within the visible range
    if (!isNaN(cTarget)) {
      cBounds.min = Math.min(cBounds.min, Math.floor(cTarget * 0.95));
      cBounds.max = Math.max(cBounds.max, Math.ceil(cTarget * 1.05));
    }

    const commonOpts = {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      plugins: {
        legend: { position: 'bottom', labels: { font: { family: 'DM Sans', size: 11 }, boxWidth: 14 } },
        tooltip: {
          callbacks: {
            label: ctx => ctx.dataset.label + ': ' + (ctx.parsed.y !== null ? ctx.parsed.y : '—')
          }
        }
      },
      elements: { point: { radius: 3, hoverRadius: 5 }, line: { tension: 0.35 } },
      scales: {
        x: {
          ticks: { font: { family: 'DM Mono', size: 10 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 14 },
          grid: { color: 'rgba(0,0,0,0.06)' }
        },
        y: { ticks: { font: { family: 'DM Mono', size: 10 } }, grid: { color: 'rgba(0,0,0,0.06)' } }
      }
    };

    // Weight chart
    if (weightChartInst.current) weightChartInst.current.destroy();
    const wCtx = weightChartRef.current?.getContext('2d');
    if (wCtx) {
      const wDatasets = [
        {
          label: 'Weight',
          data: weightVals,
          borderColor: '#2d5a3d',
          backgroundColor: 'rgba(45,90,61,0.10)',
          fill: true,
          spanGaps: true,
          borderWidth: 2,
        },
        {
          label: '3-day avg',
          data: smaVals,
          borderColor: '#e0a800',
          backgroundColor: 'transparent',
          borderWidth: 2,
          borderDash: [5,3],
          pointRadius: 0,
          spanGaps: true,
        },
      ];
      if (!isNaN(wTarget)) {
        wDatasets.push({
          label: `Target (${wTarget})`,
          data: dates.map(()=>wTarget),
          borderColor: '#c0392b',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          borderDash: [8,4],
          pointRadius: 0,
        });
      }
      weightChartInst.current = new Chart(wCtx, {
        type: 'line',
        data: { labels, datasets: wDatasets },
        options: { ...commonOpts,
          scales: { ...commonOpts.scales,
            y: { ...commonOpts.scales.y, min: wBounds.min, max: wBounds.max }
          }
        }
      });
    }

    // Cals chart
    if (calsChartInst.current) calsChartInst.current.destroy();
    const cCtx = calsChartRef.current?.getContext('2d');
    if (cCtx) {
      const cDatasets = [
        {
          label: 'Cal/Pts',
          data: calsVals,
          borderColor: '#2471a3',
          backgroundColor: 'rgba(36,113,163,0.10)',
          fill: true,
          spanGaps: true,
          borderWidth: 2,
        },
      ];
      if (!isNaN(cTarget)) {
        cDatasets.push({
          label: `Target (${cTarget})`,
          data: dates.map(()=>cTarget),
          borderColor: '#7d3c98',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          borderDash: [8,4],
          pointRadius: 0,
        });
      }
      calsChartInst.current = new Chart(cCtx, {
        type: 'line',
        data: { labels, datasets: cDatasets },
        options: { ...commonOpts,
          scales: { ...commonOpts.scales,
            y: { ...commonOpts.scales.y, min: cBounds.min, max: cBounds.max }
          }
        }
      });
    }
  }

  useEffect(() => {
    // Wait a tick for canvases to be in DOM
    const t = setTimeout(buildCharts, 50);
    return () => { clearTimeout(t); if(weightChartInst.current) weightChartInst.current.destroy(); if(calsChartInst.current) calsChartInst.current.destroy(); };
  }, [metrics, dateRange, weightTarget, calsTarget]);

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'var(--cream)'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 20px',background:'var(--paper)',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        <button onClick={onBack}
          style={{background:'none',border:'none',color:'var(--accent)',cursor:'pointer',fontSize:13,fontFamily:"'DM Sans',sans-serif",padding:'0 4px',display:'flex',alignItems:'center',gap:4}}>
          ‹ Habits
        </button>
        <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:15,fontWeight:700,color:'var(--ink)',flex:1}}>Metrics</span>
        {/* Date range */}
        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
          <input type="date" value={dateRange.start}
            onChange={e=>setDateRange(r=>({...r,start:e.target.value}))}
            style={{fontFamily:"'DM Mono',monospace",fontSize:11,border:'1px solid var(--border)',borderRadius:4,padding:'3px 6px',background:'white',color:'var(--ink)'}} />
          <span style={{fontSize:11,color:'var(--ink-faint)'}}>–</span>
          <input type="date" value={dateRange.end}
            onChange={e=>setDateRange(r=>({...r,end:e.target.value}))}
            style={{fontFamily:"'DM Mono',monospace",fontSize:11,border:'1px solid var(--border)',borderRadius:4,padding:'3px 6px',background:'white',color:'var(--ink)'}} />
        </div>
      </div>

      {/* Charts scroll area */}
      <div style={{flex:1,overflowY:'auto',padding:'16px 16px 32px',display:'flex',flexDirection:'column',gap:24}}>

        {/* Weight Chart */}
        <div style={{background:'var(--paper)',borderRadius:10,padding:'16px',border:'1px solid var(--border)',boxShadow:'0 1px 4px rgba(0,0,0,0.05)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:8}}>
            <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,color:'var(--ink)'}}>Weight</span>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--ink-faint)'}}>Target:</span>
              <input type="number" step="0.1"
                value={weightTarget}
                onChange={e=>setWeightTarget(e.target.value)}
                placeholder="—"
                style={{width:64,fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600,
                        border:'1px solid var(--border)',borderRadius:5,padding:'3px 6px',
                        background:'white',color:'#c0392b',textAlign:'center'}} />
            </div>
          </div>
          <div style={{height:220,position:'relative'}}>
            <canvas ref={weightChartRef} />
          </div>
        </div>

        {/* Cal/Pts Chart */}
        <div style={{background:'var(--paper)',borderRadius:10,padding:'16px',border:'1px solid var(--border)',boxShadow:'0 1px 4px rgba(0,0,0,0.05)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:8}}>
            <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,color:'var(--ink)'}}>Cal / Pts</span>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--ink-faint)'}}>Target:</span>
              <input type="number" step="1"
                value={calsTarget}
                onChange={e=>setCalsTarget(e.target.value)}
                placeholder="—"
                style={{width:72,fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600,
                        border:'1px solid var(--border)',borderRadius:5,padding:'3px 6px',
                        background:'white',color:'#7d3c98',textAlign:'center'}} />
            </div>
          </div>
          <div style={{height:220,position:'relative'}}>
            <canvas ref={calsChartRef} />
          </div>
        </div>

      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────
const ALL_STORAGE_KEYS = ['weekData','habitGoals','habitCompletions','habitMetrics','habitQty','habitNotes','monthlyGoals','navColor','calHeaderColor','pagesData','foldersData','weightTarget','calsTarget','peopleDirectory','fitnessLog','fitnessExercises','fitnessGoals'];

function App() {
  const [page, setPageRaw] = useState(() => sessionStorage.getItem('lp_page') || 'planner');
  const setPage = (p) => { sessionStorage.setItem('lp_page', p); setPageRaw(p); };
  const [navColor, setNavColor] = useStorage('navColor', '#1e3d29');
  const [calHeaderColor, setCalHeaderColor] = useStorage('calHeaderColor', '#2d5a3d');
  const [weekData, setWeekData] = useStorage('weekData', {});
  const [pagesData, setPagesData] = useStorage('pagesData', []); // [{id,title,body,createdAt,lastModified,folderId,order,tasks:[]}]
  const [foldersData, setFoldersData] = useStorage('foldersData', []); // [{id,name,expanded,order}]
  const [selectedPagesId, setSelectedPagesIdRaw] = useState(() => sessionStorage.getItem('lp_selectedPagesId') || null);
  const setSelectedPagesId = (id) => { if(id) sessionStorage.setItem('lp_selectedPagesId', id); else sessionStorage.removeItem('lp_selectedPagesId'); setSelectedPagesIdRaw(id); };
  const [habitGoals, setHabitGoals] = useStorage('habitGoals', [
    {id:'g1', name:'Daily Pages', color:'#2d5a3d'},
  ]);
  const [habitCompletions, setHabitCompletions] = useStorage('habitCompletions', {});
  const [habitMetrics, setHabitMetrics] = useStorage('habitMetrics', {}); // {[dateKey]: {weight:'', cals:''}}
  const [habitQty, setHabitQty] = useStorage('habitQty', {}); // {[dateKey]: {[goalId]: qty}}
  const [habitNotes, setHabitNotes] = useStorage('habitNotes', {}); // {[dateKey]: {[goalId]: notes}}
  const [weightTarget, setWeightTarget] = useStorage('weightTarget', '');
  const [calsTarget, setCalsTarget] = useStorage('calsTarget', '');
  const [monthlyGoals, setMonthlyGoals] = useStorage('monthlyGoals', {});
  const [peopleDirectory, setPeopleDirectory] = useStorage('peopleDirectory', []); // [{id, name}] — master list across weeks
  const [fitnessLog, setFitnessLog] = useStorage('fitnessLog', {}); // {[dateKey]: [{id, name, exercises:[{id, exerciseId, sets:[{id,reps,weight,done}]}]}]}
  const [fitnessExercises, setFitnessExercises] = useStorage('fitnessExercises', []); // [{id, name, category}] library
  const [fitnessGoals, setFitnessGoals] = useStorage('fitnessGoals', []); // [{id, exerciseId, period, target, unit}]

  // Auth state
  const [authUser, setAuthUser] = useState(null); // {name, email, picture}
  const [driveFileId, setDriveFileId] = useState(null);
  const [saveStatus, setSaveStatus] = useState(''); // '', 'saving', 'saved', 'error'
  const [authError, setAuthError] = useState(false); // true when session expired and silent refresh failed
  const [syncing, setSyncing] = useState(false);
  const [pullRefreshing, setPullRefreshing] = useState(false);
  const [pullDisplayY, setPullDisplayY] = useState(0);
  const pullStartY = useRef(0);
  const pullDeltaY = useRef(0);
  const pullActive = useRef(false);
  const saveTimerRef = useRef(null);
  const pendingSaveRef = useRef(false); // true while a save is debounced but not yet flushed

  // Load all data from Drive after sign-in
  async function loadAllFromDrive() {
    _loadingFromDrive = true;
    setSaveStatus('saving');
    try {
      const { data, fileId } = await loadFromDrive();
      ALL_STORAGE_KEYS.forEach(k => {
        if (data[k] !== undefined) {
          try { localStorage.setItem(k, JSON.stringify(data[k])); } catch {}
        }
      });
      if (data.weekData) setWeekData(data.weekData);
      if (data.navColor) setNavColor(data.navColor);
      if (data.calHeaderColor) setCalHeaderColor(data.calHeaderColor);
      if (data.habitGoals) setHabitGoals(data.habitGoals);
      if (data.habitCompletions) setHabitCompletions(data.habitCompletions);
      if (data.habitMetrics) setHabitMetrics(data.habitMetrics);
      if (data.habitQty) setHabitQty(data.habitQty);
      if (data.habitNotes) setHabitNotes(data.habitNotes);
      if (data.weightTarget !== undefined) setWeightTarget(data.weightTarget);
      if (data.calsTarget !== undefined) setCalsTarget(data.calsTarget);
      if (data.monthlyGoals) setMonthlyGoals(data.monthlyGoals);
      if (data.pagesData) setPagesData(data.pagesData);
      if (data.foldersData) setFoldersData(data.foldersData);
      if (data.peopleDirectory) setPeopleDirectory(data.peopleDirectory);
      if (data.fitnessLog) setFitnessLog(data.fitnessLog);
      if (data.fitnessExercises) setFitnessExercises(data.fitnessExercises);
      if (data.fitnessGoals) setFitnessGoals(data.fitnessGoals);
      setDriveFileId(fileId); // set last to arm the save effect
      setAuthError(false);
      setSaveStatus('saved');
      setTimeout(() => { setSaveStatus(''); _loadingFromDrive = false; }, 2000);
    } catch (e) {
      _loadingFromDrive = false;
      const msg = e?.message || 'Unknown error';
      console.error('Drive load failed:', msg);
      setSaveStatus('ERR:' + msg);
      setTimeout(() => setSaveStatus(''), 8000);
    }
  }

  // Debounced save to Drive whenever data changes, with automatic token refresh on 401
  const scheduleSave = useCallback((fid) => {
    if (!fid || _loadingFromDrive) return;
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    pendingSaveRef.current = true;
    setSaveStatus('saving');
    saveTimerRef.current = setTimeout(async () => {
      pendingSaveRef.current = false;
      const allData = {};
      ALL_STORAGE_KEYS.forEach(k => {
        try { const s = localStorage.getItem(k); if (s) allData[k] = JSON.parse(s); } catch {}
      });
      try {
        await saveToDrive(fid, allData);
        setAuthError(false);
        setSaveStatus('saved');
        setTimeout(() => setSaveStatus(''), 2000);
      } catch (e) {
        const msg = e?.message || 'Save failed';
        const is401 = msg.includes('401') || msg.toLowerCase().includes('unauthorized') || msg.toLowerCase().includes('not authenticated');
        if (is401) {
          setSaveStatus('saving');
          requestTokenSilent(
            async () => {
              try {
                await saveToDrive(fid, allData);
                setAuthError(false);
                setSaveStatus('saved');
                setTimeout(() => setSaveStatus(''), 2000);
              } catch (e2) {
                setSaveStatus('ERR:' + (e2?.message || 'Save failed'));
                // Don't auto-clear save errors — user must see them
              }
            },
            () => {
              clearToken();
              setAuthError(true);
              setSaveStatus('ERR:Session expired');
            }
          );
        } else {
          setSaveStatus('ERR:' + msg);
          // Don't auto-clear save errors — user must see them
        }
      }
    }, 2500);
  }, []);

  // Flush any pending save immediately — used by beforeunload and visibilitychange
  const flushSave = useCallback(async () => {
    if (!pendingSaveRef.current || !driveFileId || _loadingFromDrive) return;
    if (saveTimerRef.current) { clearTimeout(saveTimerRef.current); saveTimerRef.current = null; }
    pendingSaveRef.current = false;
    const allData = {};
    ALL_STORAGE_KEYS.forEach(k => {
      try { const s = localStorage.getItem(k); if (s) allData[k] = JSON.parse(s); } catch {}
    });
    try { await saveToDrive(driveFileId, allData); } catch {}
  }, [driveFileId]);

  // Watch for localStorage changes and trigger Drive save
  useEffect(() => {
    if (!driveFileId) return;
    scheduleSave(driveFileId);
  }, [weekData, navColor, calHeaderColor, habitGoals, habitCompletions, habitMetrics, habitQty, habitNotes, monthlyGoals, pagesData, foldersData, peopleDirectory, fitnessLog, fitnessExercises, fitnessGoals, driveFileId]);

  // On mount: restore session from localStorage token or silent Worker refresh
  useEffect(() => {
    async function tryRestoreSession() {
      // Case 1: token still valid in localStorage — restore immediately
      if (getToken()) {
        try {
          const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: { Authorization: `Bearer ${getToken()}` }
          });
          const user = await res.json();
          if (user.email) {
            setAuthUser({ name: user.name, email: user.email, picture: user.picture });
            await loadAllFromDrive();
            return;
          }
        } catch {}
      }
      // Case 2: no valid token — try silent iframe re-auth if we have a hint
      const hint = getSavedEmail();
      if (!hint) return;
      // Worker-based silent refresh
      requestTokenSilent(
        async (data) => {
          // Silent refresh doesn't return user info — use saved email
          const email = getSavedEmail();
          setAuthUser({ name: email, email, picture: null }); // will be updated after Drive load
          await loadAllFromDrive();
        },
        (err) => console.log('Silent refresh failed:', err, '— user must sign in manually')
      );
    }
    tryRestoreSession();
  }, []);

  // Flush pending saves when tab is closed, refreshed, or hidden (mobile home button etc.)
  useEffect(() => {
    function handleBeforeUnload(e) {
      if (pendingSaveRef.current && driveFileId) {
        // Attempt a synchronous-ish flush (best effort — browsers may not honor async here)
        flushSave();
        // Show browser's native "leave page?" dialog to give user a chance to wait
        e.preventDefault();
        e.returnValue = 'You have unsaved changes. Please wait a moment before closing.';
        return e.returnValue;
      }
    }
    function handleVisibilityChange() {
      if (document.visibilityState === 'hidden' && pendingSaveRef.current) {
        flushSave();
      }
    }
    window.addEventListener('beforeunload', handleBeforeUnload);
    document.addEventListener('visibilitychange', handleVisibilityChange);
    return () => {
      window.removeEventListener('beforeunload', handleBeforeUnload);
      document.removeEventListener('visibilitychange', handleVisibilityChange);
    };
  }, [flushSave, driveFileId]);

  function handleSignIn() {
    requestToken(
      async (data) => {
        // Worker returns name/email/picture directly from userinfo
        setAuthUser({ name: data.name||data.email, email: data.email, picture: data.picture||null });
        saveEmail(data.email);
        await loadAllFromDrive();
      },
      (err) => { console.error('Auth error:', err); alert('Sign-in failed: ' + err); }
    );
  }

  function handleSignOut() {
    const email = getSavedEmail();
    clearToken();
    clearEmail();
    setAuthUser(null); setDriveFileId(null); setSaveStatus('');
    // Tell Worker to delete the stored refresh token
    if (email && !WORKER_URL.includes('YOUR_SUBDOMAIN')) {
      fetch(`${WORKER_URL}/revoke`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      }).catch(() => {});
    }
  }

  async function handleSyncCalendar() {
    if (!getToken()) { alert('Please sign in first.'); return; }
    setSyncing(true);
    try {
      const result = await pullNewFromCalendar(weekData);
      if (!result) {
        alert('Calendar sync failed: could not reach Google Calendar.\n\nMake sure:\n1. Google Calendar API is enabled in Cloud Console\n2. You signed in and approved Calendar access on the consent screen\n3. Try signing out and back in');
      } else if (result.added > 0 || result.updated > 0) {
        setWeekData(result.newWeekData);
        const parts = [];
        if (result.added > 0) parts.push(`${result.added} new event${result.added===1?'':'s'} added`);
        if (result.updated > 0) parts.push(`${result.updated} event${result.updated===1?'':'s'} updated`);
        alert('✓ ' + parts.join(', ') + ' from Google Calendar.');
      } else {
        alert('✓ All caught up — no changes to import from Google Calendar.');
      }
    } catch (e) {
      const msg = e?.message || 'Unknown error';
      alert(`Calendar sync failed: ${msg}\n\nMake sure:\n1. Google Calendar API is enabled in Cloud Console\n2. You signed in and approved Calendar access\n3. Try signing out and back in`);
    }
    setSyncing(false);
  }

  async function handlePullRefresh() {
    if (pullRefreshing) return;
    setPullRefreshing(true);
    try {
      // Read the running version dynamically from the document comment
      const runningMatch = document.documentElement.outerHTML.match(/LP Planner v([\d.]+)/);
      const RUNNING_VERSION = runningMatch ? runningMatch[1] : '0.0.0';
      try {
        const res = await fetch(window.location.pathname + '?v=' + Date.now(), {
          cache: 'no-store',
          headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' },
        });
        const html = await res.text();
        const deployedMatch = html.match(/LP Planner v([\d.]+)/);
        if (deployedMatch && deployedMatch[1] !== RUNNING_VERSION) {
          // New version detected — sync data then hard-reload
          if (authUser && driveFileId) await loadAllFromDrive();
          window.location.reload(true);
          return;
        }
      } catch (e) {
        // Network issue checking version — continue with Drive sync only
      }
      if (authUser && driveFileId) {
        await loadAllFromDrive();
      }
    } finally {
      setPullRefreshing(false);
    }
  }

  const isErr = saveStatus.startsWith('ERR:');
  const errDetail = isErr ? saveStatus.slice(4) : '';
  const saveLabel = saveStatus === 'saving' ? '↑ Saving…'
    : saveStatus === 'saved' ? '✓ Saved'
    : isErr ? '✗ Save error'
    : '';
  const saveClass = isErr ? 'error' : saveStatus;

  return (
    <div className="app">
      {/* ── PERSISTENT SAVE ERROR BANNER ── */}
      {isErr && (
        <div style={{
          position:'fixed', top:0, left:0, right:0, zIndex:10000,
          background:'#7f1d1d', color:'white', padding:'10px 16px',
          fontFamily:"'DM Sans',sans-serif", fontSize:13,
          display:'flex', alignItems:'center', justifyContent:'space-between', gap:12,
          boxShadow:'0 2px 8px rgba(0,0,0,0.3)',
        }}>
          <span>⚠️ <strong>Save error — your changes are NOT being saved to Drive.</strong> {errDetail && <span style={{opacity:0.85}}>{errDetail}</span>}</span>
          <div style={{display:'flex',gap:8,flexShrink:0}}>
            <button onClick={()=>{ if(driveFileId) scheduleSave(driveFileId); setSaveStatus(''); }}
              style={{background:'rgba(255,255,255,0.2)',border:'1px solid rgba(255,255,255,0.4)',borderRadius:6,
                padding:'4px 12px',cursor:'pointer',fontWeight:600,fontSize:12,
                fontFamily:"'DM Sans',sans-serif",color:'white',whiteSpace:'nowrap'}}>
              Retry
            </button>
            <button onClick={()=>setSaveStatus('')}
              style={{background:'none',border:'none',cursor:'pointer',fontSize:18,color:'rgba(255,255,255,0.7)',
                lineHeight:1,padding:'0 4px'}}>✕</button>
          </div>
        </div>
      )}
      {/* ── AUTH SESSION EXPIRED BANNER ── */}
      {authError && (
        <div style={{
          position:'fixed', top:isErr?44:0, left:0, right:0, zIndex:9999,
          background:'#7f1d1d', color:'white', padding:'10px 16px',
          fontFamily:"'DM Sans',sans-serif", fontSize:13,
          display:'flex', alignItems:'center', justifyContent:'space-between', gap:12,
          boxShadow:'0 2px 8px rgba(0,0,0,0.3)',
        }}>
          <span>⚠️ Your session has expired — changes are <strong>not saving</strong>. Please sign in again.</span>
          <button onClick={()=>{
            setAuthError(false);
            requestToken(
              async (data) => {
                try {
                  const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${getToken()}` } });
                  const user = await res.json();
                  if (user.email) { setAuthUser({ name: user.name, email: user.email, picture: user.picture }); saveEmail(user.email); }
                } catch {}
                if (driveFileId) scheduleSave(driveFileId);
              },
              (err) => { setAuthError(true); setSaveStatus('ERR:Sign-in failed'); }
            );
          }} style={{
            background:'white', color:'#7f1d1d', border:'none', borderRadius:6,
            padding:'4px 12px', cursor:'pointer', fontWeight:600, fontSize:12,
            fontFamily:"'DM Sans',sans-serif", whiteSpace:'nowrap', flexShrink:0,
          }}>Sign in again</button>
        </div>
      )}
      {/* ── NOT SIGNED IN BANNER (shown while editing Pages) ── */}
      {!authUser && page === 'pages' && (
        <div style={{
          position:'fixed', top:0, left:0, right:0, zIndex:9998,
          background:'#78350f', color:'white', padding:'8px 16px',
          fontFamily:"'DM Sans',sans-serif", fontSize:12,
          display:'flex', alignItems:'center', justifyContent:'space-between', gap:12,
          boxShadow:'0 2px 8px rgba(0,0,0,0.3)',
        }}>
          <span>☁ Not signed in — your documents are only saved locally and will be <strong>lost if you clear your browser data.</strong></span>
          <button onClick={handleSignIn}
            style={{background:'white',color:'#78350f',border:'none',borderRadius:6,
              padding:'3px 10px',cursor:'pointer',fontWeight:600,fontSize:12,
              fontFamily:"'DM Sans',sans-serif",whiteSpace:'nowrap',flexShrink:0}}>
            Sign in
          </button>
        </div>
      )}
      <div className="nav-bar" style={{background: navColor}}>
        <div className="hdr-color-area">
          <span className="nav-brand">✦ LP Planner</span><span style={{fontSize:9,opacity:0.45,fontFamily:"'DM Mono',monospace",marginLeft:6,letterSpacing:'0.05em',alignSelf:'center'}}>v3.3.0</span>
          <ColorPickerPopover color={navColor} onChange={setNavColor} />
        </div>
        <div className="nav-tabs">
          <button className={`nav-tab ${page==='planner'?'active':''}`} onClick={()=>setPage('planner')}>Weekly Planner</button>
          <button className={`nav-tab ${page==='monthly'?'active':''}`} onClick={()=>setPage('monthly')}>Monthly Calendar</button>
          <button className={`nav-tab ${page==='habit'?'active':''}`} onClick={()=>setPage('habit')}>Habit Tracker</button>
          <button className={`nav-tab ${page==='pages'?'active':''}`} onClick={()=>setPage('pages')}>Pages</button>
          <button className={`nav-tab ${page==='fitness'?'active':''}`} onClick={()=>setPage('fitness')}>Fitness</button>
        </div>
        <div className="auth-area">
          {saveLabel && <span className={`save-status ${saveClass || saveStatus}`}>{saveLabel}</span>}
          {authUser ? (
            <>
              <button className="auth-btn sync" onClick={handleSyncCalendar} disabled={syncing} title="Pull new events from Google Calendar">
                {syncing ? '↓ Syncing…' : '↓ Sync Calendar'}
              </button>
              {authUser.picture && <img className="user-avatar" src={authUser.picture} alt={authUser.name} title={authUser.email} />}
              <button className="auth-btn danger" onClick={handleSignOut} title="Sign out">Sign out</button>
            </>
          ) : (
            <button className="auth-btn" onClick={handleSignIn}>☁ Sign in with Google</button>
          )}
        </div>
      </div>
      {/* Pull-to-refresh indicator — Chrome-style circle */}
      {(pullDisplayY > 0 || pullRefreshing) && (
        <div className="pull-indicator" style={{
          opacity: pullRefreshing ? 1 : Math.min(pullDisplayY / 325, 1),
          top: pullRefreshing ? 56 : Math.min(48 + pullDisplayY * 0.4, 80),
        }}>
          <span style={{
            display:'inline-block',
            transform: pullRefreshing ? undefined : `rotate(${Math.min(pullDisplayY / 325, 1) * 360}deg)`,
            animation: pullRefreshing ? 'spin 0.8s linear infinite' : 'none',
            transition: pullRefreshing ? 'none' : 'transform 0.05s',
            color: pullDisplayY >= 325 && !pullRefreshing ? 'var(--accent)' : 'var(--ink)',
          }}>↻</span>
        </div>
      )}

      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}
        onTouchStart={e=>{
          // Only start tracking if near top of page
          const scrollTop = document.scrollingElement?.scrollTop || document.documentElement.scrollTop || 0;
          if (scrollTop <= 5 && !pullRefreshing) {
            pullStartY.current = e.touches[0].clientY;
            pullDeltaY.current = 0;
            pullActive.current = true;
          } else {
            pullActive.current = false;
          }
        }}
        onTouchMove={e=>{
          if (!pullActive.current) return;
          const delta = e.touches[0].clientY - pullStartY.current;
          pullDeltaY.current = delta;
          if (delta > 10) setPullDisplayY(delta);
        }}
        onTouchEnd={()=>{
          if (!pullActive.current) { setPullDisplayY(0); return; }
          if (pullDeltaY.current >= 325 && !pullRefreshing) {
            handlePullRefresh().finally(() => setPullDisplayY(0));
          } else {
            setPullDisplayY(0);
          }
          pullDeltaY.current = 0;
          pullActive.current = false;
        }}>
      {page==='planner' && <WeeklyPlanner weekData={weekData} setWeekData={setWeekData} pagesData={pagesData} setPagesData={setPagesData} onGoToHabit={()=>setPage('habit')} calHeaderColor={calHeaderColor} setCalHeaderColor={setCalHeaderColor} habitGoals={habitGoals} habitCompletions={habitCompletions} setHabitCompletions={setHabitCompletions} habitQty={habitQty} setHabitQty={setHabitQty} habitNotes={habitNotes} setHabitNotes={setHabitNotes} peopleDirectory={peopleDirectory} setPeopleDirectory={setPeopleDirectory} />}
      {page==='monthly' && <MonthlyCalendar weekData={weekData} setWeekData={setWeekData} monthlyGoals={monthlyGoals} setMonthlyGoals={setMonthlyGoals} />}
      {page==='habit' && <HabitTracker
        goals={habitGoals} setGoals={setHabitGoals}
        completions={habitCompletions} setCompletions={setHabitCompletions}
        metrics={habitMetrics} setMetrics={setHabitMetrics}
        qty={habitQty} setQty={setHabitQty}
        notes={habitNotes} setNotes={setHabitNotes}
        onGoToPlanner={()=>setPage('planner')}
        onGoToMetrics={()=>setPage('metrics')} />}
      {page==='metrics' && <MetricsView
        metrics={habitMetrics}
        weightTarget={weightTarget} setWeightTarget={setWeightTarget}
        calsTarget={calsTarget} setCalsTarget={setCalsTarget}
        onBack={()=>setPage('habit')} />}
      {page==='pages' && <PagesView pagesData={pagesData} setPagesData={setPagesData} foldersData={foldersData} setFoldersData={setFoldersData} weekData={weekData} setWeekData={setWeekData} selectedId={selectedPagesId} setSelectedId={setSelectedPagesId} />}
      {page==='fitness' && <FitnessView fitnessLog={fitnessLog} setFitnessLog={setFitnessLog} fitnessExercises={fitnessExercises} setFitnessExercises={setFitnessExercises} fitnessGoals={fitnessGoals} setFitnessGoals={setFitnessGoals} />}
      </div>

      {/* Mobile bottom nav — only visible on phones via CSS */}
      <div className="mobile-bottom-nav">
        <button className={`mobile-bottom-nav-btn ${page==='planner'?'active':''}`} onClick={()=>setPage('planner')}>
          <span className="icon">📅</span>Week
        </button>
        <button className={`mobile-bottom-nav-btn ${page==='monthly'?'active':''}`} onClick={()=>setPage('monthly')}>
          <span className="icon">🗓</span>Month
        </button>
        <button className={`mobile-bottom-nav-btn ${page==='habit'?'active':''}`} onClick={()=>setPage('habit')}>
          <span className="icon">✓</span>Habits
        </button>
        <button className={`mobile-bottom-nav-btn ${page==='pages'?'active':''}`} onClick={()=>setPage('pages')}>
          <span className="icon">📝</span>Pages
        </button>
        <button className={`mobile-bottom-nav-btn ${page==='fitness'?'active':''}`} onClick={()=>setPage('fitness')}>
          <span className="icon">💪</span>Fitness
        </button>
        {authUser && (
          <button className="mobile-bottom-nav-btn" onClick={handleSyncCalendar} disabled={syncing}>
            <span className="icon">{syncing?'↻':'↓'}</span>Sync
          </button>
        )}
      </div>
    </div>
  );
}


// ─────────────────────────────────────────────
// FITNESS VIEW
// ─────────────────────────────────────────────
const FITNESS_CATEGORIES = ['Strength','Cardio','Mobility','Sport','Other'];
const UNCATEGORIZED = 'Other';

function FitnessView({ fitnessLog, setFitnessLog, fitnessExercises, setFitnessExercises, fitnessGoals, setFitnessGoals }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const [selectedDate, setSelectedDate] = useState(today);
  const [fitView, setFitView] = useState('day');
  const [showExPicker, setShowExPicker] = useState(null); // {dk} when open
  const [showLibManager, setShowLibManager] = useState(false);
  const [showGoalManager, setShowGoalManager] = useState(false);
  const [goalsCollapsed, setGoalsCollapsed] = useState(false);

  const dateKey = fmt(selectedDate);
  const weekStart = getWeekStart(selectedDate);
  const weekDays = Array.from({length:7}, (_,i) => addDays(weekStart, i));
  const viewYear = selectedDate.getFullYear();
  const viewMonth = selectedDate.getMonth();
  const firstDayOfMonth = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

  // Migrate old workout-wrapped data to flat on first access
  function getDayExercises(dk) {
    const raw = fitnessLog[dk] || [];
    if (raw.length === 0) return [];
    // If first item has an `exercises` array, it's old format — flatten it
    if (raw[0] && Array.isArray(raw[0].exercises)) {
      return raw.flatMap(w => w.exercises || []);
    }
    return raw;
  }

  // ── Log helpers (flat: day → [exercise entries]) ──
  function setDayExs(dk, fn) {
    setFitnessLog(log => {
      const cur = getDayExercises(dk);
      const next = typeof fn === 'function' ? fn(cur) : fn;
      return { ...log, [dk]: next };
    });
  }
  function addExerciseToDay(dk, exerciseId) {
    const libEx = fitnessExercises.find(e => e.id===exerciseId);
    if (!libEx) return;
    const newEx = { id:'ex'+Date.now(), exerciseId, sets:[{id:'s'+Date.now(), reps:'', weight:'', dist:'', time:'', done:false}] };
    setDayExs(dk, exs => [...exs, newEx]);
    if (fitView !== 'day') { setSelectedDate(new Date(dk+'T00:00:00')); setFitView('day'); }
  }
  function deleteExercise(dk, exId) { setDayExs(dk, exs => exs.filter(e => e.id!==exId)); }
  function updateSet(dk, exId, setId, patch) {
    setDayExs(dk, exs => exs.map(e => e.id!==exId ? e : {
      ...e, sets: e.sets.map(s => s.id!==setId ? s : {...s,...patch})
    }));
  }
  function addSet(dk, exId) {
    setDayExs(dk, exs => exs.map(e => e.id!==exId ? e : {
      ...e, sets:[...e.sets, {id:'s'+Date.now(), reps:'', weight:'', dist:'', time:'', done:false}]
    }));
  }
  function deleteSet(dk, exId, setId) {
    setDayExs(dk, exs => exs.map(e => e.id!==exId ? e : {
      ...e, sets:e.sets.filter(s=>s.id!==setId)
    }));
  }

  // ── Library helpers ──
  function addExercise(name, category) {
    if (!name.trim()) return;
    const id = 'e'+Date.now();
    setFitnessExercises(es => [...es, {id, name:name.trim(), category:category||UNCATEGORIZED}]);
    return id;
  }
  function updateExercise(id, patch) { setFitnessExercises(es => es.map(e => e.id===id ? {...e,...patch} : e)); }
  function deleteExercise_lib(id) { setFitnessExercises(es => es.filter(e => e.id!==id)); }

  // ── Goals helpers ──
  function addGoal(exerciseId, period, target, unit) {
    if (!exerciseId || !target) return;
    setFitnessGoals(gs => [...gs, {id:'fg'+Date.now(), exerciseId, period, target:parseFloat(target), unit}]);
  }
  function deleteGoal(id) { setFitnessGoals(gs => gs.filter(g => g.id!==id)); }

  function goalProgressFull(goal, refDate) {
    const now = refDate || new Date(); if (!refDate) now.setHours(0,0,0,0);
    let startDk, endDk, totalDays, elapsedDays;
    if (goal.period === 'week') {
      const ws = getWeekStart(now);
      startDk = fmt(ws); endDk = fmt(addDays(ws,6));
      totalDays = 7; elapsedDays = Math.min(7, Math.floor((now-ws)/86400000)+1);
    } else if (goal.period === 'month') {
      const y=now.getFullYear(), m=now.getMonth();
      const first=new Date(y,m,1), last=new Date(y,m+1,0);
      startDk=fmt(first); endDk=fmt(last);
      totalDays=last.getDate(); elapsedDays=Math.min(totalDays, now.getDate());
    } else {
      const first=new Date(now.getFullYear(),0,1), last=new Date(now.getFullYear(),11,31);
      startDk=fmt(first); endDk=fmt(last);
      totalDays=365+(now.getFullYear()%4===0?1:0);
      elapsedDays=Math.floor((now-first)/86400000)+1;
    }
    let total = 0;
    Object.entries(fitnessLog).forEach(([dk, raw]) => {
      if (dk < startDk || dk > endDk) return;
      // Support both old (workout-wrapped) and new (flat) format
      const exList = (raw&&raw[0]&&Array.isArray(raw[0].exercises))
        ? raw.flatMap(w => w.exercises||[])
        : (raw||[]);
      exList.forEach(ex => {
        if (ex.exerciseId !== goal.exerciseId) return;
        const doneSets = ex.sets.filter(s => s.done);
        if (goal.unit==='sets') total += doneSets.length;
        else if (goal.unit==='reps') total += doneSets.reduce((a,s)=>a+(parseFloat(s.reps)||0),0);
        else if (goal.unit==='volume') total += doneSets.reduce((a,s)=>a+(parseFloat(s.reps)||0)*(parseFloat(s.weight)||0),0);
      });
    });
    const actual = Math.round(total*10)/10;
    const periodPct = Math.round((elapsedDays/totalDays)*100);
    const targetPace = Math.round((elapsedDays/totalDays)*goal.target*10)/10;
    const expectedAtPace = elapsedDays>0 ? Math.round((actual/elapsedDays*totalDays)*10)/10 : 0;
    const aheadBehind = actual - targetPace;
    return { actual, periodPct, targetPace, expectedAtPace, aheadBehind, startDk, endDk };
  }
  function goalProgress(goal) { return goalProgressFull(goal).actual; }

  // ── Stats helpers ──
  function exStats(ex) {
    const doneSets = ex.sets.filter(s => s.done);
    const hasWeight = doneSets.some(s => parseFloat(s.weight)>0);
    const volume = doneSets.reduce((acc,s) => {
      const r=parseFloat(s.reps)||0, w=parseFloat(s.weight)||0;
      return acc + (w>0 ? r*w : r);
    }, 0);
    return {done:doneSets.length, total:ex.sets.length, volume:Math.round(volume), hasWeight};
  }
  function exName(exerciseId) { return fitnessExercises.find(e=>e.id===exerciseId)?.name||'Unknown'; }

  const categorized = FITNESS_CATEGORIES.reduce((acc,cat) => {
    const items = fitnessExercises.filter(e=>(e.category||UNCATEGORIZED)===cat);
    if (items.length) acc[cat]=items;
    return acc;
  }, {});

  // ── Render one exercise block (shared by day view) ──
  function renderExerciseBlock(dk, ex) {
    const stats = exStats(ex);
    const libEx = fitnessExercises.find(e=>e.id===ex.exerciseId);
    const isCardio = libEx?.category === 'Cardio';
    return (
      <div key={ex.id} className="workout-card">
        {/* Exercise header */}
        <div className="workout-card-header">
          <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,color:'var(--accent)',flex:1}}>
            {exName(ex.exerciseId)}
          </span>
          {stats.done>0 && (
            <span className="fitness-stat-pill">
              {stats.done}/{stats.total} sets{stats.volume>0 && ` · ${stats.volume.toLocaleString()} ${stats.hasWeight?'lbs':'reps'}`}
            </span>
          )}
          <button onClick={()=>deleteExercise(dk,ex.id)}
            style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--ink-faint)',padding:'0 2px',lineHeight:1,opacity:0.5}}>✕</button>
        </div>
        {/* Set table */}
        <div className="exercise-block">
          <div style={{display:'flex',alignItems:'center',gap:6,padding:'2px 0 4px',borderBottom:'1px solid var(--border)',marginBottom:2}}>
            <span className="set-num"></span>
            {isCardio ? (<>
              <span className="set-label" style={{width:60,textAlign:'center'}}>Dist (mi)</span>
              <span className="set-label" style={{width:60,textAlign:'center',marginLeft:6}}>Time (min)</span>
              <span className="set-label" style={{width:56,textAlign:'center',marginLeft:6}}>min/mi</span>
            </>) : (<>
              <span className="set-label" style={{width:52,textAlign:'center'}}>Reps</span>
              <span className="set-label" style={{width:52,textAlign:'center',marginLeft:18}}>Weight</span>
            </>)}
            <span className="set-label" style={{marginLeft:'auto',marginRight:2}}>Done</span>
          </div>
          {ex.sets.map((set,si) => {
            const dist=parseFloat(set.dist)||0, time=parseFloat(set.time)||0;
            const pace = (dist>0&&time>0) ? (time/dist).toFixed(2) : null;
            return (
              <div key={set.id} className={`set-row ${set.done?'done':''}`}>
                <span className="set-num">{si+1}</span>
                {isCardio ? (<>
                  <input type="number" min="0" step="0.01" className="set-input" placeholder="—" value={set.dist||''}
                    onChange={e=>updateSet(dk,ex.id,set.id,{dist:e.target.value})} style={{width:60,opacity:set.done?0.6:1}}/>
                  <input type="number" min="0" step="0.1" className="set-input" placeholder="—" value={set.time||''}
                    onChange={e=>updateSet(dk,ex.id,set.id,{time:e.target.value})} style={{width:60,marginLeft:6,opacity:set.done?0.6:1}}/>
                  <span className="set-label" style={{width:56,textAlign:'center',fontWeight:pace?700:400,
                    color:pace?'var(--accent)':'var(--ink-faint)',fontSize:pace?11:9}}>
                    {pace||'—'}
                  </span>
                </>) : (<>
                  <input type="number" min="0" className="set-input" placeholder="—" value={set.reps||''}
                    onChange={e=>updateSet(dk,ex.id,set.id,{reps:e.target.value})} style={{opacity:set.done?0.6:1}}/>
                  <span className="set-label">×</span>
                  <input type="number" min="0" className="set-input" placeholder="—" value={set.weight||''}
                    onChange={e=>updateSet(dk,ex.id,set.id,{weight:e.target.value})} style={{opacity:set.done?0.6:1}}/>
                  <span className="set-label">lbs</span>
                </>)}
                <div className={`set-check ${set.done?'done':''}`} onClick={()=>updateSet(dk,ex.id,set.id,{done:!set.done})}/>
                <button onClick={()=>deleteSet(dk,ex.id,set.id)}
                  style={{background:'none',border:'none',cursor:'pointer',fontSize:11,color:'var(--ink-faint)',padding:'0 2px',opacity:0.35,marginLeft:2,lineHeight:1}}>✕</button>
              </div>
            );
          })}
          <div style={{paddingTop:6}}>
            <button onClick={()=>addSet(dk,ex.id)}
              style={{background:'none',border:'1px solid var(--border)',borderRadius:4,cursor:'pointer',
                fontSize:10,color:'var(--ink-light)',padding:'2px 8px',fontFamily:"'DM Sans',sans-serif"}}>
              + Set
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="fitness-layout">
      {/* SIDEBAR */}
      <div className="fitness-sidebar">
        <div className="fitness-day-nav" style={{marginBottom:12}}>
          <button className="nav-arrow" onClick={()=>{
            if(fitView==='day') setSelectedDate(d=>addDays(d,-1));
            else if(fitView==='week') setSelectedDate(d=>addDays(d,-7));
            else setSelectedDate(d=>new Date(d.getFullYear(),d.getMonth()-1,1));
          }}>‹</button>
          <div style={{textAlign:'center'}}>
            <div className="fitness-day-label" style={{fontSize:12}}>
              {fitView==='day'
                ? `${DAYS[selectedDate.getDay()].slice(0,3)}, ${MONTHS[selectedDate.getMonth()].slice(0,3)} ${selectedDate.getDate()}`
                : fitView==='week'
                  ? `${MONTHS[weekStart.getMonth()].slice(0,3)} ${weekStart.getDate()} – ${MONTHS[addDays(weekStart,6).getMonth()].slice(0,3)} ${addDays(weekStart,6).getDate()}`
                  : `${MONTHS[viewMonth]} ${viewYear}`}
            </div>
            <div className="fitness-day-sub">{viewYear}</div>
          </div>
          <button className="nav-arrow" onClick={()=>{
            if(fitView==='day') setSelectedDate(d=>addDays(d,1));
            else if(fitView==='week') setSelectedDate(d=>addDays(d,7));
            else setSelectedDate(d=>new Date(d.getFullYear(),d.getMonth()+1,1));
          }}>›</button>
        </div>

        {/* Goals */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:goalsCollapsed?0:6}}>
          <div style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer'}}
            onClick={()=>setGoalsCollapsed(c=>!c)}>
            <span style={{fontSize:9,color:'var(--ink-faint)'}}>{goalsCollapsed?'▸':'▾'}</span>
            <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Goals</span>
            {goalsCollapsed && fitnessGoals.length>0 && (
              <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:'var(--accent)',fontWeight:600}}>({fitnessGoals.length})</span>
            )}
          </div>
          <button className="add-btn" onClick={()=>setShowGoalManager(true)}>+</button>
        </div>
        {!goalsCollapsed && (
          <div style={{marginBottom:8}}>
            {fitnessGoals.length===0 && (
              <div style={{fontSize:11,color:'var(--ink-faint)',fontStyle:'italic',padding:'2px 6px',marginBottom:6}}>No goals yet — tap + to add</div>
            )}
            {(() => {
              const PERIOD_ORDER = {week:0,month:1,year:2};
              const groups = {};
              fitnessGoals.forEach(g => {
                const name = fitnessExercises.find(e=>e.id===g.exerciseId)?.name||'Unknown';
                if (!groups[name]) groups[name]=[];
                groups[name].push(g);
              });
              Object.values(groups).forEach(arr=>arr.sort((a,b)=>(PERIOD_ORDER[a.period]??3)-(PERIOD_ORDER[b.period]??3)));
              return Object.keys(groups).sort().map(name => (
                <div key={name} style={{marginBottom:10}}>
                  <div style={{fontSize:10,fontFamily:"'DM Sans',sans-serif",fontWeight:700,color:'var(--ink)',
                    marginBottom:4,paddingBottom:2,borderBottom:'1px solid var(--border)'}}>
                    {name}
                  </div>
                  {groups[name].map(goal => {
                    const {actual,periodPct,targetPace,expectedAtPace,aheadBehind} = goalProgressFull(goal);
                    const pct=Math.min(100,(actual/goal.target)*100);
                    const done=pct>=100, ahead=aheadBehind>=0;
                    return (
                      <div key={goal.id} style={{marginBottom:6,padding:'6px 8px',background:'white',
                        borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',boxShadow:'0 1px 2px var(--shadow)'}}>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                          <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",textTransform:'uppercase',letterSpacing:'0.05em',fontWeight:700,
                            background:goal.period==='week'?'var(--blue-light)':goal.period==='month'?'var(--accent-light)':'var(--gold-light)',
                            color:goal.period==='week'?'var(--blue)':goal.period==='month'?'var(--accent)':'var(--gold)',
                            padding:'1px 5px',borderRadius:3}}>{goal.period}</span>
                          <div style={{display:'flex',alignItems:'center',gap:4}}>
                            <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:ahead?'var(--accent)':'var(--red)',fontWeight:700}}>
                              {ahead?'▲':'▼'}{Math.abs(Math.round(aheadBehind))} vs target
                            </span>
                            <button onClick={()=>deleteGoal(goal.id)}
                              style={{background:'none',border:'none',cursor:'pointer',fontSize:11,color:'var(--ink-faint)',padding:'0 1px',opacity:0.5,lineHeight:1}}>✕</button>
                          </div>
                        </div>
                        <div className="fitness-goal-bar-bg" style={{position:'relative',marginBottom:4}}>
                          <div style={{position:'absolute',top:0,left:0,height:'100%',width:`${periodPct}%`,background:'rgba(0,0,0,0.08)',borderRadius:3,zIndex:0}}/>
                          <div className={`fitness-goal-bar-fill ${done?'done':''}`} style={{width:`${Math.min(100,pct)}%`,position:'relative',zIndex:1}}/>
                        </div>
                        <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:'var(--ink-faint)',lineHeight:1.6}}>
                          <div>{actual.toLocaleString()} / {goal.target.toLocaleString()} {goal.unit} · {periodPct}% thru {goal.period}{done&&' 🎉'}</div>
                          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                            <span style={{color:'var(--ink-light)'}}>should be: <b style={{color:ahead?'var(--accent)':'var(--red)'}}>{targetPace.toLocaleString()}</b></span>
                            <span>on pace for: <b style={{color:'var(--ink)'}}>{expectedAtPace.toLocaleString()}</b></span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              ));
            })()}
          </div>
        )}

        <div style={{borderTop:'1px solid var(--border)',marginTop:8,paddingTop:8}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
            <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Exercise Library</span>
            <button className="add-btn" onClick={()=>setShowLibManager(true)}>⚙</button>
          </div>
          {fitnessExercises.length===0 && <div style={{fontSize:11,color:'var(--ink-faint)',fontStyle:'italic',padding:'4px 6px'}}>No exercises yet — click ⚙</div>}
          {Object.entries(categorized).map(([cat,items]) => (
            <div key={cat}>
              <div className="ex-lib-cat">{cat}</div>
              {items.map(ex => (
                <div key={ex.id} className="ex-lib-item">
                  <span style={{fontSize:11,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ex.name}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>

      {/* MAIN */}
      <div className="fitness-main">
        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:0}}>
            <div className="fitness-day-label">
              {fitView==='day'
                ? `${DAYS[selectedDate.getDay()]}, ${MONTHS[selectedDate.getMonth()].slice(0,3)} ${selectedDate.getDate()}, ${viewYear}`
                : fitView==='week'
                  ? `Week of ${MONTHS[weekStart.getMonth()].slice(0,3)} ${weekStart.getDate()}`
                  : `${MONTHS[viewMonth]} ${viewYear}`}
            </div>
          </div>
          <div className="fitness-view-tabs">
            {['day','week','month'].map(v => (
              <button key={v} className={`fitness-view-tab ${fitView===v?'active':''}`} onClick={()=>setFitView(v)}>
                {v.charAt(0).toUpperCase()+v.slice(1)}
              </button>
            ))}
          </div>
          {fitView==='day' && (
            <button onClick={()=>setShowExPicker({dk:dateKey})}
              style={{background:'var(--accent)',color:'white',border:'none',borderRadius:'var(--radius-md)',
                padding:'7px 16px',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif",flexShrink:0}}>
              + Exercise
            </button>
          )}
        </div>

        {/* DAY VIEW */}
        {fitView==='day' && (()=>{
          const exs = getDayExercises(dateKey);
          return (
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {exs.length===0 && (
                <div style={{textAlign:'center',padding:'40px 20px',color:'var(--ink-faint)',fontSize:13,fontStyle:'italic'}}>
                  No exercises logged for this day.<br/><span style={{fontSize:11}}>Tap "+ Exercise" to start.</span>
                </div>
              )}
              {exs.map(ex => renderExerciseBlock(dateKey, ex))}
            </div>
          );
        })()}

        {/* WEEK VIEW */}
        {fitView==='week' && (
          <div className="fitness-week-grid">
            {weekDays.map(d => {
              const dk=fmt(d), isToday=isSameDay(d,today);
              const dayExs = getDayExercises(dk);
              return (
                <div key={dk} className={`fitness-week-col ${isToday?'today':''}`}
                  onClick={()=>{ setSelectedDate(d); setFitView('day'); }}>
                  <div className="fitness-week-col-hdr">
                    <div className="fitness-week-col-day">{DAYS[d.getDay()].slice(0,3)}</div>
                    <div className="fitness-week-col-date">{d.getDate()}</div>
                  </div>
                  <div className="fitness-week-col-body">
                    {dayExs.map(ex => (
                      <div key={ex.id} className="fitness-week-workout-pill" title={exName(ex.exerciseId)}>
                        {exName(ex.exerciseId)}
                      </div>
                    ))}
                    {dayExs.length===0 && <div style={{fontSize:9,color:'var(--ink-faint)',fontStyle:'italic',padding:'4px 0',textAlign:'center'}}>Rest</div>}
                    <button className="fitness-week-add" onClick={e=>{e.stopPropagation();setShowExPicker({dk});}} title="Add exercise">+ Add</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* WEEK GOALS */}
        {fitView==='week' && fitnessGoals.filter(g=>g.period==='week').length>0 && (
          <div style={{background:'var(--paper)',borderRadius:'var(--radius-md)',border:'1px solid var(--border)',padding:'12px 16px',marginTop:4}}>
            <div style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>
              Weekly Goals — {Math.round((weekDays.filter(d=>d<=today).length/7)*100)}% of week elapsed
            </div>
            {fitnessGoals.filter(g=>g.period==='week').map(goal => {
              const {actual,periodPct,targetPace,expectedAtPace,aheadBehind}=goalProgressFull(goal,today);
              const pct=Math.min(100,(actual/goal.target)*100), done=pct>=100, ahead=aheadBehind>=0;
              return (
                <div key={goal.id} style={{marginBottom:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                    <span style={{fontSize:12,fontFamily:"'DM Sans',sans-serif",fontWeight:600,color:'var(--ink)'}}>{exName(goal.exerciseId)}</span>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:'var(--ink-light)'}}>{actual.toLocaleString()} / {goal.target.toLocaleString()} {goal.unit}</span>
                      <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",fontWeight:700,color:ahead?'var(--accent)':'var(--red)'}}>
                        {ahead?'▲':'▼'}{Math.abs(Math.round(aheadBehind))} vs target
                      </span>
                      {done&&<span>🎉</span>}
                    </div>
                  </div>
                  <div className="fitness-goal-bar-bg" style={{position:'relative',height:8,borderRadius:4}}>
                    <div style={{position:'absolute',top:0,left:0,height:'100%',width:`${periodPct}%`,background:'rgba(0,0,0,0.08)',borderRadius:4,zIndex:0}}/>
                    <div className={`fitness-goal-bar-fill ${done?'done':''}`} style={{width:`${Math.min(100,pct)}%`,height:'100%',borderRadius:4,position:'relative',zIndex:1}}/>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',marginTop:3,gap:8}}>
                    <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:'var(--ink-faint)'}}>Should be at: <b style={{color:ahead?'var(--accent)':'var(--red)'}}>{targetPace.toLocaleString()}</b></span>
                    <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:'var(--ink-faint)',fontStyle:'italic'}}>On pace for: <b style={{color:'var(--ink)',fontStyle:'normal'}}>{expectedAtPace.toLocaleString()}</b> / {goal.target.toLocaleString()}</span>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* MONTH VIEW */}
        {fitView==='month' && (
          <div>
            <div className="fitness-month-grid" style={{marginBottom:4}}>
              {DAYS.map(d=><div key={d} className="fitness-month-day-hdr">{d.slice(0,1)}</div>)}
            </div>
            <div className="fitness-month-grid">
              {Array.from({length:firstDayOfMonth},(_,i)=>(
                <div key={'empty'+i} className="fitness-month-cell empty"/>
              ))}
              {Array.from({length:daysInMonth},(_,i)=>{
                const d=new Date(viewYear,viewMonth,i+1), dk=fmt(d);
                const isToday=isSameDay(d,today), isPast=d<today&&!isToday;
                const dayExs=getDayExercises(dk);
                return (
                  <div key={dk} className={`fitness-month-cell ${isToday?'today':''}`}
                    style={{opacity:isPast?0.6:1, background:isPast&&dayExs.length===0?'var(--cream)':undefined}}
                    onClick={()=>{ setSelectedDate(d); setFitView('day'); }}>
                    <div className="fitness-month-cell-num">{i+1}</div>
                    <div style={{marginTop:3}}>
                      {dayExs.map(ex=>(
                        <div key={ex.id} className="fitness-week-workout-pill"
                          style={{fontSize:9,padding:'1px 4px',marginBottom:1}} title={exName(ex.exerciseId)}>
                          {exName(ex.exerciseId)}
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Month goals */}
            {fitnessGoals.filter(g=>g.period==='month').length>0 && (
              <div style={{background:'var(--paper)',borderRadius:'var(--radius-md)',border:'1px solid var(--border)',padding:'12px 16px',marginTop:12}}>
                <div style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>
                  Monthly Goals — {Math.round(Math.min(today.getDate(),daysInMonth)/daysInMonth*100)}% of month elapsed
                </div>
                {fitnessGoals.filter(g=>g.period==='month').map(goal=>{
                  const {actual,periodPct,targetPace,expectedAtPace,aheadBehind}=goalProgressFull(goal,today);
                  const pct=Math.min(100,(actual/goal.target)*100), done=pct>=100, ahead=aheadBehind>=0;
                  return (
                    <div key={goal.id} style={{marginBottom:12}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                        <span style={{fontSize:12,fontFamily:"'DM Sans',sans-serif",fontWeight:600,color:'var(--ink)'}}>{exName(goal.exerciseId)}</span>
                        <div style={{display:'flex',gap:8,alignItems:'center'}}>
                          <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:'var(--ink-light)'}}>{actual.toLocaleString()} / {goal.target.toLocaleString()} {goal.unit}</span>
                          <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",fontWeight:700,color:ahead?'var(--accent)':'var(--red)'}}>
                            {ahead?'▲':'▼'}{Math.abs(Math.round(aheadBehind))} vs target
                          </span>
                          {done&&<span>🎉</span>}
                        </div>
                      </div>
                      <div className="fitness-goal-bar-bg" style={{position:'relative',height:8,borderRadius:4}}>
                        <div style={{position:'absolute',top:0,left:0,height:'100%',width:`${periodPct}%`,background:'rgba(0,0,0,0.08)',borderRadius:4,zIndex:0}}/>
                        <div className={`fitness-goal-bar-fill ${done?'done':''}`} style={{width:`${Math.min(100,pct)}%`,height:'100%',borderRadius:4,position:'relative',zIndex:1}}/>
                      </div>
                      <div style={{display:'flex',justifyContent:'space-between',marginTop:3,gap:8}}>
                        <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:'var(--ink-faint)'}}>Should be at: <b style={{color:ahead?'var(--accent)':'var(--red)'}}>{targetPace.toLocaleString()}</b></span>
                        <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:'var(--ink-faint)',fontStyle:'italic'}}>On pace for: <b style={{color:'var(--ink)',fontStyle:'normal'}}>{expectedAtPace.toLocaleString()}</b> / {goal.target.toLocaleString()}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>

      {/* EXERCISE PICKER MODAL */}
      {showExPicker && (
        <ExercisePicker
          exercises={fitnessExercises}
          onAdd={exerciseId => { addExerciseToDay(showExPicker.dk, exerciseId); setShowExPicker(null); }}
          onAddNew={(name,category) => {
            const id = addExercise(name, category);
            if (id) setTimeout(()=>{ addExerciseToDay(showExPicker.dk, id); setShowExPicker(null); }, 50);
          }}
          onClose={()=>setShowExPicker(null)}
        />
      )}
      {showLibManager && <ExerciseLibraryManager exercises={fitnessExercises} onAdd={addExercise} onUpdate={updateExercise} onDelete={deleteExercise_lib} onClose={()=>setShowLibManager(false)} />}
      {showGoalManager && <GoalManager goals={fitnessGoals} exercises={fitnessExercises} onAdd={addGoal} onDelete={deleteGoal} onClose={()=>setShowGoalManager(false)} />}
    </div>
  );
}

// ─────────────────────────────────────────────
// GOAL MANAGER — add/remove fitness goals
// ─────────────────────────────────────────────

            <div style={{fontSize:12,color:'var(--ink-faint)',fontStyle:'italic'}}>Add exercises to the library first</div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              <select value={exId} onChange={e=>setExId(e.target.value)}
                style={{width:'100%',fontSize:12,fontFamily:"'DM Sans',sans-serif",border:'1px solid var(--border)',
                  borderRadius:'var(--radius-sm)',padding:'5px 8px',background:'white',color:'var(--ink)',outline:'none'}}>
                {exercises.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
              </select>
              <div style={{display:'flex',gap:6}}>
                <select value={period} onChange={e=>setPeriod(e.target.value)}
                  style={{flex:1,fontSize:12,fontFamily:"'DM Sans',sans-serif",border:'1px solid var(--border)',
                    borderRadius:'var(--radius-sm)',padding:'5px 6px',background:'white',color:'var(--ink)',outline:'none'}}>
                  <option value="week">Per Week</option>
                  <option value="month">Per Month</option>
                  <option value="year">Per Year</option>
                </select>
                <select value={unit} onChange={e=>setUnit(e.target.value)}
                  style={{flex:1,fontSize:12,fontFamily:"'DM Sans',sans-serif",border:'1px solid var(--border)',
                    borderRadius:'var(--radius-sm)',padding:'5px 6px',background:'white',color:'var(--ink)',outline:'none'}}>
                  <option value="reps">Reps</option>
                  <option value="sets">Sets</option>
                  <option value="volume">Volume (lbs)</option>
                </select>
              </div>
              <div style={{display:'flex',gap:6}}>
                <input type="number" min="1" value={target} onChange={e=>setTarget(e.target.value)}
                  placeholder="Target amount"
                  style={{flex:1,fontSize:12,fontFamily:"'DM Mono',monospace",border:'1px solid var(--border)',
                    borderRadius:'var(--radius-sm)',padding:'5px 8px',outline:'none',background:'white',color:'var(--ink)',boxSizing:'border-box'}}
                />
                <button onClick={()=>{ if(exId&&target){onAdd(exId,period,target,unit);setTarget('');} }}
                  disabled={!exId||!target}
                  style={{background:exId&&target?'var(--accent)':'var(--border)',border:'none',
                    borderRadius:'var(--radius-sm)',padding:'5px 16px',cursor:exId&&target?'pointer':'default',
                    fontSize:12,fontWeight:600,color:exId&&target?'white':'var(--ink-faint)'}}>
                  Add
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// EXERCISE PICKER — add exercise to a workout
// ─────────────────────────────────────────────
function ExercisePicker({ exercises, onAdd, onAddNew, onClose }) {
  const [search, setSearch] = useState('');
  const [newName, setNewName] = useState('');
  const [newCat, setNewCat] = useState('Strength');
  const searchRef = useRef();
  useEffect(() => { setTimeout(() => searchRef.current?.focus(), 50); }, []);

  const filtered = exercises.filter(e =>
    e.name.toLowerCase().includes(search.toLowerCase())
  );

  const grouped = FITNESS_CATEGORIES.reduce((acc, cat) => {
    const items = filtered.filter(e => (e.category || 'Other') === cat);
    if (items.length) acc[cat] = items;
    return acc;
  }, {});

  return (
    <div className="fitness-picker-overlay" onClick={onClose}>
      <div className="fitness-picker-modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'14px 16px 10px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
          <span style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:14,color:'var(--ink)'}}>Add Exercise</span>
          <button onClick={onClose}
            style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'var(--ink-faint)',lineHeight:1,padding:'0 2px'}}>✕</button>
        </div>
        <div style={{padding:'8px 12px 4px',flexShrink:0}}>
          <input ref={searchRef} value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search exercises…"
            style={{width:'100%',fontSize:12,fontFamily:"'DM Sans',sans-serif",
              border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',
              padding:'5px 9px',outline:'none',background:'white',color:'var(--ink)',boxSizing:'border-box'}}
          />
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'4px 8px'}}>
          {exercises.length === 0 && (
            <div style={{fontSize:12,color:'var(--ink-faint)',fontStyle:'italic',padding:'8px 4px'}}>
              No exercises in library yet — add one below
            </div>
          )}
          {Object.entries(grouped).map(([cat, items]) => (
            <div key={cat}>
              <div className="ex-lib-cat">{cat}</div>
              {items.map(ex => (
                <div key={ex.id}
                  style={{display:'flex',alignItems:'center',padding:'7px 6px',borderRadius:6,cursor:'pointer',transition:'background 0.1s'}}
                  onClick={()=>onAdd(ex.id)}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--cream)'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <span style={{fontSize:13,fontFamily:"'DM Sans',sans-serif",color:'var(--ink)',flex:1}}>{ex.name}</span>
                  <span style={{fontSize:10,color:'var(--accent)',fontFamily:"'DM Mono',monospace"}}>+ Add</span>
                </div>
              ))}
            </div>
          ))}
        </div>
        {/* New exercise */}
        <div style={{padding:'8px 12px 6px',borderTop:'1px solid var(--border)',flexShrink:0}}>
          <div style={{fontSize:9,color:'var(--ink-faint)',fontFamily:"'DM Mono',monospace",marginBottom:4,textTransform:'uppercase',letterSpacing:'0.05em'}}>+ New exercise:</div>
          <div style={{display:'flex',gap:6}}>
            <input value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>{ if(e.key==='Enter' && newName.trim()) onAddNew(newName.trim(), newCat); if(e.key==='Escape') onClose(); }}
              placeholder="Exercise name"
              style={{flex:1,fontSize:12,fontFamily:"'DM Sans',sans-serif",
                border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',
                padding:'5px 8px',outline:'none',background:'white',color:'var(--ink)',boxSizing:'border-box'}}
            />
            <select value={newCat} onChange={e=>setNewCat(e.target.value)}
              style={{fontSize:11,fontFamily:"'DM Sans',sans-serif",border:'1px solid var(--border)',
                borderRadius:'var(--radius-sm)',padding:'4px 6px',background:'white',color:'var(--ink)',outline:'none'}}>
              {FITNESS_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div style={{padding:'6px 12px 12px',display:'flex',justifyContent:'flex-end',flexShrink:0}}>
          <button onClick={()=>{ if(newName.trim()) onAddNew(newName.trim(), newCat); }}
            disabled={!newName.trim()}
            style={{background:newName.trim()?'var(--accent)':'var(--border)',border:'none',
              borderRadius:'var(--radius-sm)',padding:'5px 16px',cursor:newName.trim()?'pointer':'default',
              fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif",
              color:newName.trim()?'white':'var(--ink-faint)',transition:'all 0.15s'}}>
            Add New
          </button>
        </div>
      </div>
    </div>
  );
}

// EXERCISE LIBRARY MANAGER
// ─────────────────────────────────────────────

  const [newCat, setNewCat] = useState('Strength');

  const [confirmId, setConfirmId] = useState(null);

  const grouped = FITNESS_CATEGORIES.reduce((acc, cat) => {

    if (items.length) acc[cat] = items;
    return acc;
  }, {});

  return (
    <div className="fitness-picker-overlay" onClick={onClose}>
      <div className="fitness-picker-modal" style={{width:360,maxHeight:520}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'14px 16px 10px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
          <span style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:14,color:'var(--ink)'}}>Exercise Library</span>
          <button onClick={onClose}
            style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'var(--ink-faint)',lineHeight:1}}>✕</button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'8px 12px'}}>
          {exercises.length === 0 && (
            <div style={{fontSize:12,color:'var(--ink-faint)',fontStyle:'italic',padding:'8px 4px'}}>No exercises yet</div>

            <div key={cat} style={{marginBottom:8}}>
              <div className="ex-lib-cat">{cat}</div>

                <div key={ex.id} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 4px',borderRadius:6}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--cream)'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  {editId === ex.id ? (
                    <>
