function TaskCard({ task, onUpdate, onBlurSync, onDelete, onEnterKey, titleRef, deleteIfEmpty, onCopy, hasCopied, onPasteBelow, onShowCtxMenu, onDragStart, onDragOver, onDragEnd, onDrop, isDragOver, onApplyRepeat, onReschedule, weekDays, currentDayKey }) {
  const textareaRef = useRef();
  const [confirming, setConfirming] = useState(false);
  const [mobileConfirming, setMobileConfirming] = useState(false);
  const [showColors, setShowColors] = useState(false);
  const [repeatOpen, setRepeatOpen] = useState(false);
  const longPressTimer = useRef(null);

  // Auto-grow textarea
  useEffect(() => {
    if (textareaRef.current) {
      textareaRef.current.style.height = 'auto';
      textareaRef.current.style.height = textareaRef.current.scrollHeight + 'px';
    }
  }, [task.details, task.expanded]);

  // Cancel confirm if mouse leaves card
  function handleMouseLeave() { setConfirming(false); }

  function handleDeleteClick(e) {
    e.stopPropagation();
    if (confirming) {
      onDelete();
    } else {
      setConfirming(true);
    }
  }

  // Mobile long-press delete — only when onReschedule prop present (mobile context)
  function handleCardTouchStart(e) {
    if (['INPUT','TEXTAREA','BUTTON','SELECT'].includes(e.target.tagName)) return;
    longPressTimer.current = setTimeout(() => { setMobileConfirming(true); }, 600);
  }
  function handleCardTouchEnd() {
    if (longPressTimer.current) { clearTimeout(longPressTimer.current); longPressTimer.current = null; }
  }
  function handleCardTouchMove() {
    if (longPressTimer.current) { clearTimeout(longPressTimer.current); longPressTimer.current = null; }
  }

  return (
    <div className={`task-card ${task.done?'done':''} ${isDragOver?'drag-over':''} ${task.isEvent?'is-event':''}`}
      style={{
        background: task.isProjectTask && task.priority
          ? '#fee2e2'
          : task.customColor
            ? task.customColor + '55'
            : (task.isEvent ? EVENT_COLORS : TASK_COLORS)[(task.colorIndex ?? 0) % (task.isEvent ? EVENT_COLORS : TASK_COLORS).length],
        opacity: isDragOver ? 0.5 : 1,
        borderLeft: task.isProjectTask && task.priority ? '3px solid #dc2626' : undefined,
      }}
      onContextMenu={e=>{
        e.preventDefault(); e.stopPropagation();
        if(onShowCtxMenu) onShowCtxMenu(e.clientX, e.clientY, onCopy, onPasteBelow, hasCopied);
      }}
      draggable
      onDragStart={onDragStart}
      onDragOver={e=>{e.preventDefault();onDragOver();}}
      onDragEnd={onDragEnd}
      onDrop={e=>{e.preventDefault();e.stopPropagation();onDrop();}}
      onMouseLeave={handleMouseLeave}
      onTouchStart={onReschedule ? handleCardTouchStart : undefined}
      onTouchEnd={onReschedule ? handleCardTouchEnd : undefined}
      onTouchMove={onReschedule ? handleCardTouchMove : undefined}>
      <button
        className={`task-delete-btn ${confirming?'confirming':''}`}
        title={confirming ? 'Click again to confirm delete' : 'Delete task'}
        onClick={handleDeleteClick}>
        {confirming ? 'Delete?' : '✕'}
      </button>
      <div className="task-card-header">
        {task.isProjectTask ? (
          <span className="task-type-btn event" title={`From project: ${task.projectTitle||''}`}
            style={{cursor:'default',fontSize:14}}>📝</span>
        ) : (
          <button
            className={`task-type-btn ${task.isEvent?'event':''}`}
            title={task.isEvent ? 'Event — click to make Task' : 'Task — click to make Event'}
            onClick={e=>{e.stopPropagation();onUpdate({isEvent:!task.isEvent});}}>
            {task.isEvent ? '📅' : '⠿'}
          </button>
        )}
        <div className={`task-check ${task.done?'done':''}`}
          style={{borderColor: task.done ? '#2d5a3d' : undefined, color: task.done ? '#2d5a3d' : undefined, background: task.done ? '#e8f0eb' : undefined}}
          onClick={()=>onUpdate({done:!task.done})} />
        <div style={{flex:1,minWidth:0}}>
          <input
            ref={el=>{if(titleRef)titleRef(el);}}
            className="task-title-input"
            placeholder={task.isEvent ? 'Event…' : 'Task…'}
            value={task.title}
            onChange={e=>onUpdate({title:e.target.value})}
            onBlur={()=>{
              if(onBlurSync && task.isEvent) onBlurSync();
              if(deleteIfEmpty) deleteIfEmpty();
            }}
            onKeyDown={e=>{
              if(e.key==='Enter' && !task.isEvent && !task.isProjectTask){
                e.preventDefault();
                if(onEnterKey) onEnterKey();
              }
            }}
            onClick={e=>e.stopPropagation()}
            readOnly={!!task.isProjectTask}
            style={{...(task.isProjectTask ? {cursor:'default'} : {}), width:'100%'}}
          />
          {task.isProjectTask && task.projectTitle && (
            <div className="project-task-badge" title={`From: ${task.projectTitle}`}>
              {task.projectTitle}
            </div>
          )}
        </div>
        {task.isProjectTask && (
          <button
            onClick={e=>{e.stopPropagation();onUpdate({priority:!task.priority});}}
            title={task.priority ? 'Mark normal priority' : 'Mark as priority'}
            style={{
              background:'none', border:'none', cursor:'pointer', fontSize:14,
              color: task.priority ? '#dc2626' : 'var(--ink-faint)',
              padding:'0 2px', transition:'color 0.15s', flexShrink:0,
            }}>
            {task.priority ? '★' : '☆'}
          </button>
        )}
        {mobileConfirming && onReschedule ? (
          <>
            <button className="task-mobile-delete-btn"
              onClick={e=>{e.stopPropagation();onDelete();}}>
              Delete?
            </button>
            <button onClick={e=>{e.stopPropagation();setMobileConfirming(false);}}
              style={{background:'none',border:'none',cursor:'pointer',fontSize:13,
                      color:'var(--ink-faint)',padding:'0 4px',flexShrink:0}}>✕</button>
          </>
        ) : (
          <button className="task-expand-btn"
            onClick={()=>{setMobileConfirming(false);onUpdate({expanded:!task.expanded});}}>
            {task.expanded ? '▲' : '▼'}
          </button>
        )}
      </div>
      {task.expanded && (
        <div className="task-details">
          <textarea ref={textareaRef} className="task-details-input" placeholder="Details…"
            value={task.details||''} onChange={e=>onUpdate({details:e.target.value})}
            onBlur={()=>onBlurSync && task.isEvent && onBlurSync()}
            rows={2} />
          {task.isEvent && (
            <div style={{display:'flex',alignItems:'center',gap:6,paddingTop:4}} onClick={e=>e.stopPropagation()}>
              <span style={{fontSize:10,color:'var(--ink-faint)',fontFamily:"'DM Mono',monospace"}}>Time:</span>
              <TimeSelect value={task.eventTime||''} onChange={v=>onUpdate({eventTime:v})} />
            </div>
          )}
          <div style={{display:'flex',alignItems:'center',gap:6,paddingTop:6}}>
            <button className="task-color-toggle" onClick={e=>{e.stopPropagation();setShowColors(s=>!s);}}>
              <span style={{
                display:'inline-block',width:10,height:10,borderRadius:'50%',
                background:(task.isEvent?EVENT_COLORS:TASK_COLORS)[task.colorIndex??0],
                border:'1.5px solid rgba(0,0,0,0.2)',marginRight:4,verticalAlign:'middle'
              }}/>
              Color {showColors ? '▲' : '▼'}
            </button>
          </div>
          {showColors && (
            <div className="task-color-picker" onClick={e=>e.stopPropagation()}>
              {(task.isEvent?EVENT_COLORS:TASK_COLORS).map((c,i)=>(
                <div key={i} className={`task-color-swatch ${(task.colorIndex??0)===i?'active':''}`}
                  style={{background:c}}
                  onClick={e=>{e.stopPropagation();onUpdate({colorIndex:i,customColor:undefined});setShowColors(false);}}
                  title={`Color ${i+1}`} />
              ))}
              <div style={{display:'flex',alignItems:'center',gap:4,width:'100%',marginTop:4,paddingTop:4,borderTop:'1px solid rgba(0,0,0,0.07)'}}>
                <span style={{fontSize:10,color:'var(--ink-faint)',fontFamily:"'DM Mono',monospace",flexShrink:0}}>Custom:</span>
                <input type="color"
                  value={task.customColor || (task.isEvent?EVENT_COLORS:TASK_COLORS)[task.colorIndex??0]}
                  onChange={e=>{e.stopPropagation();onUpdate({customColor:e.target.value,colorIndex:-1});}}
                  style={{width:28,height:22,border:'none',borderRadius:4,cursor:'pointer',padding:0,background:'none'}}
                  onClick={e=>e.stopPropagation()}
                />
              </div>
            </div>
          )}
          {/* ── Reschedule (mobile only) ── */}
          {onReschedule && weekDays && (
            <div style={{paddingTop:6,borderTop:'1px solid rgba(0,0,0,0.07)',marginTop:6}} onClick={e=>e.stopPropagation()}>
              <div style={{fontSize:10,color:'var(--ink-faint)',fontFamily:"'DM Mono',monospace",marginBottom:5}}>📅 Reschedule:</div>
              <div style={{display:'flex',gap:4}}>
                {weekDays.map((d,i)=>{
                  const dk = fmt(d);
                  const isCurrentDay = dk === currentDayKey;
                  return (
                    <button key={i}
                      onClick={e=>{ e.stopPropagation(); if(!isCurrentDay) onReschedule(dk); }}
                      style={{
                        width:30, height:30, borderRadius:'50%', border:'1.5px solid',
                        borderColor: isCurrentDay ? 'var(--accent)' : 'var(--border)',
                        background: isCurrentDay ? 'var(--accent)' : 'white',
                        color: isCurrentDay ? 'white' : 'var(--ink-light)',
                        fontFamily:"'DM Mono',monospace", fontSize:10, fontWeight:600,
                        cursor: isCurrentDay ? 'default' : 'pointer',
                        display:'flex', alignItems:'center', justifyContent:'center',
                        transition:'all 0.12s', flexShrink:0,
                      }}>
                      {DAYS[d.getDay()].slice(0,1)}
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── Repeat ── */}
          {!task.isProjectTask && (
            <div style={{paddingTop:6,borderTop:'1px solid rgba(0,0,0,0.07)',marginTop:6}} onClick={e=>e.stopPropagation()}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <button
                  className={`task-repeat-toggle ${task.repeat?.days?.length ? 'active' : ''}`}
                  onClick={e=>{
                    e.stopPropagation();
                    if (task.repeat === null || task.repeat === undefined) {
                      // Turn on repeat + open panel
                      onUpdate({repeat:{days:[], endDate:''}});
                      setRepeatOpen(true);
                    } else {
                      // Toggle panel open/closed (repeat stays saved)
                      setRepeatOpen(o => !o);
                    }
                  }}>
                  🔁 Repeat {(task.repeat !== null && task.repeat !== undefined) ? (repeatOpen ? '▲' : '▼') : '▼'}
                </button>
                {task.repeat?.days?.length > 0 && (
                  <span className="task-repeat-badge">
                    {['S','M','T','W','T','F','S'].filter((_,i)=>task.repeat.days.includes(i)).join('')}
                    {task.repeat.endDate ? ` until ${task.repeat.endDate}` : ''}
                  </span>
                )}
                {/* Clear repeat entirely */}
                {task.repeat !== null && task.repeat !== undefined && (
                  <button onClick={e=>{e.stopPropagation();onUpdate({repeat:null});setRepeatOpen(false);}}
                    style={{background:'none',border:'none',cursor:'pointer',fontSize:11,color:'var(--ink-faint)',padding:'0 2px',marginLeft:'auto'}}>
                    ✕ clear
                  </button>
                )}
              </div>
              {(task.repeat !== null && task.repeat !== undefined) && repeatOpen && (
                <div>
                  <div className="task-repeat-days">
                    {['S','M','T','W','T','F','S'].map((d,i)=>(
                      <button key={i}
                        className={`task-repeat-day-btn ${(task.repeat?.days||[]).includes(i)?'active':''}`}
                        onClick={e=>{
                          e.stopPropagation();
                          const cur = task.repeat?.days||[];
                          const next = cur.includes(i) ? cur.filter(x=>x!==i) : [...cur,i].sort((a,b)=>a-b);
                          const updated = {...(task.repeat||{}), days:next};
                          onUpdate({repeat:updated});
                          if (updated.endDate && next.length > 0 && onApplyRepeat) {
                            onApplyRepeat(next, updated.endDate);
                          }
                        }}>
                        {d}
                      </button>
                    ))}
                  </div>
                  <div className="task-repeat-end">
                    <span className="task-repeat-end-label" style={{color: !task.repeat?.endDate && (task.repeat?.days||[]).length > 0 ? '#ef4444' : undefined}}>
                      Until{!task.repeat?.endDate && (task.repeat?.days||[]).length > 0 ? '*' : ''}:
                    </span>
                    <input type="date" className="task-repeat-end-input"
                      value={task.repeat?.endDate||''}
                      style={{borderColor: !task.repeat?.endDate && (task.repeat?.days||[]).length > 0 ? '#ef4444' : undefined}}
                      onChange={e=>{
                        e.stopPropagation();
                        const updated = {...(task.repeat||{}), endDate:e.target.value};
                        onUpdate({repeat:updated});
                        if (e.target.value && (updated.days||[]).length > 0 && onApplyRepeat) {
                          onApplyRepeat(updated.days, e.target.value);
                        }
                      }}
                      onClick={e=>e.stopPropagation()}
                    />
                  </div>
                </div>
              )}
            </div>
          )}
          {/* Mobile delete — only in expanded section, only in mobile context */}
          {onReschedule && (
            <div style={{paddingTop:8,marginTop:6,borderTop:'1px solid rgba(0,0,0,0.07)',display:'flex',justifyContent:'flex-end'}}
              onClick={e=>e.stopPropagation()}>
              {mobileConfirming ? (
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <button className="task-mobile-delete-btn"
                    onClick={e=>{e.stopPropagation();onDelete();}}>
                    Delete?
                  </button>
                  <button onClick={e=>{e.stopPropagation();setMobileConfirming(false);}}
                    style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--ink-faint)',padding:'0 4px'}}>✕</button>
                </div>
              ) : (
                <button onClick={e=>{e.stopPropagation();setMobileConfirming(true);}}
                  style={{background:'none',border:'1px solid #fca5a5',borderRadius:4,cursor:'pointer',
                          fontSize:11,color:'#ef4444',padding:'3px 10px',fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>
                  Delete
                </button>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// HABIT TRACKER
// ─────────────────────────────────────────────
function HabitTracker({ onGoToPlanner, onGoToMetrics, goals, setGoals, completions, setCompletions, metrics, setMetrics, qty, setQty, notes, setNotes }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const [selectedDate, setSelectedDateRaw] = useState(() => {
    const saved = parseLocal(sessionStorage.getItem('lp_habitDate'));
    return saved || today;
  });
  const setSelectedDate = (v) => setSelectedDateRaw(prev => {
    const next = typeof v === 'function' ? v(prev) : v;
    sessionStorage.setItem('lp_habitDate', fmtLocal(next));
    return next;
  });
  const [view, setViewRaw] = useState(() => sessionStorage.getItem('lp_habitView') || 'monthly'); // daily, weekly, monthly, yearly
  const setView = (v) => { sessionStorage.setItem('lp_habitView', v); setViewRaw(v); };
  const [filterGoal, setFilterGoal] = useState(null); // null = all
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [expandedGoals, setExpandedGoals] = useState({}); // {goalId: bool} for sidebar
  const [dragGoalId, setDragGoalId] = useState(null);
  const [dragOverGoalId, setDragOverGoalId] = useState(null);

  function isCompleted(goalId, dateKey) {
    return (completions[dateKey]||[]).includes(goalId);
  }
  function toggleCompletion(goalId, dateKey) {
    setCompletions(c => {
      const arr = c[dateKey]||[];
      const has = arr.includes(goalId);
      return { ...c, [dateKey]: has ? arr.filter(x=>x!==goalId) : [...arr, goalId] };
    });
  }

  // Metrics helpers (weight/cals per day)
  function getMetric(field) { return (metrics[selectedDayKey] || {})[field] || ''; }
  function setMetric(field, val) {
    setMetrics(m => ({...m, [selectedDayKey]: {...(m[selectedDayKey]||{}), [field]: val}}));
  }

  // Qty helpers (amount per goal per day)
  function getQty(goalId) { return (qty[selectedDayKey] || {})[goalId] || ''; }
  function setGoalQty(goalId, val) {
    setQty(q => ({...q, [selectedDayKey]: {...(q[selectedDayKey]||{}), [goalId]: val}}));
  }
  function getNote(goalId) { return (notes[selectedDayKey] || {})[goalId] || ''; }
  function setGoalNote(goalId, val) {
    setNotes(n => ({...n, [selectedDayKey]: {...(n[selectedDayKey]||{}), [goalId]: val}}));
  }
  function reorderGoals(fromId, toId) {
    setGoals(gs => {
      const from = gs.findIndex(g => g.id === fromId);
      const to   = gs.findIndex(g => g.id === toId);
      if (from === -1 || to === -1) return gs;
      const next = [...gs];
      const [moved] = next.splice(from, 1);
      next.splice(to, 0, moved);
      return next;
    });
  }

  function addGoal() {
    const id = 'g'+Date.now();
    setGoals(g=>[...g, {id, name:'New Goal', color: GOAL_COLORS[g.length % GOAL_COLORS.length]}]);
  }
  function updateGoal(id, patch) { setGoals(g=>g.map(x=>x.id===id?{...x,...patch}:x)); }
  function deleteGoal(id) { setGoals(g=>g.filter(x=>x.id!==id)); }

  // Count completions for a goal in current view window
  function countInView(goalId) {
    let dates = [];
    if (view==='daily') { dates=[fmt(selectedDate)]; }
    else if (view==='weekly') {
      const ws=getWeekStart(selectedDate);
      dates=Array.from({length:7},(_,i)=>fmt(addDays(ws,i)));
    }
    else if (view==='monthly') {
      const d=new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
      const m=d.getMonth();
      while(d.getMonth()===m) { dates.push(fmt(d)); d.setDate(d.getDate()+1); }
    }
    else { // yearly
      const d=new Date(selectedDate.getFullYear(),0,1);
      while(d.getFullYear()===selectedDate.getFullYear()) { dates.push(fmt(d)); d.setDate(d.getDate()+1); }
    }
    return dates.filter(dk=>isCompleted(goalId,dk)).length;
  }

  function calcStreak(goalId) {
    const todayDate = new Date(); todayDate.setHours(0,0,0,0);
    const todayKey = fmt(todayDate);
    // If today is completed, start counting from today, else start from yesterday
    let cursor = isCompleted(goalId, todayKey)
      ? new Date(todayDate)
      : addDays(todayDate, -1);
    let streak = 0;
    while (true) {
      const dk = fmt(cursor);
      if (isCompleted(goalId, dk)) {
        streak++;
        cursor = addDays(cursor, -1);
      } else {
        break;
      }
    }
    return streak;
  }

  const selectedDayKey = fmt(selectedDate);

  const displayGoals = filterGoal ? goals.filter(g=>g.id===filterGoal) : goals;

  return (
    <div className="main-content">
      {/* SIDEBAR — collapsible */}
      <div className={`sidebar-wrap ${sidebarCollapsed ? 'collapsed' : ''}`}>
      <div className="sidebar habit-sidebar">
        <div className="date-nav">
          <button className="nav-arrow" onClick={()=>setSelectedDate(d=>addDays(d,-1))}>‹</button>
          <span className="date-nav-label">
            {DAYS[selectedDate.getDay()].slice(0,3)}, {MONTHS[selectedDate.getMonth()].slice(0,3)} {selectedDate.getDate()}, {selectedDate.getFullYear()}
          </span>
          <button className="nav-arrow" onClick={()=>setSelectedDate(d=>addDays(d,1))}>›</button>
        </div>

        {/* Weight + Cal/Pts fields */}
        <div style={{display:'flex',gap:8,marginBottom:12,padding:'8px 0',borderBottom:'1px solid var(--border)',alignItems:'flex-end'}}>          <div style={{flex:1,display:'flex',flexDirection:'column',gap:3}}>
            <label style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Weight</label>
            <input type="number" step="0.1"
              className="goal-name-input"
              style={{width:'100%',textAlign:'center',fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:600}}
              placeholder="—"
              value={getMetric('weight')}
              onChange={e=>setMetric('weight', e.target.value)}
              onClick={e=>e.stopPropagation()}
            />
          </div>
          <div style={{flex:1,display:'flex',flexDirection:'column',gap:3}}>
            <label style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Cal/Pts</label>
            <input type="number" step="1"
              className="goal-name-input"
              style={{width:'100%',textAlign:'center',fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:600}}
              placeholder="—"
              value={getMetric('cals')}
              onChange={e=>setMetric('cals', e.target.value)}
              onClick={e=>e.stopPropagation()}
            />
          </div>
          <button
            onClick={onGoToMetrics}
            title="View Metrics Charts"
            style={{background:'none',border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',
                    padding:'4px 7px',fontSize:15,color:'var(--accent)',flexShrink:0,marginBottom:1}}>
            📈
          </button>
        </div>

        <div className="checklist-header" style={{marginBottom:8}}>
          <div>
            <div className="sidebar-section-title">Habits</div>
            <div style={{fontSize:10,color:'var(--ink-faint)',fontFamily:"'DM Mono',monospace",marginTop:1}}>click row to filter</div>
          </div>
          <button className="add-btn" onClick={addGoal}>+</button>
        </div>

        {goals.map(goal=>{
          const isExpanded = !!expandedGoals[goal.id];
          const isDragOver = dragOverGoalId === goal.id;
          return (
          <div key={goal.id}
            className={`goal-item ${filterGoal===goal.id?'selected':''} ${isDragOver?'drag-over':''}`}
            style={{
              flexDirection:'column', alignItems:'stretch', padding:0,
              borderColor: filterGoal===goal.id ? goal.color : isDragOver ? 'var(--accent)' : undefined,
              background: filterGoal===goal.id ? goal.color+'15' : undefined,
              opacity: dragGoalId === goal.id ? 0.4 : 1,
            }}
            draggable
            onDragStart={e=>{ e.stopPropagation(); setDragGoalId(goal.id); e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',goal.id); }}
            onDragEnd={()=>{ setDragGoalId(null); setDragOverGoalId(null); }}
            onDragOver={e=>{ e.preventDefault(); e.stopPropagation(); setDragOverGoalId(goal.id); }}
            onDrop={e=>{ e.preventDefault(); e.stopPropagation(); if(dragGoalId && dragGoalId!==goal.id) reorderGoals(dragGoalId, goal.id); setDragGoalId(null); setDragOverGoalId(null); }}
          >
            {/* Main row */}
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',cursor:'pointer'}}
              onClick={()=>setFilterGoal(filterGoal===goal.id?null:goal.id)}
              title={filterGoal===goal.id?'Click to show all goals':'Click to filter by this goal'}>
              <ColorPicker value={goal.color} onChange={c=>{updateGoal(goal.id,{color:c});}} />
              <div className={`goal-check ${isCompleted(goal.id,selectedDayKey)?'checked':''}`}
                style={{color:goal.color}}
                onClick={e=>{e.stopPropagation();toggleCompletion(goal.id,selectedDayKey);}} />
              <input className="goal-name-input" value={goal.name}
                onChange={e=>updateGoal(goal.id,{name:e.target.value})}
                onClick={e=>e.stopPropagation()} />
              <span className="goal-count" style={{flexShrink:0}}>
                {countInView(goal.id)}
                <span style={{margin:'0 3px',opacity:0.6}}>·</span>
                <span title="Current streak" style={{color:'var(--gold)'}}>🔥{calcStreak(goal.id)}</span>
              </span>
              <button
                style={{background:'none',border:'none',cursor:'pointer',fontSize:11,color:'var(--ink-faint)',padding:'0 2px',flexShrink:0}}
                onClick={e=>{e.stopPropagation();setExpandedGoals(ex=>({...ex,[goal.id]:!ex[goal.id]}));}}
                title="Qty & notes">
                {isExpanded ? '▲' : '▼'}
              </button>
              <button className="delete-item-btn" style={{opacity:0}} onClick={e=>{e.stopPropagation();deleteGoal(goal.id);}}
                onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=0}>✕</button>
            </div>
            {/* Expanded section */}
            {isExpanded && (
              <div style={{padding:'4px 8px 8px 8px',display:'flex',flexDirection:'column',gap:6,borderTop:'1px solid var(--border)'}}
                onClick={e=>e.stopPropagation()}>
                {/* Schedule */}
                <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                  <span style={{fontSize:10,color:'var(--ink-faint)',fontFamily:"'DM Mono',monospace",flexShrink:0}}>Schedule:</span>
                  <div className="habit-schedule-selector">
                    {[['none','—'],['daily','Daily'],['xweek','x/Week'],['quota','Quota']].map(([val,label])=>(
                      <button key={val} className={`habit-schedule-btn ${(goal.schedule||'none')===val?'active':''}`}
                        onClick={e=>{e.stopPropagation();updateGoal(goal.id,{schedule:val==='none'?undefined:val});}}>
                        {label}
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:10,color:'var(--ink-faint)',fontFamily:"'DM Mono',monospace",flexShrink:0}}>Qty:</span>
                  <input type="number" min="0" step="1"
                    className="habit-qty-input"
                    placeholder="—"
                    value={getQty(goal.id)}
                    onChange={e=>setGoalQty(goal.id, e.target.value)}
                    onClick={e=>e.stopPropagation()}
                    style={{width:60}}
                  />
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:2}}>
                  <span style={{fontSize:10,color:'var(--ink-faint)',fontFamily:"'DM Mono',monospace"}}>Notes:</span>
                  <textarea
                    rows={2}
                    style={{width:'100%',fontSize:12,fontFamily:"'DM Sans',sans-serif",border:'1px solid var(--border)',borderRadius:4,padding:'4px 6px',resize:'vertical',outline:'none',background:'white',color:'var(--ink)',boxSizing:'border-box'}}
                    placeholder="Notes for today…"
                    value={getNote(goal.id)}
                    onChange={e=>setGoalNote(goal.id, e.target.value)}
                    onClick={e=>e.stopPropagation()}
                  />
                </div>
              </div>
            )}
          </div>
          );
        })}

        <div style={{flex:1}}/>
        <div className="sidebar-links">
          <button className="sidebar-link planner" onClick={onGoToPlanner}>📅 Weekly Planner</button>
        </div>
      </div>{/* end habit-sidebar */}
      <div className="sidebar-toggle-strip" onClick={()=>setSidebarCollapsed(c=>!c)}
        title={sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'}>
        <div className="sidebar-toggle-btn">{sidebarCollapsed ? '›' : '‹'}</div>
        <span className="sidebar-collapsed-label">Habits</span>
      </div>
      </div>{/* end sidebar-wrap */}

      {/* MAIN */}
      {(() => {
        const habitSwipe = useSwipe(
          () => setSelectedDate(d => addDays(d, view==='daily'?1:view==='weekly'?7:view==='monthly'?31:365)),
          () => setSelectedDate(d => addDays(d, view==='daily'?-1:view==='weekly'?-7:view==='monthly'?-31:-365))
        );
        return (
      <div className="habit-main" {...habitSwipe}>
        <div className="habit-header-row">
          <div className="view-tabs">
            {['daily','weekly','monthly','yearly'].map(v=>(
              <button key={v} className={`view-tab ${view===v?'active':''}`}
                onClick={()=>setView(v)}>
                {v.charAt(0).toUpperCase()+v.slice(1)}
              </button>
            ))}
          </div>
          <div style={{flex:1}}/>
        </div>

        {/* GOAL FILTER CHIPS */}
        <div className="goal-filter-row">
          <div className={`goal-filter-chip ${!filterGoal?'active':''}`} onClick={()=>setFilterGoal(null)}>
            All
          </div>
          {goals.map(g=>(
            <div key={g.id} className={`goal-filter-chip ${filterGoal===g.id?'active':''}`}
              onClick={()=>setFilterGoal(filterGoal===g.id?null:g.id)}
              style={filterGoal===g.id?{}:{borderColor:g.color, color:g.color}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:g.color,display:'inline-block'}}/>
              {g.name}
            </div>
          ))}
        </div>

        {/* Nav arrows — above calendar, centered */}
        <div style={{display:'flex',justifyContent:'center',alignItems:'center',padding:'4px 0 8px',borderBottom:'1px solid var(--border)',marginBottom:'8px'}}>
          <HabitNavArrows view={view} date={selectedDate} onChange={setSelectedDate}/>
        </div>

        {view==='monthly' && <>
          <MonthlyView date={selectedDate} selected={selectedDate} goals={displayGoals} completions={completions}
            qty={qty} notes={notes}
            onDayClick={setSelectedDate} today={today} />
          <HabitChecklist date={selectedDate} goals={goals} completions={completions}
            onToggle={toggleCompletion} onAdd={addGoal} onDelete={deleteGoal} onRename={updateGoal}
            onReorder={reorderGoals}
            onGoToMetrics={onGoToMetrics}
            getMetric={getMetric} setMetric={setMetric}
            getQty={getQty} setGoalQty={setGoalQty}
            getNote={getNote} setGoalNote={setGoalNote}
            countInView={countInView} calcStreak={calcStreak} />
        </>}
        {view==='weekly' && <>
          <WeeklyHabitView date={selectedDate} selected={selectedDate} goals={displayGoals} completions={completions} today={today} qty={qty} notes={notes} onDayClick={setSelectedDate} />
          <HabitChecklist date={selectedDate} goals={goals} completions={completions}
            onToggle={toggleCompletion} onAdd={addGoal} onDelete={deleteGoal} onRename={updateGoal}
            onReorder={reorderGoals}
            onGoToMetrics={onGoToMetrics}
            getMetric={getMetric} setMetric={setMetric}
            getQty={getQty} setGoalQty={setGoalQty}
            getNote={getNote} setGoalNote={setGoalNote}
            countInView={countInView} calcStreak={calcStreak} />
        </>}
        {view==='yearly' && <>
          <YearlyView date={selectedDate} selected={selectedDate} goals={displayGoals} completions={completions} today={today} onDayClick={setSelectedDate} />
          <HabitChecklist date={selectedDate} goals={goals} completions={completions}
            onToggle={toggleCompletion} onAdd={addGoal} onDelete={deleteGoal} onRename={updateGoal}
            onReorder={reorderGoals}
            onGoToMetrics={onGoToMetrics}
            getMetric={getMetric} setMetric={setMetric}
            getQty={getQty} setGoalQty={setGoalQty}
            getNote={getNote} setGoalNote={setGoalNote}
            countInView={countInView} calcStreak={calcStreak} />
        </>}
        {view==='daily' && <DailyView date={selectedDate} goals={displayGoals} completions={completions}
          onToggle={(gid)=>toggleCompletion(gid,fmt(selectedDate))} />}
      </div>
      );})()}
    </div>
  );
}

function HabitChecklist({ date, goals, completions, onToggle, onAdd, onDelete, onRename, onReorder, onGoToMetrics, getMetric, setMetric, getQty, setGoalQty, getNote, setGoalNote, countInView, calcStreak }) {
  const dk = fmt(date);
  const [confirmId, setConfirmId] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [expandedGoals, setExpandedGoals] = useState({});
  const editRef = useRef();

  // Auto-focus when a new goal is added (it will be the last one with empty name)
  useEffect(() => {
    if (goals.length > 0) {
      const last = goals[goals.length - 1];
      if (last.name === 'New Goal') {
        setEditingId(last.id);
      }
    }
  }, [goals.length]);

  useEffect(() => {
    if (editingId && editRef.current) {
      editRef.current.focus();
      editRef.current.select();
    }
  }, [editingId]);

  function handleDelete(e, id) {
    e.stopPropagation();
    if (confirmId === id) { onDelete(id); setConfirmId(null); }
    else setConfirmId(id);
  }

  // Touch drag for reordering — uses native non-passive listener so preventDefault works
  const touchDragId = useRef(null);
  const touchDragEl = useRef(null);
  const itemsContainerRef = useRef(null);

  useEffect(() => {
    const el = itemsContainerRef.current;
    if (!el) return;
    function handleTouchMove(e) {
      if (touchDragId.current) e.preventDefault();
    }
    el.addEventListener('touchmove', handleTouchMove, {passive: false});
    return () => el.removeEventListener('touchmove', handleTouchMove);
  }, []);

  function onHandleTouchStart(e, id) {
    touchDragId.current = id;
    touchDragEl.current = e.currentTarget.closest('[data-goal-id]');
    if (touchDragEl.current) touchDragEl.current.style.opacity = '0.5';
    e.stopPropagation();
  }
  function onHandleTouchEnd(e) {
    if (!touchDragId.current) return;
    const touch = e.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const targetRow = el?.closest('[data-goal-id]');
    const targetId = targetRow?.getAttribute('data-goal-id');
    if (targetId && targetId !== touchDragId.current && onReorder) {
      onReorder(touchDragId.current, targetId);
    }
    if (touchDragEl.current) touchDragEl.current.style.opacity = '';
    touchDragId.current = null;
    touchDragEl.current = null;
    e.stopPropagation();
  }

  return (
    <div className="monthly-habit-checklist">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <div className="monthly-habit-checklist-title" style={{marginBottom:0}}>
          {DAYS[date.getDay()]}, {MONTHS[date.getMonth()].slice(0,3)} {date.getDate()}
        </div>
        <button className="add-btn" onClick={onAdd} title="Add habit">+</button>
      </div>

      {/* Weight + Cal/Pts — shown in mobile only (desktop sidebar already has these) */}
      {setMetric && (
        <div className="mhc-metrics-row" style={{alignItems:'flex-end'}}>
          <div className="mhc-metric-field">
            <label className="mhc-metric-label">Weight</label>
            <input type="number" step="0.1" inputMode="decimal"
              className="mhc-metric-input" placeholder="—"
              value={getMetric ? getMetric('weight') : ''}
              onChange={e=>setMetric('weight', e.target.value)}
            />
          </div>
          <div className="mhc-metric-field">
            <label className="mhc-metric-label">Cal/Pts</label>
            <input type="number" step="1" inputMode="numeric"
              className="mhc-metric-input" placeholder="—"
              value={getMetric ? getMetric('cals') : ''}
              onChange={e=>setMetric('cals', e.target.value)}
            />
          </div>
          {onGoToMetrics && (
            <button onClick={onGoToMetrics} title="View Metrics Charts"
              style={{background:'none',border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',
                      padding:'5px 8px',fontSize:16,color:'var(--accent)',flexShrink:0,marginBottom:1}}>
              📈
            </button>
          )}
        </div>
      )}

      <div className="monthly-habit-checklist-items" ref={itemsContainerRef}>
        {goals.length === 0 && (
          <div style={{fontSize:12,color:'var(--ink-faint)',fontFamily:"'DM Sans',sans-serif",padding:'4px 0'}}>
            No habits yet — tap + to add one
          </div>
        )}
        {goals.map(g => {
          const done = (completions[dk]||[]).includes(g.id);
          const confirming = confirmId === g.id;
          const editing = editingId === g.id;
          const isExpanded = !!expandedGoals[g.id];
          return (
            <div key={g.id}

function HabitNavArrows({view, date, onChange}) {
  const label = view==='yearly' ? date.getFullYear().toString()
    : view==='monthly' ? `${MONTHS[date.getMonth()]} ${date.getFullYear()}`
    : view==='weekly' ? (() => {
        const ws=getWeekStart(date);
        return `${fmtDisplay(ws)} – ${fmtDisplay(addDays(ws,6))}`;
      })()
    : `${DAYS[date.getDay()].slice(0,3)}, ${MONTHS[date.getMonth()].slice(0,3)} ${date.getDate()}, ${date.getFullYear()}`;

  function prev() {
    if(view==='daily') onChange(d=>addDays(d,-1));
    else if(view==='weekly') onChange(d=>addDays(d,-7));
    else if(view==='monthly') onChange(d=>new Date(d.getFullYear(),d.getMonth()-1,1));
    else onChange(d=>new Date(d.getFullYear()-1,d.getMonth(),d.getDate()));
  }
  function next() {
    if(view==='daily') onChange(d=>addDays(d,1));
    else if(view==='weekly') onChange(d=>addDays(d,7));
    else if(view==='monthly') onChange(d=>new Date(d.getFullYear(),d.getMonth()+1,1));
    else onChange(d=>new Date(d.getFullYear()+1,d.getMonth(),d.getDate()));
  }
  return (
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      <button className="nav-arrow" onClick={prev}>‹</button>
      <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:'var(--ink-light)',minWidth:160,textAlign:'center'}}>{label}</span>
      <button className="nav-arrow" onClick={next}>›</button>
    </div>
  );
}

function MonthlyView({date, selected, goals, completions, onDayClick, today, qty, notes}) {
  const year=date.getFullYear(), month=date.getMonth();
  const firstDay=new Date(year,month,1);
  const startPad=firstDay.getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  const cells = [];
  for(let i=0;i<startPad;i++) cells.push({day:null,date:addDays(firstDay,i-startPad)});
  for(let d=1;d<=daysInMonth;d++) cells.push({day:d,date:new Date(year,month,d)});
  while(cells.length%7!==0) cells.push({day:null,date:null});

  return (
    <div style={{display:'flex',flexDirection:'column'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gridTemplateRows:'auto',gap:2,alignContent:'start'}}>
        {DAYS.map(d=><div key={d} className="month-day-header">{d}</div>)}
        {cells.map((c,i)=>{
          if(!c.date) return <div key={i} style={{background:'var(--cream)',borderRadius:6,minHeight:70}}/>;
          const dk=fmt(c.date);
          const isToday=isSameDay(c.date,today);
          const otherMonth=c.date.getMonth()!==month;
          return (
            <div key={i} className={`month-day-cell ${otherMonth?'other-month':''} ${isToday?'today-cell':''} ${isSameDay(c.date,selected)?'selected-day':''}`}
              onClick={()=>onDayClick(new Date(c.date))} style={{cursor:'pointer'}}>
              <div className="month-day-num">{isToday?c.date.getDate():c.date.getDate()}</div>
              <HabitDotsForDay dayKey={dk} goals={goals} completions={completions} />
              {goals.length === 1 && (() => {
                const g = goals[0];
                const done = (completions[dk]||[]).includes(g.id);
                const qtyVal = qty ? (qty[dk]||{})[g.id] || '' : '';
                const notesVal = notes ? (notes[dk]||{})[g.id] || '' : '';
                const noteLines = notesVal.split('\n').slice(0,4).filter(l=>l.trim());
                if (!done && !qtyVal && !noteLines.length) return null;

                  <div style={{marginTop:2,padding:'1px 3px'}}>
                    {qtyVal && <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:g.color,fontWeight:700,lineHeight:1.3}}>{qtyVal}</div>}
                    {noteLines.map((l,i)=>(

                    ))}

function MonthlyCalendar({ weekData, setWeekData, monthlyGoals, setMonthlyGoals }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const [viewDate, setViewDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [selectedDate, setSelectedDate] = useState(null);
  const [showEventModal, setShowEventModal] = useState(false);
  const [editingEvent, setEditingEvent] = useState(null); // {dayKey, taskId} or null
  const [eventForm, setEventForm] = useState({title:'', time:'', date:'', details:''});
  const [dragInfo, setDragInfo] = useState(null); // {eventId, fromDayKey}
  const [dragOverDay, setDragOverDay] = useState(null);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [sheetOpen, setSheetOpen] = useState(false);

  function handleDragStart(ev, eventId, fromDayKey) {
    setDragInfo({eventId, fromDayKey});
    ev.dataTransfer.effectAllowed = 'move';
  }
  function handleDragOver(ev, toDayKey) {
    ev.preventDefault();
    ev.dataTransfer.dropEffect = 'move';
    setDragOverDay(toDayKey);
  }
  function handleDrop(ev, toDayKey) {
    ev.preventDefault();
    setDragOverDay(null);
    if (!dragInfo || dragInfo.fromDayKey === toDayKey) { setDragInfo(null); return; }
    const {eventId, fromDayKey} = dragInfo;
    setDragInfo(null);
    setWeekData(wd => {
      const updated = JSON.parse(JSON.stringify(wd));
      let movedTask = null;
      // Remove from old day
      Object.keys(updated).forEach(wk => {
        const tasks = (updated[wk].tasks||{})[fromDayKey];
        if (tasks) {
          const idx = tasks.findIndex(t => t.id === eventId);
          if (idx !== -1) {
            movedTask = {...tasks[idx]};
            updated[wk].tasks[fromDayKey] = tasks.filter(t => t.id !== eventId);
          }
        }
      });
      if (!movedTask) return wd;
      // Add to new day
      const newDateObj = new Date(toDayKey + 'T00:00:00');
      const newWeekKey = fmt(getWeekStart(newDateObj));
      if (!updated[newWeekKey]) updated[newWeekKey] = {proverb:'',toCreate:[],weekGoals:[],people:[],beWord:'',proud:'',story:'',tasks:{}};
      if (!updated[newWeekKey].tasks) updated[newWeekKey].tasks = {};
      if (!updated[newWeekKey].tasks[toDayKey]) updated[newWeekKey].tasks[toDayKey] = [];
      updated[newWeekKey].tasks[toDayKey].push(movedTask);
      // Update Google Calendar if signed in
      if (movedTask.gcalId && getToken()) updateEventInCalendar(movedTask.gcalId, movedTask, toDayKey);
      return updated;
    });
  }

  const yearMonthKey = `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}`;

  function getMonthGoals() { return monthlyGoals[yearMonthKey] || []; }
  function addMonthGoal() {
    setMonthlyGoals(mg => ({...mg, [yearMonthKey]: [...(mg[yearMonthKey]||[]), {id:Date.now().toString(), name:'', done:false}]}));
  }
  function updateMonthGoal(id, patch) {
    setMonthlyGoals(mg => ({...mg, [yearMonthKey]: (mg[yearMonthKey]||[]).map(g=>g.id===id?{...g,...patch}:g)}));
  }
  function deleteMonthGoal(id) {
    setMonthlyGoals(mg => ({...mg, [yearMonthKey]: (mg[yearMonthKey]||[]).filter(g=>g.id!==id)}));
  }

  // Get all events from weekData for a given dateKey
  function getEventsForDay(dateKey) {
    const events = [];
    Object.values(weekData).forEach(wd => {
      const tasks = (wd.tasks || {})[dateKey] || [];
      tasks.filter(t => t.isEvent).forEach(t => events.push({...t, dayKey: dateKey}));
    });
    return events;
  }

  // Get all events in the current month, sorted chronologically
  function getAllMonthEvents() {
    const year = viewDate.getFullYear();
    const month = viewDate.getMonth();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const events = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(year, month, d);
      const dk = fmt(date);
      getEventsForDay(dk).forEach(e => events.push({...e, date}));
    }
    events.sort((a,b) => {
      const da = a.date - b.date;
      if (da !== 0) return da;
      return (a.eventTime||'99:99').localeCompare(b.eventTime||'99:99');
    });
    return events;
  }

  function openAddEvent(dateKey) {
    setSelectedDate(dateKey);
    setEditingEvent(null);
    setEventForm({title:'', time:'', date:dateKey, details:''});
    setShowEventModal(true);
  }

  function openEditEvent(ev) {
    setEditingEvent({dayKey: ev.dayKey, taskId: ev.id});
    setEventForm({title: ev.title||'', time: ev.eventTime||'', date: ev.dayKey||'', details: ev.details||''});
    setShowEventModal(true);
  }

  function saveEvent() {
    if (!eventForm.title.trim()) return;
    if (editingEvent) {
      const newDayKey = eventForm.date || editingEvent.dayKey;
      const dateChanged = newDayKey !== editingEvent.dayKey;
      setWeekData(wd => {
        const updated = JSON.parse(JSON.stringify(wd)); // deep clone
        // Remove from old day
        Object.keys(updated).forEach(wk => {
          const tasks = (updated[wk].tasks || {})[editingEvent.dayKey];
          if (tasks) {
            const idx = tasks.findIndex(t => t.id === editingEvent.taskId);
            if (idx !== -1) {
              const updatedTask = {...tasks[idx], title:eventForm.title, eventTime:eventForm.time, details:eventForm.details};
              if (dateChanged) {
                // Remove from old day
                updated[wk].tasks[editingEvent.dayKey] = tasks.filter(t => t.id !== editingEvent.taskId);
                // Add to new day/week
                const newDateObj = new Date(newDayKey + 'T00:00:00');
                const newWeekKey = fmt(getWeekStart(newDateObj));
                if (!updated[newWeekKey]) updated[newWeekKey] = {proverb:'',toCreate:[],weekGoals:[],people:[],beWord:'',proud:'',story:'',tasks:{}};
                if (!updated[newWeekKey].tasks[newDayKey]) updated[newWeekKey].tasks[newDayKey] = [];
                updated[newWeekKey].tasks[newDayKey].push(updatedTask);
              } else {
                updated[wk].tasks[editingEvent.dayKey][idx] = updatedTask;
              }
              if (updatedTask.gcalId && getToken()) {
                updateEventInCalendar(updatedTask.gcalId, updatedTask, newDayKey);
              }
            }
          }
        });
        return updated;
      });
    } else {
      // Add new event to the correct week in weekData
      const targetDate = eventForm.date || selectedDate;
      const dateObj = new Date(targetDate + 'T00:00:00');
      const weekKey = fmt(getWeekStart(dateObj));
      const newTask = {
        id: Date.now().toString(), title: eventForm.title, details: eventForm.details,
        done: false, expanded: false, colorIndex: 3, isEvent: true, eventTime: eventForm.time,
        gcalId: null,
      };
      setWeekData(wd => {
        const cur = wd[weekKey] || {proverb:'',toCreate:[],weekGoals:[],people:[],beWord:'',proud:'',story:'',tasks:{}};
        const dayTasks = (cur.tasks||{})[targetDate] || [];
        return {...wd, [weekKey]: {...cur, tasks: {...(cur.tasks||{}), [targetDate]: [...dayTasks, newTask]}}};
      });
      // Push to Google Calendar and store gcalId back
      if (getToken()) {
        pushEventToCalendar(newTask, targetDate).then(gcalId => {
          if (gcalId) {
            setWeekData(wd => {
              const updated = {...wd};
              const tasks = (updated[weekKey]?.tasks || {})[targetDate];
              if (tasks) {
                updated[weekKey] = {...updated[weekKey], tasks: {...updated[weekKey].tasks,
                  [targetDate]: tasks.map(t => t.id===newTask.id ? {...t, gcalId} : t)
                }};
              }
              return updated;
            });
          } else {
            console.warn('Calendar push returned no ID — event may not have synced');
          }
        }).catch(e => {
          console.error('Calendar push error:', e);
          alert('Event saved locally, but could not push to Google Calendar:\n' + (e?.message || 'Unknown error') + '\n\nTry signing out and back in to refresh your Google permissions.');
        });
      }
    }
    setShowEventModal(false);
    setEditingEvent(null);
  }

  function deleteEvent(ev) {
    // Remove from Google Calendar if signed in and has gcalId
    if (ev.gcalId && getToken()) deleteEventFromCalendar(ev.gcalId);
    setWeekData(wd => {
      const updated = {...wd};
      Object.keys(updated).forEach(wk => {
        const tasks = (updated[wk].tasks || {})[ev.dayKey];
        if (tasks) {
          updated[wk] = {...updated[wk], tasks: {...updated[wk].tasks,
            [ev.dayKey]: tasks.filter(t => t.id !== ev.id)
          }};
        }
      });
      return updated;
    });
  }

  // Build calendar grid
  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(year, month, d));

  const monthEvents = getAllMonthEvents();

  const sidebarContent = (
    <>
      {/* Month Nav */}
      <div className="week-nav">
        <button className="nav-arrow" onClick={()=>setViewDate(d=>new Date(d.getFullYear(), d.getMonth()-1, 1))}>‹</button>
        <span className="week-nav-label">{MONTHS[month]} {year}</span>
        <button className="nav-arrow" onClick={()=>setViewDate(d=>new Date(d.getFullYear(), d.getMonth()+1, 1))}>›</button>
      </div>

      <a className="sidebar-link daily" href="https://penzu.com">✍️ Daily Pages</a>

      {/* Monthly Goals */}
      <div className="sidebar-section">
        <div className="checklist-header">
          <div className="sidebar-section-title">Monthly Goals:</div>
          <button className="add-btn" onClick={addMonthGoal}>+</button>
        </div>
        {getMonthGoals().map(g=>(
          <div key={g.id} className={`checklist-item ${g.done?'checked':''}`}>
            <div className={`check-box ${g.done?'checked':''}`} onClick={()=>updateMonthGoal(g.id,{done:!g.done})} />
            <input className="checklist-input" placeholder="Goal…" value={g.name}
              onChange={e=>updateMonthGoal(g.id,{name:e.target.value})} />
            <button className="delete-item-btn" onClick={()=>deleteMonthGoal(g.id)}>✕</button>
          </div>
        ))}
      </div>

      {/* Events this month */}
      <div className="sidebar-section" style={{flex:1}}>
        <div className="sidebar-section-title">Events This Month</div>
        {monthEvents.length === 0 && (
          <div style={{fontSize:11,color:'var(--ink-faint)',fontStyle:'italic',marginTop:4}}>No events yet</div>
        )}
        {monthEvents.map(ev=>(
          <div key={ev.id} className="month-event-item" onClick={()=>openEditEvent(ev)}>
            <div className="month-event-date">
              {MONTHS[ev.date.getMonth()].slice(0,3)} {ev.date.getDate()}
              {ev.eventTime && <span className="month-event-time"> {ev.eventTime}</span>}
            </div>
            <div className="month-event-title">{ev.title||<em style={{opacity:0.5}}>Untitled</em>}</div>
            <button className="delete-item-btn" style={{marginLeft:'auto',flexShrink:0,opacity:0.4,fontSize:13,color:'var(--red)'}}
              onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0.4}
              onClick={e=>{
                e.stopPropagation();
                if(window.confirm(`Delete "${ev.title||'Untitled'}"?`)) deleteEvent(ev);
              }}>✕</button>
          </div>
        ))}
      </div>
    </>
  );

  return (
    <div className="main-content">
      {/* DESKTOP SIDEBAR (collapsible) */}
      <div className={`sidebar-wrap ${sidebarCollapsed ? 'collapsed' : ''}`}>
        <div className="sidebar" style={{overflowY:'auto'}}>
          {sidebarContent}
        </div>
        <div className="sidebar-toggle-strip" onClick={()=>setSidebarCollapsed(c=>!c)}
          title={sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'}>
          <div className="sidebar-toggle-btn">{sidebarCollapsed ? '›' : '‹'}</div>
          <span className="sidebar-collapsed-label">Monthly</span>
        </div>
      </div>

      {/* MAIN CALENDAR GRID */}
      <div className="main-panel" style={{overflowY:'auto'}}>
        <div className="monthly-cal-wrap">
          {/* Day-of-week headers */}
          <div className="monthly-cal-header">
            {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>(
              <div key={d} className="monthly-dow">{d}</div>
            ))}
          </div>
          {/* Grid */}
          <div className="monthly-cal-grid">
            {cells.map((d,i)=>{
              if (!d) return <div key={'e'+i} className="monthly-cell empty" />;
              const dk = fmt(d);
              const isToday = isSameDay(d, today);
              const dayEvents = getEventsForDay(dk);
              const isDragOver = dragOverDay === dk;
              return (
                <div key={dk}
                  className={`monthly-cell ${isToday?'today':''} ${isDragOver?'drag-over':''}`}
                  onClick={()=>openAddEvent(dk)}
                  onDragOver={e=>handleDragOver(e,dk)}
                  onDragLeave={()=>setDragOverDay(null)}
                  onDrop={e=>handleDrop(e,dk)}>
                  <div className="monthly-cell-date">{d.getDate()}</div>
                  <div className="monthly-cell-events">
                    {dayEvents.slice(0,3).map(ev=>(
                      <div key={ev.id} className="monthly-event-chip"
                        style={{background: TASK_COLORS[(ev.colorIndex??3) % TASK_COLORS.length], cursor:'grab', opacity: dragInfo?.eventId===ev.id ? 0.4 : 1}}
                        draggable
                        onDragStart={e=>{e.stopPropagation();handleDragStart(e,ev.id,dk);}}
                        onDragEnd={()=>{setDragInfo(null);setDragOverDay(null);}}
                        onClick={e=>{e.stopPropagation();if(!dragInfo)openEditEvent(ev);}}>
                        {ev.eventTime && <span className="chip-time">{ev.eventTime}</span>}
                        {ev.title||'…'}
                      </div>
                    ))}
                    {dayEvents.length > 3 && (
                      <div className="monthly-event-more">+{dayEvents.length-3} more</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* MOBILE: Bottom sheet overlay */}
      <div className={`mobile-sheet-overlay ${sheetOpen?'open':''}`} onClick={()=>setSheetOpen(false)} />
      <div className={`mobile-sheet ${sheetOpen?'open':''}`}>
        <div className="mobile-sheet-handle" />
        <div className="mobile-sheet-header">
          <span className="mobile-sheet-title">{MONTHS[month]} {year}</span>
          <button className="mobile-sheet-close" onClick={()=>setSheetOpen(false)}>✕</button>
        </div>
        <div className="mobile-sheet-body">
          {sidebarContent}
        </div>
      </div>

      {/* MOBILE: FAB to open sheet */}
      <button className="mobile-fab" onClick={()=>setSheetOpen(o=>!o)} title="Monthly goals & events">☰</button>

      {/* EVENT MODAL */}
      {showEventModal && (
        <div className="modal-backdrop" onClick={()=>setShowEventModal(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{editingEvent ? 'Edit Event' : `Add Event — ${selectedDate}`}</div>
            <input className="modal-input" placeholder="Event title…"
              value={eventForm.title} onChange={e=>setEventForm(f=>({...f,title:e.target.value}))}
              autoFocus />
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}}>
              <label style={{fontSize:12,color:'var(--ink-faint)'}}>Date:</label>
              <input type="date" className="task-time-input"
                value={eventForm.date||''}
                onChange={e=>setEventForm(f=>({...f,date:e.target.value}))} />
              <label style={{fontSize:12,color:'var(--ink-faint)'}}>Time:</label>
              <TimeSelect value={eventForm.time} onChange={v=>setEventForm(f=>({...f,time:v}))} />
            </div>
            <textarea className="modal-textarea" placeholder="Details (optional)…"
              value={eventForm.details} onChange={e=>setEventForm(f=>({...f,details:e.target.value}))} rows={3} />
            <div className="modal-actions">
              {editingEvent && (
                <button className="modal-btn danger" onClick={()=>{
                  deleteEvent({id:editingEvent.taskId, dayKey:editingEvent.dayKey});
                  setShowEventModal(false);
                }}>Delete</button>
              )}
              <button className="modal-btn secondary" onClick={()=>setShowEventModal(false)}>Cancel</button>
              <button className="modal-btn primary" onClick={saveEvent}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
